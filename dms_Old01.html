function DMS({ storagePath, onChange文件夹 }) {
  const [tree, setTree] = useState(null);
  const [docIndex, setDocIndex] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [expandedIds, setExpandedIds] = useState(new Set());
  const [viewerDoc, setViewerDoc] = useState(null);
  const [loading, setLoading] = useState(true);
  const [editingNode, setEditingNode] = useState(false);
  const [tab, setTab] = useState("tree");
  const [sidebar打开, setSidebar打开] = useState(true);

  // Resizable sidebar — width in pixels, persisted in localStorage.
  // Min/max prevent absurdly small or huge sidebars.
  const SIDEBAR_MIN = 220;
  const SIDEBAR_MAX = 720;
  const SIDEBAR_DEFAULT = 320;
  const [sidebarWidth, setSidebarWidth] = useState(() => {
    try {
      const saved = parseInt(localStorage.getItem("dms:sidebar-width"), 10);
      if (saved && saved >= SIDEBAR_MIN && saved <= SIDEBAR_MAX) return saved;
    } catch {}
    return SIDEBAR_DEFAULT;
  });
  const [resizing, setResizing] = useState(false);

  // While dragging, listen on the window so movement outside the handle still works
  useEffect(() => {
    if (!resizing) return;
    const onMove = (e) => {
      const w = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, e.clientX));
      setSidebarWidth(w);
    };
    const onUp = () => {
      setResizing(false);
      try { localStorage.setItem("dms:sidebar-width", String(sidebarWidth)); } catch {}
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    // Prevent text selection while dragging
    document.body.style.userSelect = "none";
    document.body.style.cursor = "col-resize";
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    };
  }, [resizing, sidebarWidth]);

  // 保存 width on every change after dragging ends
  useEffect(() => {
    if (resizing) return;
    try { localStorage.setItem("dms:sidebar-width", String(sidebarWidth)); } catch {}
  }, [sidebarWidth, resizing]);

  // Double-click on the handle resets to default width
  const resetSidebarWidth = () => setSidebarWidth(SIDEBAR_DEFAULT);
  const [renamingId, setRenamingId] = useState(null);
  const [addingChildToId, setAddingChildToId] = useState(null);
  const [contextMenu, setContextMenu] = useState(null);
  const [showLinkPicker, setShowLinkPicker] = useState(false);
  const [showProjectMenu, setShowProjectMenu] = useState(false);
  const [showKeyParameters, setShowKeyParameters] = useState(false);
  const [keyParameters, setKeyParameters] = useState(DEFAULT_KEY_PARAMETERS);
  const ctx上传InputRef = useRef(null);
  const ctx上传TargetRef = useRef(null);

  // ---- MIGRATION ---------------------------------------------------------
  // Older DMS data stored full document records inside each node's documents[]
  // list. The new schema stores only {id} references in nodes, with the
  // canonical record living in docIndex. Detect old-format data and convert
  // it once on load.
  const migrateIfNeeded = (loadedTree, loadedIndex) => {
    if (!loadedTree) return { tree: loadedTree, index: loadedIndex, migrated: false };

    let migrated = false;
    const indexById = new Map(loadedIndex.map((e) => [e.id, e]));

    const walkNode = (node) => {
      const newDocs = [];
      for (const d of (node.documents || [])) {
        if (d && typeof d === "object" && d.id && Object.keys(d).length === 1) {
          // Already in new format: just an {id} reference
          newDocs.push(d);
          continue;
        }
        if (d && d.id) {
          // Old format: full record nested in node. Promote it to docIndex
          // (if not already there) and replace with a bare reference.
          migrated = true;
          if (!indexById.has(d.id)) {
            indexById.set(d.id, {
              id: d.id,
              name: d.name,
              mime: d.mime,
              size: d.size,
              uploadedAt: d.uploadedAt,
              originalNodeId: node.id,
              metadata: d.metadata || {},
            });
          }
          newDocs.push({ id: d.id });
        }
      }
      return {
        ...node,
        documents: newDocs,
        children: (node.children || []).map(walkNode),
      };
    };

    const newTree = walkNode(loadedTree);
    const newIndex = Array.from(indexById.values()).map((e) => {
      // Strip stale fields the old index used to carry (nodeId, nodePath)
      const { nodeId, nodePath, ...rest } = e;
      return {
        ...rest,
        // Preserve originalNodeId if present, else derive from the old nodeId
        originalNodeId: rest.originalNodeId || nodeId || null,
      };
    });

    if (migrated) {
      console.log("[DMS] Migrated existing data to linked-document schema.");
    }
    return { tree: newTree, index: newIndex, migrated };
  };

  useEffect(() => {
    (async () => {
      let t = await StorageAdapter.getTree();
      if (!t) {
        t = buildSeedTree();
        await StorageAdapter.saveTree(t);
      }
      const rawIdx = await StorageAdapter.list文件Index();
      const savedKeyParameters = await StorageAdapter.getKeyParameters();
      setKeyParameters(savedKeyParameters);

      const { tree: migratedTree, index: migratedIndex, migrated } =
        migrateIfNeeded(t, rawIdx);

      if (migrated) {
        await StorageAdapter.saveTree(migratedTree);
        await StorageAdapter.save文件Index(migratedIndex);
      }

      setTree(migratedTree);
      setDocIndex(migratedIndex);
      setSelectedId(migratedTree.id);
      setExpandedIds(new Set([migratedTree.id]));
      setLoading(false);
    })();
  }, []);

  const persistTree = useCallback(async (newTree) => {
    setTree(newTree);
    await StorageAdapter.saveTree(newTree);
  }, []);

  const persistIndex = useCallback(async (newIndex) => {
    setDocIndex(newIndex);
    await StorageAdapter.save文件Index(newIndex);
  }, []);

  const persistKeyParameters = useCallback(async (newKeyParameters) => {
    const clean = normalizeKeyParameters(newKeyParameters);
    setKeyParameters(clean);
    await StorageAdapter.saveKeyParameters(clean);
  }, []);

  const getNodePathFrom = (rootTree, nodeId) => {
    if (!rootTree) return "";
    const path = [];
    const walk = (n, trail) => {
      const t = [...trail, n.name];
      if (n.id === nodeId) { path.push(...t); return true; }
      for (const c of n.children || []) if (walk(c, t)) return true;
      return false;
    };
    walk(rootTree, []);
    return path.join(" / ");
  };

  const getNodePath = (nodeId) => getNodePathFrom(tree, nodeId);
  const selectedNode = tree && selectedId ? findNode(tree, selectedId) : null;

  const toggleExpand = (id) => {
    setExpandedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const expandToNode = (nodeId) => {
    if (!tree) return;
    const ids = new Set(expandedIds);
    const walk = (n, trail) => {
      const t = [...trail, n.id];
      if (n.id === nodeId) { t.forEach((x) => ids.add(x)); return true; }
      for (const c of n.children || []) if (walk(c, t)) return true;
      return false;
    };
    walk(tree, []);
    setExpandedIds(ids);
    setSelectedId(nodeId);
    setTab("tree");
  };

  // Node operations
  const startAddChildFromToolbar = () => {
    if (!selectedNode) return;
    setAddingChildToId(selectedId);
    setExpandedIds((prev) => new Set([...prev, selectedId]));
  };

  const handleCommitAddChild = async (parentId, name) => {
    const newNode = { id: genNodeId(), name, description: "", children: [], documents: [] };
    const newTree = updateNodeInTree(tree, parentId, (n) => ({
      ...n, children: [...(n.children || []), newNode],
    }));
    await persistTree(newTree);
    setExpandedIds((prev) => new Set([...prev, parentId]));
    setAddingChildToId(null);
    setSelectedId(newNode.id);
  };

  const handleCommit重命名 = async (nodeId, newName) => {
    const newTree = updateNodeInTree(tree, nodeId, (n) => ({ ...n, name: newName }));
    await persistTree(newTree);
    const refreshedIndex = docIndex.map((entry) => ({
      ...entry, nodePath: getNodePathFrom(newTree, entry.nodeId),
    }));
    await persistIndex(refreshedIndex);
    setRenamingId(null);
  };

  const handle删除Node = async (nodeId) => {
    if (!tree || nodeId === tree.id) {
      alert("Cannot delete the root node.");
      return;
    }
    const target = findNode(tree, nodeId);
    if (!target) return;
    const childCount = (target.children || []).length;
    const docCount = collectAllDocIds(target).length;
    const detail = childCount || docCount
      ? `\n\nThis will remove ${childCount} sub-node(s) and ${docCount} document link(s) under this node. 文件s that aren't linked anywhere else will be moved to the 'Unreferenced' list (their files stay on disk).`
      : "";
    if (!confirm(`删除 "${target.name}"?${detail}\n\nThis cannot be undone.`)) return;

    // Just remove the subtree. Links die with their nodes, but the actual
    // files and the docIndex stay intact — orphaned documents become
    // "unreferenced" and are still searchable / re-linkable.
    const newTree = removeNodeFromTree(tree, nodeId);
    await persistTree(newTree);
    if (selectedId === nodeId) setSelectedId(tree.id);
  };

  const updateNodeMeta = async (updates) => {
    const newTree = updateNodeInTree(tree, selectedId, (n) => ({ ...n, ...updates }));
    await persistTree(newTree);
    // Note: we no longer maintain nodePath in docIndex (it was unreliable
    // anyway — documents can be linked from many places). The search panel
    // computes paths on the fly from the current tree.
  };

  // 文件 operations
  const fileToDataUrl = (file) =>
    new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

  const uploadFilesToNode = async (targetNodeId, files) => {
    console.log(`[DMS] uploadFilesToNode called, target=${targetNodeId}, files=${files.length}`);
    if (!files.length) return;
    let workingTree = tree;
    let workingIndex = [...docIndex];

    for (const file of files) {
      const docId = genDocId();
      console.log(`[DMS] Processing file: ${file.name} (${file.size} bytes, ${file.type}) → ${docId}`);
      let dataUrl;
      try {
        dataUrl = await fileToDataUrl(file);
        console.log(`[DMS] ✓ File read into memory (${dataUrl.length} chars of base64)`);
      } catch (e) {
        console.error("[DMS] ✗ Failed to read file:", e);
        alert("Could not read the file: " + e.message);
        return;
      }
      const doc = {
        id: docId, name: file.name, mime: file.type || "application/octet-stream",
        size: file.size, uploadedAt: new Date().toISOString(),
        dataUrl, nodeId: targetNodeId, metadata: {},
      };
      try {
        console.log(`[DMS] Posting to /api/docs ...`);
        await StorageAdapter.save文件(doc);
      } catch (e) {
        console.error("[DMS] ✗ save文件 failed:", e);
        alert("上传 failed: " + e.message + "\n\nCheck the PyCharm Run window for the server-side error.");
        return;
      }

      // Node entries now hold only a reference {id} — the canonical document
      // record (with name, mime, size, metadata, etc.) lives in docIndex.
      workingTree = updateNodeInTree(workingTree, targetNodeId, (n) => ({
        ...n,
        documents: [...(n.documents || []), { id: docId }],
      }));

      // If the filename contains "#", the part before it is the document SN.
      // e.g.  "L3R198A-001#Drawing007.pdf"  →  sn = "L3R198A-001"
      const hashIdx = file.name.indexOf("#");
      const autoSn = hashIdx > 0 ? file.name.slice(0, hashIdx).trim() : undefined;

      workingIndex = [
        ...workingIndex,
        {
          id: docId,
          name: file.name,
          mime: file.type,
          size: file.size,
          uploadedAt: doc.uploadedAt,
          originalNodeId: targetNodeId, // remembers where it was first uploaded
          metadata: {},
          ...(autoSn ? { sn: autoSn } : {}),
        },
      ];
    }
    try {
      console.log("[DMS] Persisting updated tree and index ...");
      await persistTree(workingTree);
      await persistIndex(workingIndex);
      console.log("[DMS] ✓ 上传 complete");
    } catch (e) {
      console.error("[DMS] ✗ Failed to persist tree/index after upload:", e);
      alert("File uploaded, but could not save the index: " + e.message);
    }
  };

  const handle上传 = async (e) => {
    console.log("[DMS] handle上传 triggered, files=", e.target.files);
    const files = Array.from(e.target.files || []);
    if (!files.length) {
      console.log("[DMS] No files in event, aborting");
      return;
    }
    if (!selectedNode) {
      console.warn("[DMS] No node selected, cannot upload");
      alert("Please select a folder first by clicking it in the assembly tree.");
      return;
    }
    console.log(`[DMS] 上传ing ${files.length} file(s) to selected node ${selectedId}`);
    try {
      await uploadFilesToNode(selectedId, files);
    } catch (e) {
      console.error("[DMS] ✗ Top-level upload error:", e);
      alert("Unexpected error during upload: " + e.message);
    }
    e.target.value = "";
  };

  const handleTree上传 = async (nodeId, e) => {
    console.log(`[DMS] handleTree上传 triggered for node ${nodeId}, files=`, e.target.files);
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    try {
      await uploadFilesToNode(nodeId, files);
    } catch (e2) {
      console.error("[DMS] ✗ Top-level tree upload error:", e2);
      alert("Unexpected error during upload: " + e2.message);
    }
    setSelectedId(nodeId);
    setExpandedIds((prev) => new Set([...prev, nodeId]));
    e.target.value = "";
  };

  const openDoc = async (docId) => {
    const doc = await StorageAdapter.get文件(docId);
    if (doc) setViewerDoc(doc);
  };

  // ---- DOCUMENT LINKAGE HELPERS -----------------------------------------
  // Compute, for every docId, the list of nodes that reference it.
  // Used to show "linked from N other nodes" badges and to drive deletion logic.
  const refMap = useMemo(() => {
    const map = new Map(); // docId -> Array<nodeId>
    if (!tree) return map;
    const walk = (node) => {
      for (const d of (node.documents || [])) {
        if (!d || !d.id) continue;
        if (!map.has(d.id)) map.set(d.id, []);
        map.get(d.id).push(node.id);
      }
      (node.children || []).forEach(walk);
    };
    walk(tree);
    return map;
  }, [tree]);

  // Given a node + a doc record from docIndex, return the rich object the
  // 文件Card expects. (Card was designed for the old "full record"
  // format; we synthesize that shape from canonical record + reference.)
  const enrichDocsForNode = (node) => {
    if (!node) return [];
    return (node.documents || [])
      .map((ref) => docIndex.find((e) => e.id === ref.id))
      .filter(Boolean);
  };

  // 文件s that exist in the index but aren't referenced by any node.
  // These show up in the search/picker so they can be re-linked.
  const unreferencedDocs = useMemo(() => {
    return docIndex.filter((d) => !refMap.has(d.id));
  }, [docIndex, refMap]);

  // Remove a link from a single node. If that was the last reference, the
  // document stays in docIndex (and on disk) as "unreferenced" — the user's
  // chosen behavior. They can re-link it later via the picker.
  const unlinkDocFromNode = async (docId, nodeId) => {
    const refs = refMap.get(docId) || [];
    const otherRefs = refs.filter((id) => id !== nodeId);
    let confirmMsg;
    if (otherRefs.length === 0) {
      confirmMsg =
        "This is the only place this document is linked.\n\n" +
        "Removing the link will move the document to the 'Unreferenced' list. " +
        "It will stay in your repository and can be re-linked to any node later. " +
        "The file is NOT deleted from disk.\n\nProceed?";
    } else {
      confirmMsg = `Remove this document's link from this node?\n\nIt will remain linked to ${otherRefs.length} other node${otherRefs.length === 1 ? "" : "s"}.`;
    }
    if (!confirm(confirmMsg)) return;

    const newTree = updateNodeInTree(tree, nodeId, (n) => ({
      ...n,
      documents: (n.documents || []).filter((d) => d.id !== docId),
    }));
    await persistTree(newTree);
  };

  // Hard delete: removes file from disk AND removes all references from the tree.
  // Used from the global "manage documents" view, not the per-node trash icon.
  const purge文件 = async (docId) => {
    const refs = refMap.get(docId) || [];
    let confirmMsg;
    if (refs.length === 0) {
      confirmMsg = "Permanently delete this document from the repository?\n\nThe file will be removed from disk.";
    } else {
      confirmMsg =
        `This document is linked from ${refs.length} node${refs.length === 1 ? "" : "s"}.\n\n` +
        "Permanently delete it? All links will be removed and the file will be deleted from disk.";
    }
    if (!confirm(confirmMsg)) return;

    await StorageAdapter.delete文件(docId);
    // Remove every reference from the tree
    const stripRefs = (node) => ({
      ...node,
      documents: (node.documents || []).filter((d) => d.id !== docId),
      children: (node.children || []).map(stripRefs),
    });
    const newTree = stripRefs(tree);
    await persistTree(newTree);
    const newIndex = docIndex.filter((e) => e.id !== docId);
    await persistIndex(newIndex);
  };

  // Add a link from an existing document to a node (idempotent — won't duplicate).
  const linkDocToNode = async (docId, nodeId) => {
    const target = findNode(tree, nodeId);
    if (!target) return;
    if ((target.documents || []).some((d) => d.id === docId)) {
      // Already linked — silently no-op
      return;
    }
    const newTree = updateNodeInTree(tree, nodeId, (n) => ({
      ...n,
      documents: [...(n.documents || []), { id: docId }],
    }));
    await persistTree(newTree);
  };

  // Update metadata GLOBALLY (the user's chosen behavior — one set per document).
  const updateDocMetadata = async (docId, metadata) => {
    // No tree change needed — metadata lives only in docIndex.
    const fullDoc = await StorageAdapter.get文件(docId);
    if (fullDoc) await StorageAdapter.save文件({ ...fullDoc, metadata });
    const newIndex = docIndex.map((e) => (e.id === docId ? { ...e, metadata } : e));
    await persistIndex(newIndex);
  };

  // Update document's own SN (empty string clears override → falls back to inheritance)
  const updateDocSn = async (docId, newSn) => {
    const trimmed = (newSn || "").trim();
    const newIndex = docIndex.map((e) =>
      e.id === docId ? { ...e, sn: trimmed || undefined } : e
    );
    await persistIndex(newIndex);
  };

  // Per-node trash button now means "unlink from this node only"
  const deleteDoc = async (docId) => {
    await unlinkDocFromNode(docId, selectedId);
  };

  const formatBytes = (n) => {
    if (!n) return "—";
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
    return `${(n / 1024 / 1024).toFixed(1)} MB`;
  };

  if (loading) {
    return <div className="h-screen flex items-center justify-center bg-stone-50 text-stone-500 text-sm">Loading document repository…</div>;
  }

  return (
    <div className="h-screen flex flex-col bg-stone-50 text-stone-900">
      <header className="border-b border-stone-300 bg-white px-4 py-2.5 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <button
            onClick={() => setSidebar打开((s) => !s)}
            className="text-stone-500 hover:text-stone-900 p-1"
          >
            {sidebar打开 ? <ChevronLeft size={16} /> : <ChevronRight size={16} />}
          </button>
          <div>
            <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500">工程文件</div>
            <div className="text-sm font-semibold text-stone-900">QC 文件 Management System (QCDMS)</div>
          </div>
        </div>
        <div className="flex items-center gap-3 text-[10px] text-stone-500">
          <div className="relative">
            <button
              onClick={(e) => { e.stopPropagation(); setShowProjectMenu(!showProjectMenu); }}
              className="flex items-center gap-1 px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded text-stone-700"
              title="Project actions: export, import, new"
            >
              <Book size={11} /> Project
            </button>
            <ProjectMenu
              open={showProjectMenu}
              on关闭={() => setShowProjectMenu(false)}
              onProjectChanged={(newPath) => {
                // Project-scoped UI caches must not carry into a newly-created project.
                // The authoritative data is in the selected storage folder/index.json.
                try {
                  [
                    "dms:databook-selection",
                    "dms:databook-title",
                    "dms:databook-subtitle",
                  ].forEach((k) => localStorage.removeItem(k));
                } catch {}
                // Reliable refresh: reload the page so all React state restarts
                // against the new storage folder.
                window.location.reload();
              }}
              on打开KeyParameters={() => setShowKeyParameters(true)}
            />
          </div>
          <button
            onClick={onChange文件夹}
            className="flex items-center gap-1 px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded text-stone-700 max-w-[400px]"
            title={`Click to change storage location\nCurrent: ${storagePath}`}
          >
            <HardDrive size={11} />
            <span className="font-mono truncate">{storagePath || "—"}</span>
          </button>
          <span className="text-stone-300">|</span>
          <span className="tabular-nums">{docIndex.length} doc{docIndex.length === 1 ? "" : "s"} indexed</span>
          <span className="text-stone-300">|</span>
          <button
            onClick={async () => {
              if (!confirm("Quit QCDMS? This will stop the server.")) return;
              try { await fetch("/api/quit", { method: "POST" }); } catch {}
              window.close();
            }}
            className="flex items-center gap-1 px-2 py-1 border border-red-300 hover:bg-red-50 hover:border-red-500 rounded text-red-600 font-medium"
            title="Stop the DMS server and quit"
          >
            Quit DMS
          </button>
        </div>
      </header>

      <div className="flex-1 flex overflow-hidden">
        {sidebar打开 && (
          <>
            <aside
              style={{ width: `${sidebarWidth}px` }}
              className="border-r border-stone-300 bg-white flex flex-col shrink-0"
            >
            <div className="flex border-b border-stone-200 text-xs">
              <button
                onClick={() => setTab("tree")}
                className={`flex-1 py-2 px-2 flex items-center justify-center gap-1 ${
                  tab === "tree" ? "border-b-2 border-amber-600 text-stone-900 font-medium" : "text-stone-500 hover:text-stone-900"
                }`}
              >
                <文件夹 size={12} /> Tree
              </button>
              <button
                onClick={() => setTab("search")}
                className={`flex-1 py-2 px-2 flex items-center justify-center gap-1 ${
                  tab === "search" ? "border-b-2 border-amber-600 text-stone-900 font-medium" : "text-stone-500 hover:text-stone-900"
                }`}
              >
                <搜索 size={12} /> 搜索
              </button>
              <button
                onClick={() => setTab("databook")}
                className={`flex-1 py-2 px-2 flex items-center justify-center gap-1 ${
                  tab === "databook" ? "border-b-2 border-amber-600 text-stone-900 font-medium" : "text-stone-500 hover:text-stone-900"
                }`}
              >
                <Book size={12} /> Databook
              </button>
            </div>

            {tab === "tree" && (
              <>
                <div className="flex flex-wrap gap-1 p-2 border-b border-stone-200">
                  <button
                    onClick={startAddChildFromToolbar}
                    disabled={!selectedNode}
                    className="text-[11px] px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded flex items-center gap-1 disabled:opacity-40"
                    title="Create a new sub-folder under the selected node"
                  >
                    <文件夹 size={11} /> Add folder
                  </button>
                  <label
                    className={`text-[11px] px-2 py-1 border border-stone-300 rounded flex items-center gap-1 ${
                      selectedNode ? "hover:bg-amber-50 hover:border-amber-400 cursor-pointer" : "opacity-40 cursor-not-allowed"
                    }`}
                    title="上传 one or more documents to the selected node"
                  >
                    <上传 size={11} /> 添加文件
                    <input
                      type="file" multiple accept="application/pdf,image/*"
                      className="hidden" disabled={!selectedNode}
                      onChange={handle上传}
                    />
                  </label>
                  <button
                    onClick={() => selectedId && setRenamingId(selectedId)}
                    disabled={!selectedNode}
                    className="text-[11px] px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded flex items-center gap-1 disabled:opacity-40"
                    title="重命名 the selected node"
                  >
                    <Edit2 size={11} /> 重命名
                  </button>
                  <button
                    onClick={() => selectedId && handle删除Node(selectedId)}
                    disabled={!selectedNode || selectedId === tree?.id}
                    className="text-[11px] px-2 py-1 border border-stone-300 hover:bg-red-50 hover:border-red-400 hover:text-red-700 rounded flex items-center gap-1 disabled:opacity-40"
                    title="删除 the selected node and its subtree"
                  >
                    <Trash2 size={11} /> 删除
                  </button>
                </div>
                <div className="px-3 py-1.5 text-[10px] text-stone-500 border-b border-stone-100 bg-stone-50/50">
                  Hover a node for quick actions · Double-click to rename · Right-click for menu
                </div>
                <div className="flex-1 overflow-auto py-1">
                  {tree && (
                    <TreeNode
                      node={tree} depth={0} isRoot={true}
                      selectedId={selectedId} expandedIds={expandedIds}
                      renamingId={renamingId} addingChildToId={addingChildToId}
                      onToggle={toggleExpand} onSelect={setSelectedId}
                      onStart重命名={(id) => setRenamingId(id)}
                      onCommit重命名={handleCommit重命名}
                      on取消重命名={() => setRenamingId(null)}
                      onStartAddChild={(id) => {
                        setAddingChildToId(id);
                        setExpandedIds((prev) => new Set([...prev, id]));
                      }}
                      onCommitAddChild={handleCommitAddChild}
                      on取消AddChild={() => setAddingChildToId(null)}
                      on删除={handle删除Node}
                      onContextMenu={(x, y, nodeId) => setContextMenu({ x, y, nodeId })}
                      on上传ToNode={handleTree上传}
                    />
                  )}
                </div>
              </>
            )}

            {tab === "search" && (
              <搜索Panel
                index={docIndex}
                refMap={refMap}
                getPathFor={(id) => getNodePathFrom(tree, id)}
                on打开Doc={openDoc}
                onJumpToNode={expandToNode}
              />
            )}

            {tab === "databook" && (
              <DatabookPanel
                tree={tree}
                docIndex={docIndex}
                getPathFor={(id) => getNodePathFrom(tree, id)}
                formatBytes={formatBytes}
              />
            )}
          </aside>
            {/* Drag handle — narrow strip with wider invisible hit area for easier grabbing */}
            <div
              onMouseDown={(e) => {
                e.preventDefault();
                setResizing(true);
              }}
              onDoubleClick={resetSidebarWidth}
              title="Drag to resize sidebar · Double-click to reset"
              className={`relative w-1 shrink-0 cursor-col-resize group ${
                resizing ? "bg-amber-500" : "bg-stone-300 hover:bg-amber-400"
              }`}
              style={{ marginLeft: "-1px", zIndex: 10 }}
            >
              {/* Invisible wider hit area so the user doesn't have to be pixel-perfect */}
              <div className="absolute inset-y-0 -left-1 -right-1" />
            </div>
          </>
        )}

        <main className="flex-1 overflow-auto">
          {selectedNode ? (
            <div className="max-w-4xl mx-auto p-6">
              <div className="text-[11px] text-stone-500 mb-3 font-mono">{getNodePath(selectedId)}</div>

              <div className="border-b border-stone-300 pb-4 mb-5">
                {editingNode ? (
                  <div className="space-y-2">
                    <input
                      type="text" value={selectedNode.name}
                      onChange={(e) => updateNodeMeta({ name: e.target.value })}
                      placeholder="Node name"
                      className="w-full text-xl font-semibold border border-stone-300 rounded px-2 py-1"
                    />
                    <div>
                      <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-0.5">
                        Serial Number (SN)
                      </label>
                      <input
                        type="text"
                        value={selectedNode.sn || ""}
                        onChange={(e) => updateNodeMeta({ sn: e.target.value })}
                        placeholder="e.g. SN-2026-04-001 (optional)"
                        className="w-full text-sm border border-stone-300 rounded px-2 py-1 font-mono"
                      />
                    </div>
                    <textarea
                      value={selectedNode.description || ""}
                      onChange={(e) => updateNodeMeta({ description: e.target.value })}
                      placeholder="Description"
                      className="w-full text-sm border border-stone-300 rounded px-2 py-1"
                      rows={2}
                    />
                    <button onClick={() => setEditingNode(false)} className="text-xs px-3 py-1 bg-amber-600 hover:bg-amber-700 text-white rounded">
                      Done
                    </button>
                  </div>
                ) : (
                  <div className="flex items-start justify-between gap-3">
                    <div className="min-w-0 flex-1">
                      <h1 className="text-xl font-semibold text-stone-900">{selectedNode.name}</h1>
                      {selectedNode.sn && (
                        <div className="text-sm text-amber-700 font-mono mt-0.5">
                          SN · {selectedNode.sn}
                        </div>
                      )}
                      {selectedNode.description && (
                        <p className="text-sm text-stone-600 mt-1">{selectedNode.description}</p>
                      )}
                      <div className="flex gap-3 mt-2 text-[11px] text-stone-500 font-mono">
                        <span>{selectedNode.id}</span>
                        <span>•</span>
                        <span>
                          {(selectedNode.children || []).length} sub-assembl{(selectedNode.children || []).length === 1 ? "y" : "ies"}
                        </span>
                        <span>•</span>
                        <span>
                          {(selectedNode.documents || []).length} document{(selectedNode.documents || []).length === 1 ? "" : "s"}
                        </span>
                      </div>
                    </div>
                    <button onClick={() => setEditingNode(true)} className="text-stone-500 hover:text-stone-900 p-1" title="Edit name, SN, and description">
                      <Edit2 size={14} />
                    </button>
                  </div>
                )}
              </div>

              <section>
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-xs font-semibold uppercase tracking-wider text-stone-700">Attached documents</h2>
                  <div className="flex gap-2">
                    <button
                      onClick={() => setShowLinkPicker(true)}
                      className="text-xs px-3 py-1.5 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 text-stone-700 rounded cursor-pointer flex items-center gap-1.5"
                      title="Link an existing document from another node (no duplicate file is stored)"
                    >
                      <Tag size={12} /> Link existing
                    </button>
                    <label className="text-xs px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white rounded cursor-pointer flex items-center gap-1.5">
                      <上传 size={12} /> 上传 files
                      <input type="file" multiple accept="application/pdf,image/*" onChange={handle上传} className="hidden" />
                    </label>
                  </div>
                </div>

                {(selectedNode.documents || []).length === 0 && (
                  <div className="border border-dashed border-stone-300 rounded p-8 text-center text-sm text-stone-500">
                    No documents attached. 上传 new files or use “Link existing” to attach a document already in the repository.
                  </div>
                )}

                <div className="space-y-3">
                  {enrichDocsForNode(selectedNode).map((doc) => {
                    const refs = refMap.get(doc.id) || [];
                    const otherRefs = refs.filter((id) => id !== selectedId).length;
                    return (
                      <文件Card
                        key={doc.id}
                        doc={doc}
                        otherRefCount={otherRefs}
                        nodeSn={selectedNode.sn || ""}
                        on打开={() => openDoc(doc.id)}
                        on删除={() => deleteDoc(doc.id)}
                        onUpdateMeta={(m) => updateDocMetadata(doc.id, m)}
                        onUpdateSn={(newSn) => updateDocSn(doc.id, newSn)}
                        keyParameters={keyParameters}
                        formatBytes={formatBytes}
                      />
                    );
                  })}
                </div>
              </section>
            </div>
          ) : (
            <div className="h-full flex items-center justify-center text-stone-500 text-sm">
              Select a node from the assembly tree
            </div>
          )}
        </main>
      </div>

      <文件Viewer doc={viewerDoc} on关闭={() => setViewerDoc(null)} />

      <KeyParametersDialog
        open={showKeyParameters}
        keyParameters={keyParameters}
        on关闭={() => setShowKeyParameters(false)}
        on保存={async (items) => {
          await persistKeyParameters(items);
          setShowKeyParameters(false);
        }}
      />

      <LinkPicker
        open={showLinkPicker}
        on关闭={() => setShowLinkPicker(false)}
        onLink={(docId) => linkDocToNode(docId, selectedId)}
        docIndex={docIndex}
        tree={tree}
        refMap={refMap}
        currentNodeId={selectedId}
        currentNodeName={selectedNode?.name || ""}
        formatBytes={formatBytes}
        getPathFor={(id) => getNodePathFrom(tree, id)}
      />

      {contextMenu && (
        <ContextMenu
          x={contextMenu.x} y={contextMenu.y}
          isRoot={contextMenu.nodeId === tree?.id}
          on关闭={() => setContextMenu(null)}
          on重命名={() => setRenamingId(contextMenu.nodeId)}
          onAddChild={() => {
            setAddingChildToId(contextMenu.nodeId);
            setExpandedIds((prev) => new Set([...prev, contextMenu.nodeId]));
          }}
          on上传={() => {
            ctx上传TargetRef.current = contextMenu.nodeId;
            ctx上传InputRef.current?.click();
          }}
          on删除={() => handle删除Node(contextMenu.nodeId)}
        />
      )}

      <input
        ref={ctx上传InputRef}
        type="file" multiple accept="application/pdf,image/*"
        className="hidden"
        onChange={(e) => {
          const targetId = ctx上传TargetRef.current;
          if (targetId) handleTree上传(targetId, e);
          ctx上传TargetRef.current = null;
        }}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);

// Startup banner
console.log("%c[DMS] 文件 Management System loaded — build 2026-05-07-key-parameters","color:#b45309;font-weight:bold;font-size:14px");
console.log("[DMS] Storage backend: REST API (Python server)");
console.log("[DMS] To diagnose storage, run: dmsDiag()");

// Global diagnostic helper — type dmsDiag() in console to inspect state
window.dmsDiag = async function() {
  console.group("[DMS] Diagnostic report");
  try {
    const settings = await StorageAdapter.getSettings();
    console.log("Settings:", settings);
    const res = await fetch("/api/diag");
    const diag = await res.json();
    console.log("Server diagnostic:", diag);
    if (diag.files_in_root && diag.files_in_root.length) {
      console.log("Files in storage root:", diag.files_in_root);
    }
    if (diag.files_in_docs && diag.files_in_docs.length) {
      console.log(`Files in docs/ subfolder (${diag.files_in_docs.length}):`, diag.files_in_docs);
    }
  } catch (e) {
    console.error("Diagnostic failed:", e);
  }
  console.groupEnd();
};
</script>
</body>
</html>
