/* =============================================================================
 * STORAGE ADAPTER LAYER (REST API implementation)
 * ---------------------------------------------------------------------------
 * Talks to the Python Flask server (dms_server.py) running on the same host.
 * Tree + index live in <storage_root>/index.json on disk.
 * 文件s live as real files in <storage_root>/docs/<DOC-ID>.<ext>.
 *
 * To migrate to a remote/production server later, just change API_BASE to
 * the remote URL — no other code in this file changes.
 * =============================================================================
 */
const API_BASE = ""; // same origin as the page (e.g. http://localhost:8000)

const DEFAULT_KEY_PARAMETERS = [
  "category",
  "rev",
  "supplier",
  "drawing_number",
  "equipment_tag",
  "serial_number",
  "manufacturer",
  "project",
  "discipline",
  "status",
  "inspection_type",
  "certificate_type",
  "asset_id"
];

const normalizeKeyParameters = (items) => {
  const seen = new Set();
  const out = [];
  for (const raw of (items || [])) {
    const v = String(raw || "").trim();
    if (!v) continue;
    const k = v.toLowerCase();
    if (seen.has(k)) continue;
    seen.add(k);
    out.push(v);
  }
  return out;
};

const StorageAdapter = {
  async _json(path, opts = {}) {
    const res = await fetch(API_BASE + path, opts);
    if (!res.ok) {
      let detail = "";
      try { detail = (await res.json()).error || ""; } catch {}
      throw new Error(`${path} → HTTP ${res.status} ${res.statusText} ${detail}`);
    }
    return res.json();
  },

  async getSettings() {
    return this._json("/api/settings");
  },

  async saveSettings(storagePath) {
    return this._json("/api/settings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ storage_path: storagePath }),
    });
  },

  async getTree() {
    const r = await this._json("/api/tree");
    return r.tree;
  },

  async saveTree(tree) {
    await this._json("/api/tree", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tree }),
    });
  },

  async list文件Index() {
    const r = await this._json("/api/doc-index");
    return r.docIndex || [];
  },

  async save文件Index(docIndex) {
    await this._json("/api/doc-index", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ docIndex }),
    });
  },

  async getKeyParameters() {
    const r = await this._json("/api/key-parameters");
    return normalizeKeyParameters(r.keyParameters || DEFAULT_KEY_PARAMETERS);
  },

  async saveKeyParameters(keyParameters) {
    await this._json("/api/key-parameters", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ keyParameters: normalizeKeyParameters(keyParameters) }),
    });
  },

  // 文件s: upload as multipart, retrieve as URL
  async save文件(doc) {
    // doc.dataUrl is base64. Convert to Blob and POST as multipart/form-data.
    // NOTE: do NOT use `new File(...)` here — our React `File` icon component
    // shadows the global File constructor in this scope. FormData accepts a
    // Blob plus filename argument, which works the same way.
    const response = await fetch(doc.dataUrl);
    const blob = await response.blob();
    const form = new FormData();
    form.append("file", blob, doc.name);
    form.append("doc_id", doc.id);
    const res = await fetch(API_BASE + "/api/docs", { method: "POST", body: form });
    if (!res.ok) {
      let detail = "";
      try { detail = (await res.json()).error || ""; } catch {}
      throw new Error(`上传 failed: HTTP ${res.status} ${detail}`);
    }
    console.log(`[DMS] ✓ 上传ed ${doc.name} as ${doc.id}`);
  },

  async get文件(docId) {
    // For viewing, the document is just a URL — the server streams it.
    // We also need its metadata (name, mime, etc.) which is in the doc index.
    const idx = await this.list文件Index();
    const meta = idx.find((d) => d.id === docId);
    if (!meta) return null;
    return {
      id: docId,
      name: meta.name,
      mime: meta.mime,
      size: meta.size,
      uploadedAt: meta.uploadedAt,
      originalNodeId: meta.originalNodeId || meta.nodeId,
      metadata: meta.metadata || {},
      // dataUrl is now a server URL — viewer can use it directly
      dataUrl: API_BASE + "/api/docs/" + docId,
    };
  },

  async delete文件(docId) {
    try {
      await fetch(API_BASE + "/api/docs/" + docId, { method: "DELETE" });
    } catch (e) {
      console.warn("[DMS] 删除 failed (non-fatal):", e);
    }
  },
};

/* =============================================================================
 * ID GENERATION
 * =============================================================================
 */
const genDocId = () => {
  const d = new Date();
  const ymd =
    d.getFullYear().toString() +
    String(d.getMonth() + 1).padStart(2, "0") +
    String(d.getDate()).padStart(2, "0");
  const rand = Math.random().toString(36).slice(2, 8).toUpperCase();
  return `DOC-${ymd}-${rand}`;
};

const genNodeId = () => {
  const rand = Math.random().toString(36).slice(2, 8).toUpperCase();
  return `NODE-${rand}`;
};

/* =============================================================================
 * TREE OPERATIONS
 * =============================================================================
 */
const findNode = (root, nodeId) => {
  if (!root) return null;
  if (root.id === nodeId) return root;
  for (const child of root.children || []) {
    const found = findNode(child, nodeId);
    if (found) return found;
  }
  return null;
};

const collectAllDocIds = (node, acc = []) => {
  if (!node) return acc;
  (node.documents || []).forEach((d) => acc.push(d.id));
  (node.children || []).forEach((c) => collectAllDocIds(c, acc));
  return acc;
};

const updateNodeInTree = (root, nodeId, updater) => {
  if (root.id === nodeId) return updater(root);
  return {
    ...root,
    children: (root.children || []).map((c) =>
      updateNodeInTree(c, nodeId, updater)
    ),
  };
};

const removeNodeFromTree = (root, nodeId) => {
  return {
    ...root,
    children: (root.children || [])
      .filter((c) => c.id !== nodeId)
      .map((c) => removeNodeFromTree(c, nodeId)),
  };
};

/* =============================================================================
 * UI: TREE NODE
 * =============================================================================
 */
const TreeNode = ({
  node, depth, selectedId, expandedIds, isRoot,
  renamingId, addingChildToId,
  onToggle, onSelect,
  onStart重命名, onCommit重命名, on取消重命名,
  onStartAddChild, onCommitAddChild, on取消AddChild,
  on删除, onContextMenu, on上传ToNode,
}) => {
  const isExpanded = expandedIds.has(node.id);
  const isSelected = selectedId === node.id;
  const isRenaming = renamingId === node.id;
  const isAddingChild = addingChildToId === node.id;
  const hasChildren = (node.children || []).length > 0;
  const docCount = (node.documents || []).length;

  const [draftName, setDraftName] = useState(node.name);
  const [newChildName, setNewChildName] = useState("");

  useEffect(() => { if (isRenaming) setDraftName(node.name); }, [isRenaming, node.name]);
  useEffect(() => { if (isAddingChild) setNewChildName(""); }, [isAddingChild]);

  const commit重命名 = () => {
    const trimmed = draftName.trim();
    if (trimmed && trimmed !== node.name) onCommit重命名(node.id, trimmed);
    else on取消重命名();
  };

  const commitAddChild = () => {
    const trimmed = newChildName.trim();
    if (trimmed) onCommitAddChild(node.id, trimmed);
    else on取消AddChild();
  };

  return (
    <div>
      <div
        onClick={() => !isRenaming && onSelect(node.id)}
        onDoubleClick={(e) => { e.stopPropagation(); onStart重命名(node.id); }}
        onContextMenu={(e) => {
          e.preventDefault();
          onSelect(node.id);
          onContextMenu(e.clientX, e.clientY, node.id);
        }}
        className={`group flex items-center gap-1.5 py-1.5 px-2 cursor-pointer text-sm border-l-2 transition-colors ${
          isSelected
            ? "bg-amber-50 border-amber-600 text-stone-900"
            : "border-transparent text-stone-700 hover:bg-stone-100"
        }`}
        style={{ paddingLeft: `${depth * 14 + 8}px` }}
      >
        <span
          onClick={(e) => { e.stopPropagation(); if (hasChildren) onToggle(node.id); }}
          className="w-4 flex items-center justify-center"
        >
          {hasChildren ? (
            isExpanded ? <ChevronDown size={14} /> : <ChevronRight size={14} />
          ) : <span className="w-3.5" />}
        </span>
        {isExpanded && hasChildren ? (
          <文件夹打开 size={15} className="text-amber-700 shrink-0" />
        ) : (
          <文件夹 size={15} className="text-amber-700 shrink-0" />
        )}

        {isRenaming ? (
          <input
            autoFocus
            type="text"
            value={draftName}
            onChange={(e) => setDraftName(e.target.value)}
            onClick={(e) => e.stopPropagation()}
            onBlur={commit重命名}
            onKeyDown={(e) => {
              if (e.key === "Enter") commit重命名();
              if (e.key === "Escape") on取消重命名();
            }}
            className="flex-1 text-sm px-1 py-0 border border-amber-500 rounded bg-white text-stone-900 focus:outline-none"
          />
        ) : (
          <span className="truncate flex-1" title="Double-click to rename">
            {node.name}
            {node.sn && (
              <span className="ml-1.5 text-[10px] text-amber-700 font-mono">· {node.sn}</span>
            )}
          </span>
        )}

        {!isRenaming && (
          <>
            {docCount > 0 && (
              <span className="text-[10px] tabular-nums px-1.5 py-0.5 bg-stone-200 text-stone-700 rounded">
                {docCount}
              </span>
            )}
            <div className="hidden group-hover:flex items-center gap-0.5 ml-1">
              <button
                onClick={(e) => { e.stopPropagation(); onStartAddChild(node.id); }}
                title="Add child folder"
                className="text-stone-500 hover:text-amber-700 p-0.5 rounded hover:bg-white"
              >
                <Plus size={12} />
              </button>
              <label
                onClick={(e) => e.stopPropagation()}
                title="上传文件 to this folder"
                className="text-stone-500 hover:text-amber-700 p-0.5 rounded hover:bg-white cursor-pointer"
              >
                <上传 size={12} />
                <input
                  type="file"
                  multiple
                  accept="application/pdf,image/*"
                  className="hidden"
                  onChange={(e) => on上传ToNode(node.id, e)}
                />
              </label>
              {!isRoot && (
                <button
                  onClick={(e) => { e.stopPropagation(); on删除(node.id); }}
                  title="删除 node"
                  className="text-stone-500 hover:text-red-600 p-0.5 rounded hover:bg-white"
                >
                  <Trash2 size={12} />
                </button>
              )}
            </div>
          </>
        )}
      </div>

      {isAddingChild && (
        <div
          className="flex items-center gap-1.5 py-1 px-2"
          style={{ paddingLeft: `${(depth + 1) * 14 + 8}px` }}
        >
          <span className="w-4" />
          <文件夹 size={15} className="text-amber-400 shrink-0" />
          <input
            autoFocus
            type="text"
            value={newChildName}
            placeholder="New folder / sub-assembly name…"
            onChange={(e) => setNewChildName(e.target.value)}
            onBlur={commitAddChild}
            onKeyDown={(e) => {
              if (e.key === "Enter") commitAddChild();
              if (e.key === "Escape") on取消AddChild();
            }}
            className="flex-1 text-sm px-1 py-0 border border-amber-500 rounded bg-white text-stone-900 focus:outline-none"
          />
        </div>
      )}

      {isExpanded && (node.children || []).map((child) => (
        <TreeNode
          key={child.id}
          node={child}
          depth={depth + 1}
          selectedId={selectedId}
          expandedIds={expandedIds}
          isRoot={false}
          renamingId={renamingId}
          addingChildToId={addingChildToId}
          onToggle={onToggle}
          onSelect={onSelect}
          onStart重命名={onStart重命名}
          onCommit重命名={onCommit重命名}
          on取消重命名={on取消重命名}
          onStartAddChild={onStartAddChild}
          onCommitAddChild={onCommitAddChild}
          on取消AddChild={on取消AddChild}
          on删除={on删除}
          onContextMenu={onContextMenu}
          on上传ToNode={on上传ToNode}
        />
      ))}
    </div>
  );
};

/* =============================================================================
 * UI: CONTEXT MENU
 * =============================================================================
 */
const ContextMenu = ({ x, y, isRoot, on关闭, on重命名, onAddChild, on上传, on删除 }) => {
  useEffect(() => {
    const close = () => on关闭();
    window.addEventListener("click", close);
    window.addEventListener("scroll", close, true);
    return () => {
      window.removeEventListener("click", close);
      window.removeEventListener("scroll", close, true);
    };
  }, [on关闭]);

  return (
    <div
      style={{ position: "fixed", left: x, top: y, zIndex: 60 }}
      className="bg-white border border-stone-300 rounded shadow-lg py-1 min-w-[180px] text-sm"
      onClick={(e) => e.stopPropagation()}
    >
      <button
        onClick={() => { onAddChild(); on关闭(); }}
        className="w-full text-left px-3 py-1.5 hover:bg-amber-50 flex items-center gap-2 text-stone-700"
      >
        <文件夹 size={13} /> Add sub-folder
      </button>
      <button
        onClick={() => { on上传(); on关闭(); }}
        className="w-full text-left px-3 py-1.5 hover:bg-amber-50 flex items-center gap-2 text-stone-700"
      >
        <上传 size={13} /> 上传文件
      </button>
      <div className="border-t border-stone-200 my-1" />
      <button
        onClick={() => { on重命名(); on关闭(); }}
        className="w-full text-left px-3 py-1.5 hover:bg-amber-50 flex items-center gap-2 text-stone-700"
      >
        <Edit2 size={13} /> 重命名
      </button>
      {!isRoot && (
        <>
          <div className="border-t border-stone-200 my-1" />
          <button
            onClick={() => { on删除(); on关闭(); }}

            <Trash2 size={13} /> 删除 folder

};

/* =============================================================================
 * UI: METADATA EDITOR
 * =============================================================================
 */
const MetadataEditor = ({ metadata, onChange, keyParameters = [] }) => {
  const entries = Object.entries(metadata || {});
  const suggestions = normalizeKeyParameters(keyParameters);

  const updateKey = (oldKey, newKey) => {
    const clean = (newKey || "").trim();
    if (!clean || clean === oldKey) return;
    const m = { ...(metadata || {}) };
    m[clean] = m[oldKey];
    delete m[oldKey];
    onChange(m);
  };
  const updateValue = (key, subField, val) => {
    const prev = (metadata || {})[key];
    const prevObj = (prev && typeof prev === "object") ? prev : { design: typeof prev === "string" ? prev : "", actual: "" };
    onChange({ ...(metadata || {}), [key]: { ...prevObj, [subField]: val } });
  };

  const nextUnusedKey = () => {
    const used = new Set(Object.keys(metadata || {}).map((k) => k.toLowerCase()));
    const suggested = suggestions.find((k) => !used.has(k.toLowerCase()));
    if (suggested) return suggested;
    let key = "field"; let i = 1;
    while ((metadata || {})[key] !== undefined) key = `field_${++i}`;
    return key;
  };

  const addField = () => {
    const key = nextUnusedKey();
    onChange({ ...(metadata || {}), [key]: { design: "", actual: "" } });
  };
  const removeField = (key) => {
    const m = { ...(metadata || {}) }; delete m[key]; onChange(m);
  };

  const FieldKeyPicker = ({ currentKey }) => {
    const matchedSuggestion = suggestions.find((k) => k.toLowerCase() === currentKey.toLowerCase());
    const isListed = !!matchedSuggestion;
    const selectValue = isListed ? matchedSuggestion : "__current_custom__";

    const renameCustom = () => {
      const next = window.prompt("Enter new field/key parameter name:", isListed ? "" : currentKey);
      if (next === null) return;
      const clean = (next || "").trim();
      if (!clean) return;
      updateKey(currentKey, clean);
    };

    return (
      <select
        value={selectValue}
        onChange={(e) => {
          const v = e.target.value;
          if (v === "__enter_new__") {
            renameCustom();
            return;
          }
          if (v === "__current_custom__") return;
          updateKey(currentKey, v);
        }}
        onDoubleClick={() => {
          if (!isListed) renameCustom();
        }}
        title={isListed
          ? "Select from Global Key Parameters, or choose Custom / Enter New"
          : "Custom field. 打开 the list to choose a global key, or double-click to rename this custom field."
        }
        className={`text-xs px-2 py-1 border rounded w-1/3 min-w-[220px] font-mono bg-stone-50 focus:outline-none focus:border-amber-600 ${
          isListed ? "border-stone-300" : "border-amber-400 text-amber-800"
        }`}
      >
        {!isListed && <option value="__current_custom__">{currentKey}</option>}
        {suggestions.map((k) => <option key={k} value={k}>{k}</option>)}
        <option value="__enter_new__">Custom / Enter New...</option>
      </select>
    );
  };

  return (
    <div className="space-y-1.5">
      <div className="text-[10px] text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1">
        Field names use the full Global Key Parameters pull-down list. Choose from the list, or select Custom / Enter New to type a field not in the list.
      </div>

      {entries.length === 0 && (
        <div className="text-xs text-stone-500 italic py-2">
          No metadata yet. Click Add field, then choose from the pull-down list or type your own key parameter.
        </div>
      )}

      {entries.map(([key, val]) => {
        const valObj = (val && typeof val === "object") ? val : { design: typeof val === "string" ? val : "", actual: "" };
        return (
          <div key={key} className="space-y-1">
            <div className="flex gap-1.5 items-center">
              <FieldKeyPicker currentKey={key} />
              <button onClick={() => removeField(key)} className="text-stone-400 hover:text-red-600 p-1 ml-auto">
                <X size={12} />
              </button>
            </div>
            <div className="flex gap-1.5 items-center pl-1">
              <span className="text-[10px] text-stone-500 w-[90px] shrink-0 text-right pr-1">Design / Req.</span>
              <input
                type="text"
                value={valObj.design}
                onChange={(e) => updateValue(key, "design", e.target.value)}
                placeholder="Design or standard requirement"
                className="text-xs px-2 py-1 border border-stone-300 rounded flex-1 focus:outline-none focus:border-amber-600"
              />
            </div>
            <div className="flex gap-1.5 items-center pl-1 pb-1 border-b border-stone-100">
              <span className="text-[10px] text-stone-500 w-[90px] shrink-0 text-right pr-1">Actual</span>
              <input
                type="text"
                value={valObj.actual}
                onChange={(e) => updateValue(key, "actual", e.target.value)}
                placeholder="Actual value"
                className="text-xs px-2 py-1 border border-stone-300 rounded flex-1 focus:outline-none focus:border-amber-600"
              />
            </div>
          </div>
        );
      })}
      <button onClick={addField} className="text-[11px] text-stone-600 hover:text-amber-700 flex items-center gap-1 mt-1">
        <Plus size={11} /> Add field
      </button>
    </div>
  );
};

/* =============================================================================
 * UI: SEARCH PANEL
 * =============================================================================
 */
const 搜索Panel = ({ index, refMap, getPathFor, on打开Doc, onJumpToNode }) => {
  const [q, setQ] = useState("");
  const [showUnref, setShowUnref] = useState(false);

  const results = useMemo(() => {
    const words = q.trim().toLowerCase().split(/\s+/).filter(Boolean);
    let pool = index;
    if (showUnref) pool = pool.filter((d) => !(refMap.get(d.id)?.length));
    if (!words.length) return pool;
    return pool.filter((entry) => {
      const haystack = [
        entry.id,
        entry.name || "",
        entry.sn || "",
        ...Object.keys(entry.metadata || {}),
        ...Object.values(entry.metadata || {}).map((v) => {
          if (v && typeof v === "object") return `${v.design || ""} ${v.actual || ""}`;
          return String(v);
        }),
      ].join(" ").toLowerCase();
      return words.every((w) => haystack.includes(w));
    });
  }, [q, index, refMap, showUnref]);

  const unrefCount = useMemo(
    () => index.filter((d) => !(refMap.get(d.id)?.length)).length,
    [index, refMap]
  );

  return (
    <div className="p-3 space-y-2">
      <div className="relative">
        <搜索 size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400" />
        <input
          type="text"
          value={q}
          onChange={(e) => setQ(e.target.value)}
          placeholder="搜索 by ID, name, or metadata…"
          className="w-full pl-8 pr-3 py-1.5 text-xs border border-stone-300 rounded focus:outline-none focus:border-amber-600"
        />
      </div>
      <div className="flex items-center justify-between">
        <label className="flex items-center gap-1.5 text-[11px] text-stone-600 cursor-pointer">
          <input
            type="checkbox"
            checked={showUnref}
            onChange={(e) => setShowUnref(e.target.checked)}
          />
          Show only unreferenced
          {unrefCount > 0 && (
            <span className="text-[10px] tabular-nums px-1 bg-amber-100 text-amber-800 rounded">
              {unrefCount}
            </span>
          )}
        </label>
        <span className="text-[11px] text-stone-500">
          {q.trim()
            ? `${results.length} of ${showUnref ? unrefCount : index.length} match`
            : `${results.length} document${results.length === 1 ? "" : "s"}`}
        </span>
      </div>
      <div className="space-y-1 max-h-[60vh] overflow-auto">
        {results.map((r) => {
          const refs = refMap.get(r.id) || [];
          return (
            <div
              key={r.id}
              className="border border-stone-200 rounded p-2 text-xs hover:bg-amber-50 hover:border-amber-300 cursor-pointer"
              title="Click to open · Double-click to go to node"
              onClick={() => on打开Doc(r.id)}
              onDoubleClick={(e) => { e.preventDefault(); refs[0] && onJumpToNode(refs[0]); }}
            >
              <div className="font-medium text-stone-800 truncate">{r.name}</div>
              <div className="font-mono text-[10px] text-stone-500 mt-0.5">{r.id}</div>
              {refs.length === 0 && (
                <div className="text-[10px] text-amber-700 mt-0.5 italic">unreferenced</div>
              )}
              {refs.map((nodeId) => (
                <div
                  key={nodeId}
                  className="text-[10px] text-amber-700 mt-0.5 truncate hover:underline"
                  onClick={(e) => { e.stopPropagation(); onJumpToNode(nodeId); }}
                >
                  📁 {getPathFor(nodeId)}
                </div>
              ))}
              {Object.keys(r.metadata || {}).length > 0 && (
                <div className="flex flex-wrap gap-1 mt-1">
                  {Object.entries(r.metadata).map(([k, v]) => {
                    const valObj = (v && typeof v === "object") ? v : { design: String(v), actual: "" };
                    return (
                      <span key={k} className="text-[9px] bg-stone-100 px-1.5 py-0.5 rounded font-mono">
                        {k}: {valObj.design || "—"} / {valObj.actual || "—"}
                      </span>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* =============================================================================
 * UI: DATABOOK PANEL
 * ---------------------------------------------------------------------------
 * A third sidebar tab. Renders the entire tree with checkboxes for every
 * document. Lets the user pick what to include, then generates a PDF.
 *
 * Selection state is held as: Map<nodeId, Set<docId>>
 *   — a doc selected at multiple linked nodes counts separately, so the
 *     databook will include it once per linked node (matching how the user
 *     organized them).
 * =============================================================================
 */
const DatabookPanel = ({ tree, docIndex, getPathFor, formatBytes }) => {
  // Map<nodeId, Set<docId>>
  const [selection, setSelection] = useState(new Map());
  const [expanded, setExpanded] = useState(new Set());
  const [generating, setGenerating] = useState(false);
  const [showTitleDialog, setShowTitleDialog] = useState(false);
  const [title, setTitle] = useState("Engineering Databook");
  const [subtitle, setSubtitle] = useState("");
  const [error, setError] = useState(null);

  const docsById = useMemo(() => new Map(docIndex.map((d) => [d.id, d])), [docIndex]);

  // Auto-expand the root node once the tree is available
  useEffect(() => {
    if (tree && tree.id && !expanded.has(tree.id)) {
      setExpanded((prev) => new Set([...prev, tree.id]));
    }
  }, [tree?.id]);

  // Load persisted selection (so iterating on a databook is easy)
  useEffect(() => {
    try {
      const saved = localStorage.getItem("dms:databook-selection");
      if (saved) {
        const obj = JSON.parse(saved);
        const m = new Map();
        for (const [nid, docs] of Object.entries(obj)) m.set(nid, new Set(docs));
        setSelection(m);
      }
      const t = localStorage.getItem("dms:databook-title");
      if (t) setTitle(t);
      const s = localStorage.getItem("dms:databook-subtitle");
      if (s) setSubtitle(s);
    } catch {}
  }, []);

  // Persist selection on change
  useEffect(() => {
    const obj = {};
    for (const [nid, docs] of selection) obj[nid] = Array.from(docs);
    try {
      localStorage.setItem("dms:databook-selection", JSON.stringify(obj));
    } catch {}
  }, [selection]);

  const toggleExpand = (id) =>
    setExpanded((prev) => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id);
      else n.add(id);
      return n;
    });

  const isDocSelected = (nodeId, docId) =>
    !!selection.get(nodeId)?.has(docId);

  const toggleDoc = (nodeId, docId) => {
    setSelection((prev) => {
      const next = new Map(prev);
      const set = new Set(next.get(nodeId) || []);
      if (set.has(docId)) set.delete(docId);
      else set.add(docId);
      if (set.size === 0) next.delete(nodeId);
      else next.set(nodeId, set);
      return next;
    });
  };

  // Node-level selection state: returns "all" | "some" | "none"
  // considering the docs directly attached to this node (NOT descendants).
  const nodeOwnState = (node) => {
    const docs = node.documents || [];
    if (docs.length === 0) return "none";
    const sel = selection.get(node.id);
    if (!sel || sel.size === 0) return "none";
    const allSelected = docs.every((d) => sel.has(d.id));
    return allSelected ? "all" : "some";
  };

  const setNodeAll = (node, on) => {
    setSelection((prev) => {
      const next = new Map(prev);
      const allDocIds = (node.documents || []).map((d) => d.id);
      if (on) {
        next.set(node.id, new Set(allDocIds));
      } else {
        next.delete(node.id);
      }
      return next;
    });
  };

  // Recursive: select all (or none) in this node + all descendants
  const setSubtreeAll = (node, on) => {
    setSelection((prev) => {
      const next = new Map(prev);
      const walk = (n) => {
        const ids = (n.documents || []).map((d) => d.id);
        if (on && ids.length) next.set(n.id, new Set(ids));
        else if (!on) next.delete(n.id);
        (n.children || []).forEach(walk);
      };
      walk(node);
      return next;
    });
  };

  const totalSelected = useMemo(() => {
    let n = 0;
    for (const set of selection.values()) n += set.size;
    return n;
  }, [selection]);

  const clearAll = () => setSelection(new Map());
  const selectAll = () => tree && setSubtreeAll(tree, true);

  // Build the ordered selection payload: tree-order traversal, only include
  // nodes that have selected docs.
  const buildPayload = () => {
    if (!tree) return [];
    const out = [];
    const walk = (node) => {
      const set = selection.get(node.id);
      if (set && set.size) {
        // Preserve the original order of documents attached to this node
        const orderedIds = (node.documents || [])
          .map((d) => d.id)
          .filter((id) => set.has(id));
        if (orderedIds.length) out.push({ nodeId: node.id, docIds: orderedIds });
      }
      (node.children || []).forEach(walk);
    };
    walk(tree);
    return out;
  };

  const generate = async () => {
    setError(null);
    setGenerating(true);
    try {
      const payload = {
        title: title.trim() || "Engineering Databook",
        subtitle: subtitle.trim(),
        selection: buildPayload(),
      };
      try {
        localStorage.setItem("dms:databook-title", title);
        localStorage.setItem("dms:databook-subtitle", subtitle);
      } catch {}

      const res = await fetch("/api/databook", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = (title.trim() || "Databook") + ".pdf";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setShowTitleDialog(false);
    } catch (e) {
      setError(e.message);
    } finally {
      setGenerating(false);
    }
  };

  // Render one node row
  const renderNode = (node, depth = 0) => {
    const isExpanded = expanded.has(node.id);
    const hasChildren = (node.children || []).length > 0;
    const docs = node.documents || [];
    const ownState = nodeOwnState(node);

    return (
      <div key={node.id}>
        <div
          onClick={() => hasChildren && toggleExpand(node.id)}
          className={`flex items-center gap-1.5 py-1 pr-2 text-xs hover:bg-stone-50 ${
            hasChildren ? "cursor-pointer" : ""
          }`}
          style={{ paddingLeft: `${depth * 14 + 4}px` }}
        >
          <span className="w-3.5 flex items-center justify-center text-stone-500">
            {hasChildren ? (
              isExpanded ? <ChevronDown size={12} /> : <ChevronRight size={12} />
            ) : <span className="w-2.5" />}
          </span>

          <button
            onClick={(e) => {
              e.stopPropagation();
              setNodeAll(node, ownState !== "all");
            }}
            disabled={docs.length === 0}
            className={`shrink-0 p-0.5 ${
              docs.length === 0 ? "opacity-25 cursor-not-allowed text-stone-400"
                : "text-amber-700 hover:text-amber-900"
            }`}
            title={
              docs.length === 0
                ? "No documents directly attached to this node"
                : ownState === "all" ? "Deselect all docs in this node" : "Select all docs in this node"
            }
          >
            {ownState === "all" ? <CheckSquare size={13} />
              : ownState === "some" ? <MinusSquare size={13} />
              : <Square size={13} />}
          </button>

          <文件夹 size={13} className="text-amber-700 shrink-0" />
          <span className="truncate flex-1 text-stone-800">{node.name}</span>

          {docs.length > 0 && (
            <span className="text-[10px] tabular-nums px-1 bg-stone-100 text-stone-600 rounded">
              {docs.length}
            </span>
          )}

          {hasChildren && (
            <button
              onClick={(e) => {
                e.stopPropagation();
                setSubtreeAll(node, true);
              }}
              className="text-[9px] uppercase tracking-wider text-stone-400 hover:text-amber-700 px-1"
              title="Select all documents in this entire subtree"
            >
              all↓
            </button>
          )}
        </div>

        {/* 文件s at this node */}
        {isExpanded && docs.map((ref) => {
          const doc = docsById.get(ref.id);
          if (!doc) return null;
          const sel = isDocSelected(node.id, ref.id);
          return (
            <div
              key={node.id + ":" + ref.id}
              onClick={() => toggleDoc(node.id, ref.id)}
              className={`flex items-center gap-1.5 py-0.5 pr-2 text-xs cursor-pointer ${
                sel ? "bg-amber-50" : "hover:bg-stone-50"
              }`}
              style={{ paddingLeft: `${(depth + 1) * 14 + 12}px` }}
            >
              <span className="text-stone-400 shrink-0">
                {sel ? <CheckSquare size={12} className="text-amber-700" /> : <Square size={12} />}
              </span>
              {doc.mime?.startsWith("image/")
                ? <ImageIcon size={11} className="text-stone-500 shrink-0" />
                : <FileText size={11} className="text-stone-500 shrink-0" />}
              <span className="truncate text-stone-700">{doc.name}</span>
              <span className="text-[10px] text-stone-400 shrink-0 font-mono">
                {formatBytes(doc.size)}
              </span>
            </div>
          );
        })}

        {/* Children */}
        {isExpanded && (node.children || []).map((c) => renderNode(c, depth + 1))}
      </div>
    );
  };

  if (!tree) return null;

  return (
    <div className="flex flex-col h-full">
      {/* Toolbar */}
      <div className="border-b border-stone-200 p-2 space-y-2">
        <div className="flex gap-1">
          <button
            onClick={selectAll}
            className="flex-1 text-[11px] px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded"
          >
            Select all
          </button>
          <button
            onClick={clearAll}
            disabled={totalSelected === 0}
            className="flex-1 text-[11px] px-2 py-1 border border-stone-300 hover:bg-stone-100 rounded disabled:opacity-40"
          >
            Clear
          </button>
        </div>
        <div className="text-[11px] text-stone-600 flex items-center justify-between">
          <span>
            <span className="font-mono tabular-nums">{totalSelected}</span> document
            {totalSelected === 1 ? "" : "s"} selected
          </span>
        </div>
      </div>

      {/* Tree */}
      <div className="flex-1 overflow-auto py-1">
        {renderNode(tree)}
      </div>

      {/* Generate button */}
      <div className="border-t border-stone-200 p-2">
        <button
          onClick={() => setShowTitleDialog(true)}
          disabled={totalSelected === 0}
          className="w-full px-3 py-2 bg-amber-600 hover:bg-amber-700 text-white text-xs font-medium rounded disabled:opacity-40 flex items-center justify-center gap-1.5"
        >
          <Download size={12} /> Generate databook
        </button>
        <div className="text-[10px] text-stone-500 text-center mt-1.5 leading-tight">
          Builds a single PDF with cover, table of contents,<br />
          section headers, bookmarks, and page numbers.
        </div>
      </div>

      {/* Title/subtitle dialog */}
      {showTitleDialog && (
        <div
          className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"
          onClick={() => !generating && setShowTitleDialog(false)}
        >
          <div
            className="bg-white w-full max-w-md rounded shadow-2xl p-5"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500 mb-1">
              Generate Databook
            </div>
            <h2 className="text-lg font-semibold text-stone-900 mb-3">
              Cover page details
            </h2>

            <label className="block text-xs uppercase tracking-wider text-stone-600 mb-1.5">
              Title
            </label>

/* =============================================================================

 * =============================================================================
 */
const KeyParametersDialog = ({ open, keyParameters, on保存, on关闭 }) => {
  const [draft, setDraft] = useState([]);
  const [newItem, setNewItem] = useState("");

  useEffect(() => {
    if (open) {
      const list = normalizeKeyParameters(keyParameters?.length ? keyParameters : DEFAULT_KEY_PARAMETERS);
      setDraft(list);
      setNewItem("");
    }
  }, [open, keyParameters]);

  if (!open) return null;

  const add = () => {
    const item = newItem.trim();
    if (!item) return;
    setDraft((prev) => normalizeKeyParameters([...prev, item]));
    setNewItem("");
  };

  const remove = (idx) => setDraft((prev) => prev.filter((_, i) => i !== idx));
  const update = (idx, val) => {
    setDraft((prev) => prev.map((x, i) => i === idx ? val : x));
  };
  const move = (idx, delta) => {
    const next = [...draft];
    const j = idx + delta;
    if (j < 0 || j >= next.length) return;
    [next[idx], next[j]] = [next[j], next[idx]];
    setDraft(next);
  };

  const save = () => {
    const pending = newItem.trim();
    const items = pending ? [...draft, pending] : draft;
    on保存(normalizeKeyParameters(items));
  };

  return (
    <div
      className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"
      onClick={on关闭}
    >
      <div
        className="bg-white w-full max-w-lg rounded shadow-2xl p-5"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500 mb-1">
          Project Settings
        </div>
        <h2 className="text-lg font-semibold text-stone-900 mb-2">
          Global Key Parameters
        </h2>
        <p className="text-xs text-stone-600 mb-3">
          These names appear as pull-down suggestions when adding metadata fields to any attached document.
          Users can still type custom field names that are not in this list.
        </p>

        <div className="flex gap-2 mb-3">
          <input
            type="text"
            value={newItem}
            onChange={(e) => setNewItem(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") add(); }}
            placeholder="e.g. contract_number"
            className="flex-1 px-2 py-1.5 text-sm border border-stone-300 rounded font-mono focus:outline-none focus:border-amber-600"
            autoFocus
          />
          <button
            onClick={add}
            className="px-3 py-1.5 text-xs bg-amber-600 hover:bg-amber-700 text-white rounded flex items-center gap-1"
          >
            <Plus size={12} /> Add
          </button>
        </div>

        <div className="border border-stone-200 rounded max-h-72 overflow-auto mb-3">
          {draft.length === 0 && (
            <div className="text-xs text-stone-500 italic p-3">No key parameters yet.</div>
          )}
          {draft.map((item, idx) => (
            <div key={idx} className="flex items-center gap-1.5 p-2 border-b border-stone-100 last:border-b-0">
              <input
                type="text"
                value={item}
                onChange={(e) => update(idx, e.target.value)}
                className="flex-1 text-xs px-2 py-1 border border-stone-300 rounded font-mono focus:outline-none focus:border-amber-600"
              />
              <button
                onClick={() => move(idx, -1)}
                disabled={idx === 0}
                className="text-[10px] px-2 py-1 border border-stone-300 rounded disabled:opacity-30 hover:bg-stone-100"
                title="Move up"
              >
                ↑
              </button>
              <button
                onClick={() => move(idx, 1)}
                disabled={idx === draft.length - 1}
                className="text-[10px] px-2 py-1 border border-stone-300 rounded disabled:opacity-30 hover:bg-stone-100"
                title="Move down"
              >
                ↓
              </button>
              <button onClick={() => remove(idx)} className="text-stone-400 hover:text-red-600 p-1">
                <X size={13} />
              </button>
            </div>
          ))}
        </div>

        <div className="flex items-center justify-between gap-2">
          <button
            onClick={() => setDraft(DEFAULT_KEY_PARAMETERS)}
            className="px-3 py-1.5 text-xs border border-stone-300 hover:bg-stone-100 rounded"
          >
            Restore defaults
          </button>
          <div className="flex gap-2">
            <button
              onClick={on关闭}
              className="px-4 py-1.5 text-xs border border-stone-300 hover:bg-stone-100 rounded"
            >
              取消
            </button>
            <button
              onClick={save}
              className="px-4 py-1.5 text-xs bg-amber-600 hover:bg-amber-700 text-white rounded"
            >
              保存 key parameters
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

const ProjectMenu = ({ open, on关闭, onProjectChanged, on打开KeyParameters }) => {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [importDialog, setImportDialog] = useState(null); // { file, mode, target }
  const [newDialog, setNewDialog] = useState(null);       // { target }
  const [pwDialog, setPwDialog] = useState(null);         // { current, next, confirm, hasExisting }
  const [authStatus, setAuthStatus] = useState(null);
  const importFileRef = useRef(null);

  const isMac = typeof navigator !== "undefined" && /Mac|iPhone|iPad/.test(navigator.platform);
  const exampleNew = isMac
    ? "/Users/yourname/DMS_Project_2"
    : "C:\\DMS_Project_2";

  // Load auth status when menu opens
  useEffect(() => {
    if (!open) return;
    fetch("/api/auth/status")
      .then((r) => r.json())
      .then((s) => setAuthStatus(s))
      .catch(() => setAuthStatus(null));
  }, [open]);

  const doExport = async () => {
    setError(null);
    setBusy(true);
    try {
      const res = await fetch("/api/project/export");
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }
      const blob = await res.blob();
      const cd = res.headers.get("Content-Disposition") || "";
      const m = cd.match(/filename="?([^"]+)"?/);
      const filename = m ? m[1] : "project.dms";
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      on关闭();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  const triggerImportPicker = () => importFileRef.current?.click();

  const onImportFileChosen = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportDialog({ file, mode: "new", target: "" });
    e.target.value = "";
  };

  const doImport = async () => {
    if (!importDialog) return;
    setError(null);
    setBusy(true);
    try {
      const form = new FormData();
      form.append("file", importDialog.file);
      form.append("target_path", importDialog.target);
      form.append("mode", importDialog.mode);
      const res = await fetch("/api/project/import", { method: "POST", body: form });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }
      const data = await res.json();
      setImportDialog(null);
      onProjectChanged(data.imported_to);
      on关闭();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  const doNewProject = async () => {
    if (!newDialog) return;
    setError(null);
    setBusy(true);
    try {
      const res = await fetch("/api/project/new", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ target_path: newDialog.target }),
      });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }
      const data = await res.json();
      setNewDialog(null);
      onProjectChanged(data.storage_path);
      on关闭();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  const openPasswordDialog = () => {
    setPwDialog({
      current: "",
      next: "",
      confirm: "",
      hasExisting: !!authStatus?.password_required,
    });
  };

  const do保存Password = async () => {
    if (!pwDialog) return;
    if (pwDialog.next !== pwDialog.confirm) {
      setError("New password and confirmation don't match.");
      return;
    }
    setError(null);
    setBusy(true);
    try {
      const res = await fetch("/api/auth/set-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          current_password: pwDialog.current,
          new_password: pwDialog.next,
        }),
      });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }
      setPwDialog(null);
      on关闭();
      // Refresh status — but stay on the page since the cookie is renewed
      window.location.reload();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  const doLogout = async () => {
    setError(null);
    setBusy(true);
    try {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.reload();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  // Click-outside to close. Stash on关闭 in a ref so the effect doesn't
  // re-attach on every parent render — just attach once when `open` flips true.
  const on关闭Ref = useRef(on关闭);
  useEffect(() => { on关闭Ref.current = on关闭; }, [on关闭]);

  useEffect(() => {
    if (!open) return;
    const close = () => on关闭Ref.current?.();
    const t = setTimeout(() => window.addEventListener("click", close), 0);
    return () => { clearTimeout(t); window.removeEventListener("click", close); };
  }, [open]);

  if (!open) return null;

  return (
    <>
      {/* Hidden file input for the Import action */}
      <input
        ref={importFileRef}
        type="file"
        accept=".dms,.zip,application/zip"
        className="hidden"
        onChange={onImportFileChosen}
      />

      {/* Dropdown */}
      {!importDialog && !newDialog && (

function Root() {
  const [phase, setPhase] = useState("loading"); // 'loading' | 'setup' | 'change' | 'ready'
  const [storagePath, setStoragePath] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const s = await StorageAdapter.getSettings();
        if (s.configured && s.exists && s.writable) {
          setStoragePath(s.resolved_path);
          setPhase("ready");
        } else {
          setPhase("setup");
        }
      } catch (e) {
        console.error("Could not reach the DMS server:", e);
        // Show the setup screen anyway — it has clearer error feedback
        setPhase("setup");
      }
    })();
  }, []);

  const handle保存d = (resolvedPath) => {
    setStoragePath(resolvedPath);
    setPhase("ready");
  };

  const handleChange文件夹 = () => setPhase("change");
  const cancelChange = () => setPhase("ready");

  if (phase === "loading") {
    return (
      <div className="h-screen flex items-center justify-center bg-stone-50 text-stone-500 text-sm">
        Connecting to DMS server…
      </div>
    );
  }

  if (phase === "setup") {
    return <SettingsScreen isInitialSetup={true} on保存d={handle保存d} />;
  }

  if (phase === "change") {
    return (
      <SettingsScreen
        isInitialSetup={false}
        initialPath={storagePath}
        currentPath={storagePath}
        on保存d={handle保存d}
        on取消={cancelChange}
      />
    );
  }

  return <DMS storagePath={storagePath} onChange文件夹={handleChange文件夹} />;
}

/* =============================================================================
 * UI: LINK PICKER MODAL
 * ---------------------------------------------------------------------------
 * Lets the user link an existing document to the current node. Two tabs:
 *   • 搜索 — type a query, see matches across all documents
 *   • Browse — walk the tree and see what's attached to each node
 * 文件s already linked to the current node are shown but disabled.
 * =============================================================================
 */
const LinkPicker = ({
  open, on关闭, onLink,
  docIndex, tree, refMap, currentNodeId, currentNodeName,
  formatBytes, getPathFor,
}) => {
  const [tab, setTab] = useState("search");
  const [q, setQ] = useState("");
  const [browseNodeId, setBrowseNodeId] = useState(null);
  const [selectedIds, setSelectedIds] = useState(new Set());

  useEffect(() => {
    if (open) {
      setQ("");
      setBrowseNodeId(tree?.id || null);
      setSelectedIds(new Set());
      setTab("search");
    }
  }, [open, tree]);

  if (!open) return null;

  // 文件s already linked to the current node — shown but not selectable
  const alreadyLinkedHere = new Set(
    (findNode(tree, currentNodeId)?.documents || []).map((d) => d.id)
  );

  const matchesQuery = (entry, words) => {
    if (!words.length) return true;
    const haystack = [
      entry.id,
      entry.name || "",
      ...Object.keys(entry.metadata || {}),
      ...Object.values(entry.metadata || {}).map((v) => {
        if (v && typeof v === "object") return `${v.design || ""} ${v.actual || ""}`;
        return String(v);
      }),
    ].join(" ").toLowerCase();
    return words.every((w) => haystack.includes(w));
  };

  const searchWords = q.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const searchResults = docIndex.filter((d) => matchesQuery(d, searchWords));

  // Browse mode: docs attached to the currently-browsed node
  const browseNode = browseNodeId ? findNode(tree, browseNodeId) : null;
  const browseDocs = browseNode
    ? (browseNode.documents || [])
        .map((ref) => docIndex.find((e) => e.id === ref.id))
        .filter(Boolean)
    : [];

  const toggleSelect = (id) => {
    if (alreadyLinkedHere.has(id)) return;
    setSelectedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const commit = async () => {
    for (const id of selectedIds) await onLink(id);
    on关闭();
  };

  const renderRow = (doc) => {
    const refs = refMap.get(doc.id) || [];
    const linkedHere = alreadyLinkedHere.has(doc.id);
    const selected = selectedIds.has(doc.id);
    return (
      <div
        key={doc.id}
        onClick={() => toggleSelect(doc.id)}
        className={`flex items-center gap-2 p-2 border rounded text-xs cursor-pointer transition-colors ${
          linkedHere
            ? "border-stone-200 bg-stone-50 opacity-60 cursor-not-allowed"
            : selected
              ? "border-amber-500 bg-amber-50"
              : "border-stone-200 hover:bg-stone-50 hover:border-stone-300"
        }`}
      >
        <input
          type="checkbox"
          readOnly
          disabled={linkedHere}
          checked={selected || linkedHere}
          className="shrink-0"
        />
        <div className="flex-1 min-w-0">
          <div className="font-medium text-stone-900 truncate">{doc.name}</div>
          <div className="text-[10px] font-mono text-stone-500 mt-0.5 flex flex-wrap gap-2">
            <span>{doc.id}</span>
            <span>· {formatBytes(doc.size)}</span>
            {refs.length === 0 && <span className="text-amber-700">· unreferenced</span>}
            {refs.length > 0 && <span>· linked from {refs.length} node{refs.length === 1 ? "" : "s"}</span>}
            {linkedHere && <span className="text-stone-700 font-semibold">· already linked here</span>}
          </div>
        </div>
      </div>
    );
  };

  // Recursive tree renderer for the Browse tab
  const renderBrowseTree = (node, depth = 0) => {
    const docCount = (node.documents || []).length;
    const isCurrent = node.id === browseNodeId;
    return (
      <div key={node.id}>
        <div
          onClick={() => setBrowseNodeId(node.id)}
          className={`flex items-center gap-1.5 py-1 px-2 cursor-pointer text-xs border-l-2 ${
            isCurrent
              ? "bg-amber-50 border-amber-600 text-stone-900"
              : "border-transparent text-stone-700 hover:bg-stone-100"
          }`}
          style={{ paddingLeft: `${depth * 12 + 8}px` }}
        >
          <文件夹 size={12} className="text-amber-700 shrink-0" />
          <span className="truncate flex-1">{node.name}</span>
          {docCount > 0 && (
            <span className="text-[9px] tabular-nums px-1 bg-stone-200 rounded">{docCount}</span>
          )}
        </div>
        {(node.children || []).map((c) => renderBrowseTree(c, depth + 1))}
      </div>
    );
  };

  return (
    <div
      className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"
      onClick={on关闭}
    >
      <div
        className="bg-white w-full max-w-3xl h-[80vh] rounded shadow-2xl flex flex-col"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="px-4 py-3 border-b border-stone-200">
          <div className="flex items-center justify-between">
            <div>
              <div className="text-sm font-semibold text-stone-900">Link existing document</div>
              <div className="text-[11px] text-stone-500">
                Adding to: <span className="font-mono">{currentNodeName}</span>
              </div>
            </div>
            <button
              onClick={on关闭}
              className="text-stone-500 hover:text-stone-900 p-1"
            >
              <X size={16} />
            </button>
          </div>
          <div className="flex gap-1 mt-3 text-xs">
            <button
              onClick={() => setTab("search")}
              className={`px-3 py-1.5 rounded ${
                tab === "search"
                  ? "bg-stone-900 text-white"
                  : "border border-stone-300 text-stone-700 hover:bg-stone-100"
              }`}
            >
              搜索
            </button>
            <button
              onClick={() => setTab("browse")}
              className={`px-3 py-1.5 rounded ${
                tab === "browse"
                  ? "bg-stone-900 text-white"
                  : "border border-stone-300 text-stone-700 hover:bg-stone-100"
              }`}
            >
              Browse tree
            </button>
          </div>
        </div>

        <div className="flex-1 overflow-hidden flex">
          {tab === "search" && (
            <div className="flex-1 flex flex-col p-3 gap-2 overflow-hidden">
              <div className="relative shrink-0">
                <搜索
                  size={14}
                  className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400"
                />
                <input
                  type="text"
                  autoFocus
                  value={q}
                  onChange={(e) => setQ(e.target.value)}
                  placeholder="搜索 by ID, filename, or metadata…"
                  className="w-full pl-8 pr-3 py-1.5 text-xs border border-stone-300 rounded focus:outline-none focus:border-amber-600"
                />
              </div>
              <div className="text-[11px] text-stone-500 shrink-0">
                {searchResults.length} document{searchResults.length === 1 ? "" : "s"} in repository
              </div>
              <div className="flex-1 overflow-auto space-y-1.5">
                {searchResults.length === 0 && (
                  <div className="text-xs text-stone-500 italic text-center py-8">
                    {docIndex.length === 0
                      ? "No documents have been uploaded yet. 上传 one first, then come back here to link it elsewhere."
                      : "No documents match your search."}
                  </div>
                )}
                {searchResults.map(renderRow)}
              </div>
            </div>
          )}

          {tab === "browse" && (
            <>
              <div className="w-1/3 border-r border-stone-200 overflow-auto">
                {tree && renderBrowseTree(tree)}
              </div>
              <div className="flex-1 p-3 overflow-auto">
                {browseNode && (
                  <>
                    <div className="text-[11px] font-mono text-stone-500 mb-2">
                      {getPathFor(browseNode.id)}
                    </div>
                    <div className="text-xs uppercase tracking-wider text-stone-600 mb-2">
                      文件s attached
                    </div>
                    <div className="space-y-1.5">
                      {browseDocs.length === 0 && (
                        <div className="text-xs text-stone-500 italic">
                          No documents attached to this node.
                        </div>
                      )}
                      {browseDocs.map(renderRow)}
                    </div>
                  </>
                )}
              </div>
            </>
          )}
        </div>

        <div className="px-4 py-3 border-t border-stone-200 flex items-center justify-between">
          <div className="text-xs text-stone-600">
            {selectedIds.size > 0
              ? `${selectedIds.size} document${selectedIds.size === 1 ? "" : "s"} selected`
              : "Select one or more documents to link"}
          </div>
          <div className="flex gap-2">
            <button
              onClick={on关闭}
              className="px-4 py-1.5 text-xs border border-stone-300 hover:bg-stone-100 rounded"
            >
              取消
            </button>
            <button
              onClick={commit}
              disabled={selectedIds.size === 0}
              className="px-4 py-1.5 text-xs bg-amber-600 hover:bg-amber-700 text-white rounded disabled:opacity-40"
            >
              Link {selectedIds.size > 0 ? `(${selectedIds.size})` : ""}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};
