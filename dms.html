 * =============================================================================
 */
const CombineFolderModal = ({ node, docIndex, formatBytes, onClose, onSaved }) => {
  const [includeSubfolders, setIncludeSubfolders] = useState(false);
  const [title, setTitle] = useState(node.name || "Combined Documents");
  const [selectedKeys, setSelectedKeys] = useState(new Set());
  const [generating, setGenerating] = useState(false);
  const [error, setError] = useState(null);

  const docsById = useMemo(() => new Map(docIndex.map((d) => [d.id, d])), [docIndex]);

  const docEntries = useMemo(() => {
    const entries = [];
    for (const d of (node.documents || [])) {
      entries.push({ nodeId: node.id, docId: d.id, nodeName: node.name });
    }
    if (includeSubfolders) {
      const walkChildren = (n) => {
        for (const child of (n.children || [])) {
          for (const d of (child.documents || [])) {
            entries.push({ nodeId: child.id, docId: d.id, nodeName: child.name });
          }
          walkChildren(child);
        }
      };
      walkChildren(node);
    }
    return entries;
  }, [node, includeSubfolders]);

  useEffect(() => {
    setSelectedKeys(new Set(docEntries.map((e) => e.nodeId + ":" + e.docId)));
  }, [docEntries]);

  const toggle = (nodeId, docId) => {
    const k = nodeId + ":" + docId;
    setSelectedKeys((prev) => {
      const n = new Set(prev);
      if (n.has(k)) n.delete(k); else n.add(k);
      return n;
    });
  };

  const generate = async () => {
    setError(null);
    setGenerating(true);
    try {
      const nodeDocMap = new Map();
      for (const e of docEntries) {
        if (selectedKeys.has(e.nodeId + ":" + e.docId)) {
          if (!nodeDocMap.has(e.nodeId)) nodeDocMap.set(e.nodeId, []);
          nodeDocMap.get(e.nodeId).push(e.docId);
        }
      }
      const selection = Array.from(nodeDocMap.entries()).map(([nodeId, docIds]) => ({ nodeId, docIds }));
      if (!selection.length) { setError("请至少选择一份文档"); setGenerating(false); return; }

      const res = await fetch("/api/docs/combine-to-folder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          node_id: node.id,
          title: title.trim() || node.name,
          selection,
        }),
      });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }
      await res.json();
      onSaved();
    } catch (e) {
      setError(e.message);
    } finally {
      setGenerating(false);
    }
  };

  return (
    <div
      className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"
      onClick={() => !generating && onClose()}
    >
      <div
        className="bg-white w-full max-w-lg rounded shadow-2xl flex flex-col max-h-[88vh]"
        onClick={(e) => e.stopPropagation()}
      >
        {/* Header */}
        <div className="flex items-center justify-between px-5 pt-5 pb-3 border-b border-stone-200">
          <div>
            <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500 mb-0.5">合并文档</div>
            <h2 className="text-base font-semibold text-stone-900">{node.name}</h2>
          </div>
          <button onClick={onClose} disabled={generating} className="text-stone-400 hover:text-stone-700 p-1">
            <X size={16} />
          </button>
        </div>

        {/* Options */}
        <div className="px-5 py-3 border-b border-stone-200 space-y-3">
          <div>
            <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-1">输出文件名</label>
            <input
              type="text"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              className="w-full text-sm border border-stone-300 rounded px-2 py-1.5 focus:outline-none focus:border-amber-500"
              placeholder="合并文档标题"
            />
          </div>
          <label className="flex items-center gap-2 text-sm text-stone-700 cursor-pointer select-none">
            <input
              type="checkbox"
              checked={includeSubfolders}
              onChange={(e) => setIncludeSubfolders(e.target.checked)}
              className="accent-amber-600"
            />
            包含子文件夹中的文档
          </label>
        </div>

        {/* Document list */}
        <div className="flex-1 overflow-auto px-5 py-2">
          {docEntries.length === 0 ? (
            <div className="text-sm text-stone-500 py-6 text-center">
              {includeSubfolders ? "此文件夹及子文件夹中暂无文档" : "此文件夹中暂无文档"}
            </div>
          ) : (
            <>
              <div className="flex items-center justify-between mb-2">
                <span className="text-[11px] text-stone-500">
                  已选 <span className="font-mono tabular-nums">{selectedKeys.size}</span> / {docEntries.length} 份
                </span>
                <div className="flex gap-3">
                  <button
                    onClick={() => setSelectedKeys(new Set(docEntries.map((e) => e.nodeId + ":" + e.docId)))}
                    className="text-[11px] text-amber-700 hover:text-amber-900"
                  >全选</button>
                  <button
                    onClick={() => setSelectedKeys(new Set())}
                    className="text-[11px] text-stone-500 hover:text-stone-700"
                  >清除</button>
                </div>
              </div>
              <div className="space-y-0.5">
                {docEntries.map((entry) => {
                  const doc = docsById.get(entry.docId);
                  const k = entry.nodeId + ":" + entry.docId;
                  const checked = selectedKeys.has(k);
                  return (
                    <div
                      key={k}
                      onClick={() => toggle(entry.nodeId, entry.docId)}
                      className={`flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer text-sm ${checked ? "bg-amber-50" : "hover:bg-stone-50"}`}
                    >
                      <span className="shrink-0">
                        {checked
                          ? <CheckSquare size={13} className="text-amber-700" />
                          : <Square size={13} className="text-stone-400" />}
                      </span>
                      {doc?.mime?.startsWith("image/")
                        ? <ImageIcon size={12} className="text-stone-400 shrink-0" />
                        : <FileText size={12} className="text-stone-400 shrink-0" />}
                      <span className="truncate flex-1 text-stone-700">{doc?.name || entry.docId}</span>
                      {includeSubfolders && entry.nodeName !== node.name && (
                        <span className="text-[10px] text-stone-400 shrink-0 italic">{entry.nodeName}</span>
                      )}
                      {doc && (
                        <span className="text-[10px] text-stone-400 shrink-0 font-mono">{formatBytes(doc.size)}</span>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>

        {/* Footer */}
        <div className="px-5 py-4 border-t border-stone-200">
          {error && (
            <div className="text-xs text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2 mb-3">{error}</div>
          )}
          <button
            onClick={generate}
            disabled={generating || selectedKeys.size === 0}
            className="w-full px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white text-sm font-medium rounded disabled:opacity-40 flex items-center justify-center gap-2"
          >
            {generating ? <Loader size={14} className="animate-spin" /> : <Save size={14} />}
            {generating ? "合并中…" : `合并 ${selectedKeys.size} 份文档并保存至此文件夹`}
          </button>
          <p className="text-[10px] text-stone-500 text-center mt-1.5">
            合并后的 PDF 保存在当前文件夹，原始文档从文件夹中移除（文件仍保留在文件库中）
          </p>
        </div>
      </div>
    </div>
  );
};


const DocumentCard = ({
  doc, otherRefCount = 0, nodeSn = "",
  onOpen, onDelete, onUpdateMeta, onUpdateSn, formatBytes, keyParameters = [],
}) => {
  const [showMeta, setShowMeta] = useState(() => Object.keys(doc.metadata || {}).length > 0);
  const [editingSn, setEditingSn] = useState(false);
  const [snDraft, setSnDraft] = useState("");
  const isImage = doc.mime?.startsWith("image/");
  const Icon = isImage ? ImageIcon : FileText;

  // Effective SN: doc's own SN if set, otherwise the parent node's SN.
  const ownSn = (doc.sn || "").trim();
  const effectiveSn = ownSn || nodeSn;
  const isInherited = !ownSn && !!nodeSn;

  const startEditSn = (e) => {
    e.stopPropagation();
    setSnDraft(ownSn);
    setEditingSn(true);
  };
  const commitSn = () => {
    onUpdateSn(snDraft);
    setEditingSn(false);
  };
  const cancelSn = () => setEditingSn(false);

  return (
    <div className="border border-stone-200 rounded bg-white">
      <div className="flex items-center gap-3 p-3">
        <div className="w-10 h-10 bg-stone-100 rounded flex items-center justify-center text-stone-600 shrink-0">
          <Icon size={18} />
        </div>
        <div className="flex-1 min-w-0 cursor-pointer" onClick={onOpen}>
          <div className="text-sm font-medium text-stone-900 truncate hover:text-amber-700 flex items-center gap-1.5">
            {effectiveSn && (
              <span
                className={`text-xs font-mono px-1.5 py-0.5 rounded shrink-0 ${
                  isInherited
                    ? "bg-stone-100 text-stone-600 italic"
                    : "bg-amber-100 text-amber-800"
                }`}
                title={isInherited
                  ? `继承自父节点序列号：${nodeSn}\n点击下方 SN 按钮为此文档设置自定义序列号`
                  : `此文档的自定义序列号（覆盖节点序列号）`}
              >
                {effectiveSn}
              </span>
            )}
            <span className="truncate">{doc.name}</span>
          </div>
          <div className="flex gap-2 text-[11px] text-stone-500 font-mono mt-0.5 flex-wrap">
            <span className="flex items-center gap-1"><Hash size={9} /> {doc.id}</span>
            <span>•</span>
            <span>{formatBytes(doc.size)}</span>
            <span>•</span>
            <span className="flex items-center gap-1">
              <Calendar size={9} /> {doc.uploadedAt ? new Date(doc.uploadedAt).toLocaleDateString() : "—"}
            </span>
            {otherRefCount > 0 && (
              <>
                <span>•</span>
                <span className="text-amber-700 not-italic">
                  还被其他 {otherRefCount} 个节点引用
                </span>
              </>
            )}
          </div>
          {(() => {
            const loc = doc.metadata?.Location;
            const locStr = loc && typeof loc === "object" ? (loc.actual || loc.design) : (typeof loc === "string" ? loc : null);
            return locStr ? (
              <div className="flex items-center gap-1 text-[11px] text-stone-500 mt-0.5 font-sans">
                <MapPin size={9} className="text-amber-600 shrink-0" />
                <span className="truncate">{locStr}</span>
              </div>
            ) : null;
          })()}
        </div>

        {/* SN edit button */}
        <button
          onClick={startEditSn}
          className={`text-[10px] px-2 py-1 border rounded font-mono ${
            ownSn
              ? "border-amber-400 bg-amber-50 text-amber-800"
              : "border-stone-300 text-stone-600 hover:bg-stone-100"
          }`}
          title={
            ownSn
              ? "编辑此文档的自定义序列号"
              : nodeSn
                ? "用自定义序列号覆盖继承的序列号"
                : "为此文档设置自定义序列号"
          }
        >
          SN
        </button>

        <button
          onClick={() => setShowMeta(!showMeta)}
          className={`text-xs px-2 py-1 border rounded flex items-center gap-1 ${
            showMeta ? "border-amber-400 bg-amber-50 text-amber-800" : "border-stone-300 text-stone-600 hover:bg-stone-100"
          }`}
          title="编辑元数据（更改对所有引用此文档的节点生效）"
        >
          <Tag size={11} /> {Object.keys(doc.metadata || {}).length || ""}
        </button>
        <button
          onClick={onDelete}
          className="text-stone-400 hover:text-red-600 p-1"
          title={
            otherRefCount > 0
              ? "仅从此节点取消链接（文档仍保留在其他节点）"
              : "取消链接此文档（将移至未引用列表，文件保留在磁盘上）"
          }
        >
          <Trash2 size={14} />
        </button>
      </div>

      {/* SN editor row */}
      {editingSn && (
        <div className="px-3 pb-3 border-t border-stone-100 bg-amber-50/40">
          <div className="text-[10px] uppercase tracking-wider text-stone-500 mb-1.5 mt-2">
            此文档的自定义序列号
          </div>
          <div className="flex gap-1.5">
            <input
              autoFocus
              type="text"
              value={snDraft}
              onChange={(e) => setSnDraft(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter") commitSn();
                if (e.key === "Escape") cancelSn();
              }}
              placeholder={nodeSn ? `留空则继承 "${nodeSn}"` : "如不适用请留空"}
              className="flex-1 text-xs px-2 py-1 border border-stone-300 rounded font-mono focus:outline-none focus:border-amber-600"
            />
            <button
              onClick={commitSn}
              className="text-xs px-3 py-1 bg-amber-600 hover:bg-amber-700 text-white rounded"
            >
              保存
            </button>
            <button
              onClick={cancelSn}
              className="text-xs px-3 py-1 border border-stone-300 hover:bg-stone-100 rounded"
            >
              取消
            </button>
          </div>
          <div className="text-[10px] text-stone-500 mt-1.5 leading-snug">
            {nodeSn
              ? <>留空将继承父节点序列号：<span className="font-mono text-amber-700">{nodeSn}</span></>
              : "父节点未设置序列号；留空则表示无序列号。"}
          </div>
        </div>
      )}

      {showMeta && (
        <div className="px-3 pb-3 pt-1 border-t border-stone-100 bg-stone-50/50">
          <div className="text-[10px] uppercase tracking-wider text-stone-500 mb-2 mt-2 flex items-center justify-between">
            <span>元数据</span>
            <span className="text-stone-400 normal-case tracking-normal">对所有引用此文档的位置均生效</span>
          </div>
          <MetadataEditor metadata={doc.metadata || {}} keyParameters={keyParameters} onChange={onUpdateMeta} />
        </div>
      )}
    </div>
  );
};

/* =============================================================================
 * UI: SETTINGS SCREEN — text input for storage path
 * ---------------------------------------------------------------------------
 * Shown on first run (no path configured) or when the user clicks the
 * folder name in the header to change it.
 * =============================================================================
 */
const SettingsScreen = ({ initialPath, currentPath, isInitialSetup, onSaved, onCancel }) => {
  const [pathValue, setPathValue] = useState(initialPath || "");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [info, setInfo] = useState(null);

  // Load current settings to show diagnostic info
  useEffect(() => {
    (async () => {
      try {
        const s = await StorageAdapter.getSettings();
        setInfo(s);
        if (!pathValue && s.storage_path) setPathValue(s.storage_path);
      } catch (e) {
        setError("无法连接到服务器：" + e.message);
      }
    })();
  }, []);

  const save = async () => {
    setError(null);
    setBusy(true);
    try {
      const trimmed = pathValue.trim();
      if (!trimmed) throw new Error("请输入路径。");
      const r = await StorageAdapter.saveSettings(trimmed);
      onSaved(r.resolved_path);
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  const isMac = typeof navigator !== "undefined" && /Mac|iPhone|iPad/.test(navigator.platform);
  const exampleAbs = isMac
    ? "/Users/yourname/Documents/Company01/DMS_Storage"
    : "C:\\Company01\\DMS_Storage";
  const exampleHome = isMac
    ? "~/Documents/Company01/DMS_Storage"
    : "%USERPROFILE%\\Documents\\Company01\\DMS_Storage";

  return (
    <div className="h-screen flex items-center justify-center bg-stone-50 p-6">
      <div className="max-w-xl w-full bg-white border border-stone-300 rounded shadow-sm p-6">
        <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500 mb-1">
          轻松找回你的记忆
        </div>
        <h1 className="text-xl font-semibold text-stone-900 mb-3">
          {isInitialSetup ? "设置存储位置" : "更改存储位置"}
        </h1>
        <p className="text-sm text-stone-700 mb-4">
          请输入 DMS 用于存储文件库的文件夹路径。上传的 PDF 和图片将作为实体文件保存在此文件夹中，装配树将存储为 <code className="text-xs bg-stone-100 px-1">index.json</code>。如果文件夹不存在，系统将自动创建。
        </p>

        <div className="text-xs text-stone-600 bg-stone-50 border border-stone-200 rounded p-3 mb-4 font-mono leading-relaxed">
          <div className="text-stone-500">示例：</div>
          <div className="text-stone-900 mt-1">{exampleAbs}</div>
          <div className="text-stone-900">{exampleHome}</div>
        </div>

        <label className="block text-xs uppercase tracking-wider text-stone-600 mb-1.5">
          存储路径
        </label>
        <input
          type="text"
          value={pathValue}
          onChange={(e) => setPathValue(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") save(); }}

/* =============================================================================
 * UI: GLOBAL KEY PARAMETERS DIALOG
 * =============================================================================
 */
const KeyParametersDialog = ({ open, keyParameters, onSave, onClose }) => {
  const [draft, setDraft] = useState([]);
  const [newItem, setNewItem] = useState("");

  useEffect(() => {
    if (open) {
      const list = normalizeKeyParameters(keyParameters?.length ? keyParameters : DEFAULT_KEY_PARAMETERS);
      setDraft(list);
      setNewItem("");
    }
  }, [open, keyParameters]);

  if (!open) return null;

  const add = () => {
    const item = newItem.trim();
    if (!item) return;
    setDraft((prev) => normalizeKeyParameters([...prev, item]));
    setNewItem("");
  };

  const remove = (idx) => setDraft((prev) => prev.filter((_, i) => i !== idx));
  const update = (idx, val) => {
    setDraft((prev) => prev.map((x, i) => i === idx ? val : x));
  };
  const move = (idx, delta) => {
    const next = [...draft];
    const j = idx + delta;
    if (j < 0 || j >= next.length) return;
    [next[idx], next[j]] = [next[j], next[idx]];
    setDraft(next);
  };

  const save = () => {
    const pending = newItem.trim();
    const items = pending ? [...draft, pending] : draft;
    onSave(normalizeKeyParameters(items));
  };

  return (
    <div
      className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"
      onClick={onClose}
    >
      <div
        className="bg-white w-full max-w-lg rounded shadow-2xl p-5"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500 mb-1">
          项目设置
        </div>
        <h2 className="text-lg font-semibold text-stone-900 mb-2">
          全局关键参数
        </h2>
        <p className="text-xs text-stone-600 mb-3">
          这些名称将作为为附件添加元数据字段时的下拉建议项。
          用户仍可手动输入不在列表中的自定义字段名称。
        </p>

        <div className="flex gap-2 mb-3">
          <input
            type="text"
            value={newItem}
            onChange={(e) => setNewItem(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") add(); }}
            placeholder="例如：合同编号"
            className="flex-1 px-2 py-1.5 text-sm border border-stone-300 rounded font-mono focus:outline-none focus:border-amber-600"
            autoFocus
          />
          <button
            onClick={add}
            className="px-3 py-1.5 text-xs bg-amber-600 hover:bg-amber-700 text-white rounded flex items-center gap-1"
          >
            <Plus size={12} /> 添加
          </button>
        </div>

        <div className="border border-stone-200 rounded max-h-72 overflow-auto mb-3">
          {draft.length === 0 && (
            <div className="text-xs text-stone-500 italic p-3">暂无关键参数。</div>
          )}
          {draft.map((item, idx) => (
            <div key={idx} className="flex items-center gap-1.5 p-2 border-b border-stone-100 last:border-b-0">
              <input
                type="text"
                value={item}
                onChange={(e) => update(idx, e.target.value)}
                className="flex-1 text-xs px-2 py-1 border border-stone-300 rounded font-mono focus:outline-none focus:border-amber-600"
              />
              <button
                onClick={() => move(idx, -1)}
                disabled={idx === 0}
                className="text-[10px] px-2 py-1 border border-stone-300 rounded disabled:opacity-30 hover:bg-stone-100"
                title="上移"
              >
                ↑
              </button>
              <button
                onClick={() => move(idx, 1)}
                disabled={idx === draft.length - 1}
                className="text-[10px] px-2 py-1 border border-stone-300 rounded disabled:opacity-30 hover:bg-stone-100"
                title="下移"
              >
                ↓
              </button>
              <button onClick={() => remove(idx)} className="text-stone-400 hover:text-red-600 p-1">
                <X size={13} />
              </button>
            </div>
          ))}
        </div>

        <div className="flex items-center justify-between gap-2">
          <button
            onClick={() => setDraft(DEFAULT_KEY_PARAMETERS)}
            className="px-3 py-1.5 text-xs border border-stone-300 hover:bg-stone-100 rounded"
          >
            恢复默认值
          </button>
          <div className="flex gap-2">
            <button
              onClick={onClose}
              className="px-4 py-1.5 text-xs border border-stone-300 hover:bg-stone-100 rounded"
            >
              取消
            </button>
            <button
              onClick={save}
              className="px-4 py-1.5 text-xs bg-amber-600 hover:bg-amber-700 text-white rounded"
            >
              保存关键参数
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

const HierarchyImportDialog = ({ open, onClose, onImported }) => {
  const [text, setText] = useState("");
  const [busy, setBusy] = useState(false);
  const [errors, setErrors] = useState([]);
  const [preview, setPreview] = useState(null);   // null | { root, count, order }
  const [result, setResult] = useState(null);     // null | { created, skipped }
  const fileInputRef = useRef(null);

  useEffect(() => {
    if (open) {
      setText(""); setBusy(false); setErrors([]); setPreview(null); setResult(null);
    }
  }, [open]);

  if (!open) return null;

  const handleFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      setText(e.target.result);
      setErrors([]); setPreview(null); setResult(null);
    };
    reader.readAsText(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    e.currentTarget.classList.remove("border-amber-500");
    handleFile(e.dataTransfer.files[0]);
  };

  const buildAsciiTree = (order) => {
    const childrenMap = {};
    for (const n of order) childrenMap[n.id] = [];
    for (const n of order) if (n.parent) childrenMap[n.parent].push(n.id);
    const root = order.find((n) => !n.parent);
    if (!root) return "";
    const lines = [root.id];
    const walk = (id, prefix, isLast) => {
      lines.push(prefix + (isLast ? "└── " : "├── ") + id);
      const kids = childrenMap[id] || [];
      kids.forEach((kid, i) =>
        walk(kid, prefix + (isLast ? "    " : "│   "), i === kids.length - 1)
      );
    };
    (childrenMap[root.id] || []).forEach((kid, i) =>
      walk(kid, "", i === (childrenMap[root.id] || []).length - 1)
    );
    return lines.join("\n");
  };

  const doValidate = async () => {
    if (!text.trim()) return;
    setBusy(true); setErrors([]); setPreview(null); setResult(null);
    try {
      const data = await StorageAdapter.hierarchyPreview(text);
      if (!data.ok) { setErrors(data.errors); }
      else { setPreview(data); }
    } catch (e) {
      setErrors([`Network error: ${e.message}`]);
    } finally { setBusy(false); }
  };

  const doCreate = async () => {
    if (!preview) return;
    if (!confirm(`即将在文档树中创建 ${preview.count} 个节点。确定继续？`)) return;
    setBusy(true); setErrors([]);
    try {
      const data = await StorageAdapter.hierarchyCreate(text);
      if (!data.ok) { setErrors(data.errors); }
      else {
        setResult(data);
        onImported();
      }
    } catch (e) {
      setErrors([`Network error: ${e.message}`]);
    } finally { setBusy(false); }
  };

  return (
    <div
      className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"
      onClick={onClose}
    >
      <div
        className="bg-white w-full max-w-xl rounded shadow-2xl flex flex-col max-h-[90vh]"
        onClick={(e) => e.stopPropagation()}
      >
        {/* Header */}
        <div className="px-5 py-4 border-b border-stone-200 flex items-center justify-between">
          <div>
            <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500 mb-0.5">
              层级导入
            </div>
            <h2 className="text-sm font-semibold text-stone-900">从层级定义文件创建文件夹树</h2>
          </div>
          <button onClick={onClose} className="text-stone-400 hover:text-stone-800 p-1"><X size={16} /></button>
        </div>

        {/* Body */}
        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-4">

          {/* Drop zone */}
          <div
            className="border-2 border-dashed border-stone-300 rounded-lg p-5 text-center text-stone-500 text-xs cursor-pointer hover:border-amber-500 hover:bg-amber-50 transition-colors"
            onClick={() => fileInputRef.current?.click()}
            onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add("border-amber-500"); }}
            onDragLeave={(e) => e.currentTarget.classList.remove("border-amber-500")}
            onDrop={handleDrop}
          >
            <Upload size={22} className="mx-auto mb-2 opacity-50" />
            <div><strong>点击选择文件</strong>，或拖放至此</div>
            <div className="text-[10px] mt-1 text-stone-400">.txt 或任意纯文本格式</div>
            <input
              ref={fileInputRef} type="file" className="hidden"
              accept=".txt,.csv,.tsv,.def,.hier,text/*"
              onChange={(e) => handleFile(e.target.files?.[0])}
            />
          </div>

          {/* Paste area */}
          <div>
            <label className="block text-[10px] uppercase tracking-wider text-stone-600 mb-1.5">
              或直接粘贴层级文本
            </label>
            <textarea
              className="w-full h-36 text-xs font-mono border border-stone-300 rounded px-2.5 py-2 resize-y focus:outline-none focus:border-amber-600"
              placeholder={"BOP001\nLMRP9#B001 BOP001\nStackBody92 BOP001\nFlexJoint01 LMRP9#B001\nControlPod65 LMRP9#B001\nBlueP01 ControlPod65"}
              value={text}
              onChange={(e) => { setText(e.target.value); setErrors([]); setPreview(null); setResult(null); }}
            />
          </div>

          {/* Error messages */}
          {errors.length > 0 && (
            <div className="text-xs bg-red-50 border border-red-200 rounded p-3 text-red-700">
              <div className="font-semibold mb-1">验证失败 — {errors.length} 个问题：</div>
              <ul className="list-disc ml-4 space-y-0.5">
                {errors.map((e, i) => <li key={i}>{e}</li>)}
              </ul>
            </div>
          )}

          {/* Success preview */}
          {preview && !result && (
            <div className="text-xs bg-green-50 border border-green-200 rounded p-3 text-green-800">
              ✓ 验证通过 — 将创建 <strong>{preview.count}</strong> 个节点，根节点为 <code className="font-mono">{preview.root}</code>
              <div className="mt-2 font-semibold text-[10px] text-stone-600 uppercase tracking-wider">树形预览：</div>
              <pre className="mt-1 text-[11px] font-mono bg-white border border-green-100 rounded p-2 max-h-40 overflow-auto whitespace-pre leading-5">
                {buildAsciiTree(preview.order)}
              </pre>
            </div>
          )}

          {/* Result after creation */}
          {result && (
            <div className="text-xs bg-green-50 border border-green-200 rounded p-3 text-green-800">
              ✓ 完成 — 已创建 <strong>{result.created.length}</strong> 个节点
              {result.skipped.length > 0 && <>，{result.skipped.length} 个已存在（已跳过）</>}。
              <div className="mt-2 font-mono text-[10px] max-h-32 overflow-auto">
                {result.created.map((n) => <div key={n}>+ {n}</div>)}
                {result.skipped.map((n) => <div key={n} className="text-stone-500">  （已跳过）{n}</div>)}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="px-5 py-3 border-t border-stone-200 flex justify-end gap-2">
          <button
            onClick={onClose}
            className="px-4 py-1.5 text-xs border border-stone-300 hover:bg-stone-100 rounded"
          >
            {result ? "关闭" : "取消"}
          </button>
          {!result && (
            <button
              onClick={doValidate}
              disabled={busy || !text.trim()}
              className="px-4 py-1.5 text-xs border border-amber-400 text-amber-800 hover:bg-amber-50 rounded disabled:opacity-40"
            >
              {busy && !preview ? "验证中…" : "验证"}
            </button>
          )}
          {!result && (
            <button
              onClick={doCreate}
              disabled={busy || !preview}
              className="px-4 py-1.5 text-xs bg-amber-600 hover:bg-amber-700 text-white rounded disabled:opacity-40"
            >
              {busy && preview ? "创建中…" : "创建节点树"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

const ProjectMenu = ({ open, onClose, onProjectChanged, onOpenKeyParameters, onOpenHierarchyImport, onOpenZipImport, onTriggerImport }) => {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [importDialog, setImportDialog] = useState(null); // { file, mode, target }
  const [newDialog, setNewDialog] = useState(null);       // { target }
  const [pwDialog, setPwDialog] = useState(null);         // { current, next, confirm, hasExisting }
  const [authStatus, setAuthStatus] = useState(null);
  const isMac = typeof navigator !== "undefined" && /Mac|iPhone|iPad/.test(navigator.platform);
  const exampleNew = isMac
    ? "/Users/yourname/DMS_Project_2"
    : "C:\\DMS_Project_2";

  // Load auth status when menu opens
  useEffect(() => {
    if (!open) return;
    fetch("/api/auth/status")
      .then((r) => r.json())
      .then((s) => setAuthStatus(s))
      .catch(() => setAuthStatus(null));
  }, [open]);

  const doExport = async () => {
    setError(null);
    setBusy(true);
    try {
      const res = await fetch("/api/project/export");
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "导出失败");
      alert(`备份已保存：\n${json.path}`);
      onClose();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  const doExportCSV = async () => {
    setError(null);
    setBusy(true);
    try {
      const res = await fetch("/api/export-csv");
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }
      const blob = await res.blob();
      const cd = res.headers.get("Content-Disposition") || "";
      const m = cd.match(/filename="?([^"]+)"?/);
      const filename = m ? m[1] : "metadata.csv";
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;

function Root() {
  const [phase, setPhase] = useState("loading"); // 'loading' | 'setup' | 'change' | 'ready'
  const [storagePath, setStoragePath] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const s = await StorageAdapter.getSettings();
        if (s.configured && s.exists && s.writable) {
          setStoragePath(s.resolved_path);
          setPhase("ready");
        } else {
          setPhase("setup");
        }
      } catch (e) {
        console.error("Could not reach the DMS server:", e);
        // Show the setup screen anyway — it has clearer error feedback
        setPhase("setup");
      }
    })();
  }, []);

  const handleSaved = (resolvedPath) => {
    setStoragePath(resolvedPath);
    setPhase("ready");
  };

  const handleChangeFolder = () => setPhase("change");
  const cancelChange = () => setPhase("ready");

  if (phase === "loading") {
    return (
      <div className="h-screen flex items-center justify-center bg-stone-50 text-stone-500 text-sm">
        正在连接 DMS 服务器…
      </div>
    );
  }

  if (phase === "setup") {
    return <SettingsScreen isInitialSetup={true} onSaved={handleSaved} />;
  }

  if (phase === "change") {
    return (
      <SettingsScreen
        isInitialSetup={false}
        initialPath={storagePath}
        currentPath={storagePath}
        onSaved={handleSaved}
        onCancel={cancelChange}
      />
    );
  }

  return <DMS storagePath={storagePath} onChangeFolder={handleChangeFolder} />;
}

/* =============================================================================
 * UI: LINK PICKER MODAL
 * ---------------------------------------------------------------------------
 * Lets the user link an existing document to the current node. Two tabs:
 *   • Search — type a query, see matches across all documents
 *   • Browse — walk the tree and see what's attached to each node
 * Documents already linked to the current node are shown but disabled.
 * =============================================================================
 */
const LinkPicker = ({
  open, onClose, onLink,
  docIndex, tree, refMap, currentNodeId, currentNodeName,
  formatBytes, getPathFor,
}) => {
  const [tab, setTab] = useState("search");
  const [q, setQ] = useState("");
  const [browseNodeId, setBrowseNodeId] = useState(null);
  const [selectedIds, setSelectedIds] = useState(new Set());

  useEffect(() => {
    if (open) {
      setQ("");
      setBrowseNodeId(tree?.id || null);
      setSelectedIds(new Set());
      setTab("search");
    }
  }, [open, tree]);

  if (!open) return null;

  // Documents already linked to the current node — shown but not selectable
  const alreadyLinkedHere = new Set(
    (findNode(tree, currentNodeId)?.documents || []).map((d) => d.id)
  );

  const matchesQuery = (entry, words) => {
    if (!words.length) return true;
    const haystack = [
      entry.id,
      entry.name || "",
      entry.ocrText || "",
      ...Object.keys(entry.metadata || {}),
      ...Object.values(entry.metadata || {}).map((v) => {
        if (v && typeof v === "object") return `${v.design || ""} ${v.actual || ""}`;
        return String(v);
      }),
    ].join(" ").toLowerCase();
    return words.every((w) => haystack.includes(w));
  };

  const searchWords = q.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const searchResults = docIndex.filter((d) => matchesQuery(d, searchWords));

  // Browse mode: docs attached to the currently-browsed node
  const browseNode = browseNodeId ? findNode(tree, browseNodeId) : null;
  const browseDocs = browseNode
    ? (browseNode.documents || [])
        .map((ref) => docIndex.find((e) => e.id === ref.id))
        .filter(Boolean)
    : [];

  const toggleSelect = (id) => {
    if (alreadyLinkedHere.has(id)) return;
    setSelectedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const commit = async () => {
    for (const id of selectedIds) await onLink(id);
    onClose();
  };

  const renderRow = (doc) => {
    const refs = refMap.get(doc.id) || [];
    const linkedHere = alreadyLinkedHere.has(doc.id);
    const selected = selectedIds.has(doc.id);
    return (
      <div
        key={doc.id}
        onClick={() => toggleSelect(doc.id)}
        className={`flex items-center gap-2 p-2 border rounded text-xs cursor-pointer transition-colors ${
          linkedHere
            ? "border-stone-200 bg-stone-50 opacity-60 cursor-not-allowed"
            : selected
              ? "border-amber-500 bg-amber-50"
              : "border-stone-200 hover:bg-stone-50 hover:border-stone-300"
        }`}
      >
        <input
          type="checkbox"
          readOnly
          disabled={linkedHere}
          checked={selected || linkedHere}
          className="shrink-0"
        />
        <div className="flex-1 min-w-0">
          <div className="font-medium text-stone-900 truncate">{doc.name}</div>
          <div className="text-[10px] font-mono text-stone-500 mt-0.5 flex flex-wrap gap-2">
            <span>{doc.id}</span>
            <span>· {formatBytes(doc.size)}</span>
            {refs.length === 0 && <span className="text-amber-700">· 未引用</span>}
            {refs.length > 0 && <span>· 已链接至 {refs.length} 个节点</span>}
            {linkedHere && <span className="text-stone-700 font-semibold">· 已在此处链接</span>}
          </div>
        </div>
      </div>
    );
  };

  // Recursive tree renderer for the Browse tab
  const renderBrowseTree = (node, depth = 0) => {
    const docCount = (node.documents || []).length;
    const isCurrent = node.id === browseNodeId;
    return (
      <div key={node.id}>
        <div
          onClick={() => setBrowseNodeId(node.id)}
          className={`flex items-center gap-1.5 py-1 px-2 cursor-pointer text-xs border-l-2 ${
            isCurrent
              ? "bg-amber-50 border-amber-600 text-stone-900"
              : "border-transparent text-stone-700 hover:bg-stone-100"
          }`}
          style={{ paddingLeft: `${depth * 12 + 8}px` }}
        >
          <Folder size={12} className="text-amber-700 shrink-0" />
          <span className="truncate flex-1">{node.name}</span>
          {docCount > 0 && (

          )}
        </div>
        {(node.children || []).map((c) => renderBrowseTree(c, depth + 1))}
      </div>
    );
  };

    <div
      className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"

        className="bg-white w-full max-w-3xl h-[80vh] rounded shadow-2xl flex flex-col"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="px-4 py-3 border-b border-stone-200">
          <div className="flex items-center justify-between">
            <div>
              <div className="text-sm font-semibold text-stone-900">链接现有文档</div>
              <div className="text-[11px] text-stone-500">
                添加至：<span className="font-mono">{currentNodeName}</span>
              </div>
            </div>
            <button
              onClick={onClose}
              className="text-stone-500 hover:text-stone-900 p-1"
            >

            </button>

          <div className="flex gap-1 mt-3 text-xs">
            <button
              onClick={() => setTab("search")}
              className={`px-3 py-1.5 rounded ${

                  ? "bg-stone-900 text-white"
                  : "border border-stone-300 text-stone-700 hover:bg-stone-100"

            >

            <button
              onClick={() => setTab("browse")}
              className={`px-3 py-1.5 rounded ${
                tab === "browse"
                  ? "bg-stone-900 text-white"
                  : "border border-stone-300 text-stone-700 hover:bg-stone-100"

        <div className="flex-1 overflow-hidden flex">
          {tab === "search" && (
            <div className="flex-1 flex flex-col p-3 gap-2 overflow-hidden">
              <div className="relative shrink-0">
                <Search
                  size={14}
                  className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400"
                />
                <input
                  type="text"
                  autoFocus
                  value={q}
                  onChange={(e) => setQ(e.target.value)}
                  placeholder="按编号、文件名或元数据搜索…"
                  className="w-full pl-8 pr-3 py-1.5 text-xs border border-stone-300 rounded focus:outline-none focus:border-amber-600"
                />
              </div>
              <div className="text-[11px] text-stone-500 shrink-0">
                文件库中共 {searchResults.length} 份文档
              </div>
              <div className="flex-1 overflow-auto space-y-1.5">
                {searchResults.length === 0 && (
                  <div className="text-xs text-stone-500 italic text-center py-8">
                    {docIndex.length === 0
                      ? "尚未上传任何文档。请先上传文档，再来此处链接到其他节点。"
                      : "没有与搜索条件匹配的文档。"}
                  </div>
                )}
                {searchResults.map(renderRow)}
