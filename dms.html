/* =============================================================================
 * STORAGE ADAPTER LAYER (REST API implementation)
 * ---------------------------------------------------------------------------
 * Talks to the Python Flask server (dms_server.py) running on the same host.
 * Tree + index live in <storage_root>/index.json on disk.
 * Documents live as real files in <storage_root>/docs/<DOC-ID>.<ext>.
 *
 * To migrate to a remote/production server later, just change API_BASE to
 * the remote URL — no other code in this file changes.
 * =============================================================================
 */
const API_BASE = ""; // same origin as the page (e.g. http://localhost:8000)

const DEFAULT_KEY_PARAMETERS = [
  "人物",
  "事件",
  "单位",
  "家人",
  "朋友",
  "旅游"
];

const normalizeKeyParameters = (items) => {
  const seen = new Set();
  const out = [];
  for (const raw of (items || [])) {
    const v = String(raw || "").trim();
    if (!v) continue;
    const k = v.toLowerCase();
    if (seen.has(k)) continue;
    seen.add(k);
    out.push(v);
  }
  return out;
};

// Render the assembly tree as a box-drawing text tree (├── └── │), like a
// classic file-tree printout. Used by the "文本树" view for copy/export.
const buildTreeText = (root, { showMeta = false } = {}) => {
  if (!root) return "";
  const label = (n) => {
    let s = n.name || n.id || "(未命名)";
    const docCount = (n.documents || []).length;
    if (showMeta && n.sn) s += `  [${n.sn}]`;
    if (docCount) s += `  (${docCount} 份文档)`;
    return s;
  };
  const lines = [label(root)];
  const walk = (node, prefix) => {
    const kids = node.children || [];
    kids.forEach((kid, i) => {
      const last = i === kids.length - 1;
      lines.push(prefix + (last ? "└── " : "├── ") + label(kid));
      walk(kid, prefix + (last ? "    " : "│   "));
    });
  };
  walk(root, "");
  return lines.join("\n");
};

const readPhotoDate = async (file) => {
  const fallback = (lat = null, lon = null) => {
    const d = new Date(file.lastModified);
    return { year: String(d.getFullYear()), month: String(d.getMonth() + 1).padStart(2, "0"), lat, lon };
  };
  const _ext = file.name.split(".").pop().toLowerCase();
  const _isJpegLike = file.type.startsWith("image/jpeg") || file.type.startsWith("image/tiff") ||
    _ext === "jpg" || _ext === "jpeg" || _ext === "tif" || _ext === "tiff";
  if (!_isJpegLike) return fallback();
  try {
    const buf = await file.slice(0, 262144).arrayBuffer();
    const v = new DataView(buf);
    if (v.getUint16(0) !== 0xFFD8) return fallback();
    let pos = 2;
    while (pos + 4 <= buf.byteLength) {
      if (v.getUint8(pos) !== 0xFF) break;
      const marker = v.getUint16(pos); pos += 2;
      if (marker === 0xFFD9 || marker === 0xFFDA) break;
      const segLen = v.getUint16(pos);
      if (marker === 0xFFE1 && segLen > 8 &&
          v.getUint32(pos + 2) === 0x45786966 && v.getUint16(pos + 6) === 0x0000) {
        const tiff = pos + 8;
        const le = v.getUint16(tiff) === 0x4949;
        const u16 = (o) => v.getUint16(tiff + o, le);
        const u32 = (o) => v.getUint32(tiff + o, le);
        if (u16(2) !== 42) { pos += segLen; continue; }
        const readDate = (off) => {
          if (tiff + off + 19 > buf.byteLength) return null;
          const s = new TextDecoder("ascii").decode(new Uint8Array(buf, tiff + off, 19));
          return /^\d{4}:\d{2}/.test(s) ? { year: s.slice(0, 4), month: s.slice(5, 7) } : null;
        };
        const readRational3 = (off) => {
          if (tiff + off + 24 > buf.byteLength) return null;
          const r = (o) => { const n = u32(o), d = u32(o + 4); return d ? n / d : 0; };
          return r(off) + r(off + 8) / 60 + r(off + 16) / 3600;
        };
        const ifd0 = u32(4);
        const n0 = u16(ifd0);
        let exifOff = null, gpsOff = null, ifd0Date = null;
        for (let i = 0; i < n0 && i < 256; i++) {
          const e = ifd0 + 2 + i * 12;
          if (tiff + e + 12 > buf.byteLength) break;
          const tag = u16(e);
          if (tag === 0x8769) exifOff = u32(e + 8);
          else if (tag === 0x8825) gpsOff = u32(e + 8);
          else if (tag === 0x0132) ifd0Date = readDate(u32(e + 8));
        }
        // Parse Exif IFD for shot date
        let foundDate = null;
        if (exifOff != null && exifOff + 2 <= buf.byteLength - tiff) {
          const nExif = u16(exifOff);
          for (let i = 0; i < nExif && i < 256; i++) {
            const e = exifOff + 2 + i * 12;
            if (tiff + e + 12 > buf.byteLength) break;
            const tag = u16(e);
            if (tag === 0x9003 || tag === 0x9004) {
              foundDate = readDate(u32(e + 8));
              if (foundDate) break;
            }
          }
        }
        if (!foundDate) foundDate = ifd0Date;
        // Parse GPS IFD
        let lat = null, lon = null;
        if (gpsOff != null && tiff + gpsOff + 2 <= buf.byteLength) {
          const nGps = u16(gpsOff);
          let latRef = "N", lonRef = "E", latVal = null, lonVal = null;
          for (let i = 0; i < nGps && i < 32; i++) {
            const ge = gpsOff + 2 + i * 12;
            if (tiff + ge + 12 > buf.byteLength) break;
            const gtag = u16(ge);
            if (gtag === 0x0001) latRef = String.fromCharCode(v.getUint8(tiff + ge + 8));
            else if (gtag === 0x0003) lonRef = String.fromCharCode(v.getUint8(tiff + ge + 8));
            else if (gtag === 0x0002) latVal = readRational3(u32(ge + 8));
            else if (gtag === 0x0004) lonVal = readRational3(u32(ge + 8));
          }
          if (latVal != null && lonVal != null) {
            lat = latRef === "S" ? -latVal : latVal;
            lon = lonRef === "W" ? -lonVal : lonVal;
          }
        }
        if (foundDate) return { ...foundDate, lat, lon };
        return fallback(lat, lon);
      }
      pos += segLen;
    }
  } catch {}
  return fallback();
};

const StorageAdapter = {
  async _json(path, opts = {}) {
    const res = await fetch(API_BASE + path, opts);
    if (!res.ok) {
      let detail = "";
      try { detail = (await res.json()).error || ""; } catch {}
      throw new Error(`${path} → HTTP ${res.status} ${res.statusText} ${detail}`);
    }
    return res.json();
  },

  async getSettings() {
    return this._json("/api/settings");
  },

  async saveSettings(storagePath) {
    return this._json("/api/settings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ storage_path: storagePath }),
    });
  },

  async getTree() {
    return this._json("/api/tree");  // returns { tree, photoRootNodeId }
  },

  async savePhotoRootNodeId(nodeId) {
    await this._json("/api/photo-root", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ node_id: nodeId || "" }),
    });
  },

  async saveTree(tree) {
    await this._json("/api/tree", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tree }),
    });
  },

  async listDocumentIndex() {
    const r = await this._json("/api/doc-index");
    return r.docIndex || [];
  },

  async saveDocumentIndex(docIndex) {
    await this._json("/api/doc-index", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ docIndex }),
    });
  },

  async getKeyParameters() {
    const r = await this._json("/api/key-parameters");
    return normalizeKeyParameters(r.keyParameters || DEFAULT_KEY_PARAMETERS);
  },

  async saveKeyParameters(keyParameters) {
    await this._json("/api/key-parameters", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ keyParameters: normalizeKeyParameters(keyParameters) }),
    });
  },

  // Documents: upload as multipart, retrieve as URL
  async saveDocument(doc) {
    // doc.dataUrl is base64. Convert to Blob and POST as multipart/form-data.
    // NOTE: do NOT use `new File(...)` here — our React `File` icon component
    // shadows the global File constructor in this scope. FormData accepts a
    // Blob plus filename argument, which works the same way.
    const response = await fetch(doc.dataUrl);
    const blob = await response.blob();
    const form = new FormData();
    form.append("file", blob, doc.name);
    form.append("doc_id", doc.id);
    const _nodeId = doc.originalNodeId || doc.nodeId;
    if (_nodeId) form.append("node_id", _nodeId);
    if (doc.routeMode) form.append("route_mode", doc.routeMode);
    if (doc.photoYear) form.append("photo_year", doc.photoYear);
    if (doc.photoMonth) form.append("photo_month", doc.photoMonth);
    if (doc.photoLat != null) form.append("photo_lat", String(doc.photoLat));
    if (doc.photoLon != null) form.append("photo_lon", String(doc.photoLon));
    if (doc.photoBaseNodeId) form.append("photo_base_node_id", doc.photoBaseNodeId);
    const res = await fetch(API_BASE + "/api/docs", { method: "POST", body: form });
    let resData = {};
    try { resData = await res.json(); } catch {}
    if (!res.ok) {
      throw new Error(`Upload failed: HTTP ${res.status} ${resData.error || ""}`);
    }
    console.log(`[DMS] ✓ Uploaded ${doc.name} → ${resData.path || resData.filename}${resData.location ? ` [${resData.location}]` : ""}`);
    return resData;
  },

  async getDocument(docId) {
    // For viewing, the document is just a URL — the server streams it.
    // We also need its metadata (name, mime, etc.) which is in the doc index.
    const idx = await this.listDocumentIndex();
    const meta = idx.find((d) => d.id === docId);
    if (!meta) return null;
    return {
      id: docId,
      name: meta.name,
      mime: meta.mime,
      size: meta.size,
      uploadedAt: meta.uploadedAt,
      originalNodeId: meta.originalNodeId || meta.nodeId,
      metadata: meta.metadata || {},
      ocrText: meta.ocrText || "",
      // Per-document parameter keys the user added in this doc's extraction
      // panel (separate from the global key-parameter list).
      localKeyParams: Array.isArray(meta.localKeyParams) ? meta.localKeyParams : [],
      // dataUrl is now a server URL — viewer can use it directly
      dataUrl: API_BASE + "/api/docs/" + docId,
    };
  },

  async deleteDocument(docId) {
    try {
      await fetch(API_BASE + "/api/docs/" + docId, { method: "DELETE" });
    } catch (e) {
      console.warn("[DMS] Delete failed (non-fatal):", e);
    }
  },

  // OCR: report capability, and run OCR/text-extraction on a stored document.
  async ocrStatus() {
    try {
      return await this._json("/api/ocr/status");
    } catch {
      return { tesseract_available: false, image_ocr: false, scanned_pdf_ocr: false };
    }
  },

  async runOcr(docId, { force = false } = {}) {
    const url = API_BASE + "/api/docs/" + docId + "/ocr" + (force ? "?force=1" : "");
    const res = await fetch(url, { method: "POST" });
    if (!res.ok) {
      let detail = "";
      try { detail = (await res.json()).error || ""; } catch {}
      throw new Error(`OCR failed: HTTP ${res.status} ${detail}`);
    }
    return res.json();   // { ok, text, char_count, forced, info, hint }
  },

  // Extract user-defined key strings from a document. If `text` is given,
  // extraction runs against that text (e.g. OCR output the user just edited);
  // otherwise the server re-reads the file (honoring force for scanned PDFs).
  async extractKeys(docId, keys, { force = false, text = null, sameLineOnly = true } = {}) {
    const body = { keys, same_line_only: sameLineOnly };
    if (force) body.force_ocr = true;
    if (typeof text === "string" && text.trim()) body.text = text;
    const res = await fetch(API_BASE + "/api/docs/" + docId + "/extract-keys", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      let detail = "";
      try { detail = (await res.json()).error || ""; } catch {}
      throw new Error(`提取失败: HTTP ${res.status} ${detail}`);
    }
    return res.json();   // { ok, results:{key:{value,found}}, found_count, ... }
  },

  async hierarchyPreview(text) {
    return this._json("/api/hierarchy/preview", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
  },

  async hierarchyCreate(text) {
    return this._json("/api/hierarchy/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
  },
};

 * ID GENERATION
 * =============================================================================
 */
const genDocId = () => {
  const d = new Date();
  const ymd =
    d.getFullYear().toString() +
    String(d.getMonth() + 1).padStart(2, "0") +
    String(d.getDate()).padStart(2, "0");
  const rand = Math.random().toString(36).slice(2, 8).toUpperCase();
  return `DOC-${ymd}-${rand}`;
};

const computeFileHash = async (file) => {
  const buf = await file.arrayBuffer();
  const hashBuf = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hashBuf)).map((b) => b.toString(16).padStart(2, "0")).join("");
};

const genNodeId = () => {
  const rand = Math.random().toString(36).slice(2, 8).toUpperCase();
  return `NODE-${rand}`;
};

/* =============================================================================
 * TREE OPERATIONS
 * =============================================================================
 */
const findNode = (root, nodeId) => {
  if (!root) return null;
  if (root.id === nodeId) return root;
  for (const child of root.children || []) {
    const found = findNode(child, nodeId);
    if (found) return found;
  }
  return null;
};

const findParentNode = (root, nodeId) => {
  if (!root) return null;
  for (const child of root.children || []) {
    if (child.id === nodeId) return root;
    const found = findParentNode(child, nodeId);
    if (found) return found;
  }
  return null;
};

const findNodeByName = (root, name) => {
  if (!root) return null;
  if (name.includes("/")) {
    // Path-qualified: walk down from root's children (root name not included in path)
    const parts = name.split("/").map(p => p.trim()).filter(Boolean);
    // Try matching from root's children first; if first part matches root, skip it
    const startChildren = (parts[0] === root.name)
      ? (root.children || [])
      : [root];
    const walk = (nodes, depth) => {
      if (depth >= parts.length) return null;
      for (const n of nodes) {
        if (n.name === parts[depth]) {
          if (depth === parts.length - 1) return n;
          const found = walk(n.children || [], depth + 1);
          if (found) return found;
        }
      }
      return null;
    };
    return walk(startChildren, parts[0] === root.name ? 1 : 0);
  }
  // Bare name: first global match
  if (root.name === name) return root;
  for (const child of root.children || []) {
    const found = findNodeByName(child, name);
    if (found) return found;
  }
  return null;
};

const collectAllDocIds = (node, acc = []) => {
  if (!node) return acc;
  (node.documents || []).forEach((d) => acc.push(d.id));
  (node.children || []).forEach((c) => collectAllDocIds(c, acc));
  return acc;
};

const updateNodeInTree = (root, nodeId, updater) => {
  if (root.id === nodeId) return updater(root);
  return {
    ...root,
    children: (root.children || []).map((c) =>
      updateNodeInTree(c, nodeId, updater)
    ),
  };
};

const removeNodeFromTree = (root, nodeId) => {
  return {
    ...root,
    children: (root.children || [])
      .filter((c) => c.id !== nodeId)
      .map((c) => removeNodeFromTree(c, nodeId)),
  };
};

const moveNodeInTree = (root, nodeId, direction) => {
  const children = root.children || [];
  const idx = children.findIndex((c) => c.id === nodeId);
  if (idx !== -1) {
    const next = [...children];
    const swap = direction === "up" ? idx - 1 : idx + 1;
    if (swap >= 0 && swap < next.length) [next[idx], next[swap]] = [next[swap], next[idx]];
    return { ...root, children: next };
  }
  return { ...root, children: children.map((c) => moveNodeInTree(c, nodeId, direction)) };
};

const moveNodeToPosition = (root, dragId, targetId, position) => {
  const dragged = findNode(root, dragId);
  if (!dragged || dragId === targetId) return root;
  if (findNode(dragged, targetId)) return root; // can't drop into own descendant
  let next = removeNodeFromTree(root, dragId);
  if (position === "into") {
    next = updateNodeInTree(next, targetId, (n) => ({
      ...n, children: [...(n.children || []), dragged],
    }));
  } else {
    const insertAround = (node) => {
      const ch = node.children || [];
      const idx = ch.findIndex((c) => c.id === targetId);
      if (idx !== -1) {
        const at = position === "before" ? idx : idx + 1;
        const arr = [...ch];
        arr.splice(at, 0, dragged);
        return { ...node, children: arr };
      }
      return { ...node, children: ch.map(insertAround) };
    };
    next = insertAround(next);
  }
  return next;
};

  onToggle, onSelect,
  onStartRename, onCommitRename, onCancelRename,
  onStartAddChild, onCommitAddChild, onCancelAddChild,
  onDelete, onMoveNode, onContextMenu, onUploadToNode,
  draggingId, dropInfo, onDragStart, onDragOver, onDragEnd, onDrop,
}) => {
  const isExpanded = expandedIds.has(node.id);
  const isSelected = selectedId === node.id;
  const isRenaming = renamingId === node.id;
  const isAddingChild = addingChildToId === node.id;
  const hasChildren = (node.children || []).length > 0;
  const docCount = (node.documents || []).length;
  const isLast = siblingIndex === siblingCount - 1;
  const isPhotoRoot = node.id === photoRootNodeId;

  const isDropTarget = dropInfo?.targetId === node.id;
  const dropPosition = isDropTarget ? dropInfo.position : null;

  const [draftName, setDraftName] = useState(node.name);
  const [newChildName, setNewChildName] = useState("");

  useEffect(() => { if (isRenaming) setDraftName(node.name); }, [isRenaming, node.name]);
  useEffect(() => { if (isAddingChild) setNewChildName(""); }, [isAddingChild]);

  const commitRename = () => {
    const trimmed = draftName.trim();
    if (trimmed && trimmed !== node.name) onCommitRename(node.id, trimmed);
    else onCancelRename();
  };

  const commitAddChild = () => {
    const trimmed = newChildName.trim();
    if (trimmed) onCommitAddChild(node.id, trimmed);
    else onCancelAddChild();

    <div>

        draggable={!isRoot}
        onClick={() => !isRenaming && onSelect(node.id)}

        onContextMenu={(e) => {
          e.preventDefault();
          onSelect(node.id);
          onContextMenu(e.clientX, e.clientY, node.id);
        }}
        onDragStart={(e) => {
          if (isRoot) return;
          e.stopPropagation();
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", node.id);
          onDragStart(node.id);
        }}
        onDragOver={(e) => {
          e.preventDefault();
          e.stopPropagation();
          const rect = e.currentTarget.getBoundingClientRect();
          const y = e.clientY - rect.top;
          const h = rect.height;
          const pos = isRoot ? "into" : (y < h * 0.3 ? "before" : y > h * 0.7 ? "after" : "into");
          onDragOver(node.id, pos);
          e.dataTransfer.dropEffect = "move";
        }}
        onDragLeave={(e) => {
          if (!e.currentTarget.contains(e.relatedTarget)) onDragOver(null, null);
        }}
        onDrop={(e) => { e.preventDefault(); e.stopPropagation(); onDrop(); }}

                onClick={(e) => { e.stopPropagation(); onStartAddChild(node.id); }}

              >

                  type="file"
                  multiple

                  className="hidden"
                  onChange={(e) => onUploadToNode(node.id, e)}

              </label>
              {!isRoot && siblingIndex > 0 && (
                <button
                  onClick={(e) => { e.stopPropagation(); onSelect(node.id); onMoveNode(node.id, "up"); }}
                  title="上移"
                  className="text-stone-500 hover:text-amber-700 p-0.5 rounded hover:bg-white"
                >
                  <ChevronUp size={12} />
                </button>

              {!isRoot && siblingIndex < siblingCount - 1 && (
                <button

        <div className="relative flex items-center gap-1.5 py-1 px-2">
          <div aria-hidden="true" style={{position:"absolute",top:0,bottom:0,left:8,width:(isRoot?0:(currentParentLines.length+1))*16+22,pointerEvents:"none"}}>

              <div key={i} style={{position:"absolute",top:0,bottom:0,left:i*16,width:1,background:"#94a3b8"}} />

            <div style={{position:"absolute",top:"50%",left:(isRoot?0:(currentParentLines.length+1))*16,width:22,height:1,background:"#94a3b8"}} />
          </div>
          <div aria-hidden="true" style={{width:(isRoot?0:(currentParentLines.length+1))*16+16,flexShrink:0}} />
          <span className="w-4" />

          <input
            autoFocus
            type="text"
            value={newChildName}

            onBlur={commitAddChild}

              if (e.key === "Escape") onCancelAddChild();

      {isExpanded && (node.children || []).map((child, i) => (
        <TreeNode
          key={child.id}

/* =============================================================================
 * UI: DOCUMENT VIEWER
 * =============================================================================
 */
const DocumentViewer = ({ doc, onClose, onSaveOcr, keyParameters = [], onAddKeyParameter, onSaveLocalParams, onSaveParams }) => {
  const isImage = doc?.mime?.startsWith("image/");
  const isPdf = doc?.mime === "application/pdf";
  const isText = doc?.mime?.startsWith("text/") || doc?.mime === "application/json";
  const ocrEligible = isImage || isPdf;

  // OCR state
  const [ocrStatus, setOcrStatus] = useState(null);   // capability report
  const [ocrRunning, setOcrRunning] = useState(false);
  const [ocrText, setOcrText] = useState("");
  const [ocrInfo, setOcrInfo] = useState(null);
  const [ocrHint, setOcrHint] = useState("");
  const [ocrError, setOcrError] = useState("");
  // Side panel: null (closed) | "text" (OCR text) | "keys" (key-param extract)
  const [panelMode, setPanelMode] = useState(null);
  const [copied, setCopied] = useState(false);
  const [saved, setSaved] = useState(false);

  // Key-parameter extraction state
  const [localKeys, setLocalKeys] = useState([]);         // per-doc added keys
  const [selectedKeys, setSelectedKeys] = useState([]);   // which to extract
  const [newKeyInput, setNewKeyInput] = useState("");     // add-new box
  const [sameLineOnly, setSameLineOnly] = useState(true); // #4: same line default
  const [keyRows, setKeyRows] = useState(null);           // [{key, value, found}]
  const [keyRunning, setKeyRunning] = useState(false);
  const [keyError, setKeyError] = useState("");
  const [keyHint, setKeyHint] = useState("");
  const [keyDiag, setKeyDiag] = useState(null);           // {charCount, preview,...}
  const [paramsSaved, setParamsSaved] = useState(false);

  const panelOpen = panelMode !== null;

  // Global parameters (from the shared list) vs. this document's local adds.
  const globalKeys = useMemo(() => normalizeKeyParameters(keyParameters), [keyParameters]);
  const globalSet = useMemo(() => new Set(globalKeys.map((k) => k.toLowerCase())), [globalKeys]);
  // A key is "local" (deletable here) only if it's NOT a global parameter.
  const localOnlyKeys = useMemo(
    () => localKeys.filter((k) => !globalSet.has(k.toLowerCase())),
    [localKeys, globalSet]
  );
  // Display order: global parameters first, then this document's local adds.
  const availableKeys = useMemo(
    () => [...globalKeys, ...localOnlyKeys],
    [globalKeys, localOnlyKeys]
  );

  // Reset per-document and seed with any previously-saved OCR text.
  useEffect(() => {
    if (!doc) return;
    setOcrText(doc.ocrText || "");
    setOcrInfo(null); setOcrHint(""); setOcrError("");
    setPanelMode(doc.ocrText ? "text" : null);
    setCopied(false); setSaved(false);
    // Load this document's locally-added parameters; select NONE by default
    // (request: user explicitly picks what to extract for each document).
    setLocalKeys(normalizeKeyParameters(doc.localKeyParams || []));
    setSelectedKeys([]);
    setNewKeyInput(""); setSameLineOnly(true);
    setKeyRows(null); setKeyError(""); setKeyHint(""); setKeyDiag(null); setParamsSaved(false);
  }, [doc?.id]);

  // Probe OCR capability once when a viewer opens on an eligible file.
  useEffect(() => {
    if (!doc || !ocrEligible) return;
    let alive = true;
    StorageAdapter.ocrStatus().then((s) => { if (alive) setOcrStatus(s); });
    return () => { alive = false; };
  }, [doc?.id]);

  if (!doc) return null;

  const runOcr = async ({ force = false } = {}) => {
    setOcrRunning(true); setOcrError(""); setOcrHint(""); setSaved(false);
    setPanelMode("text");
    try {
      const r = await StorageAdapter.runOcr(doc.id, { force });
      setOcrText(r.text || "");
      setOcrInfo(r.info || null);
      setOcrHint(r.hint || "");
    } catch (e) {
      setOcrError(e.message || String(e));
    } finally {
      setOcrRunning(false);
    }
  };

  const copyText = async () => {
    try {
      await navigator.clipboard.writeText(ocrText);
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch {/* clipboard may be blocked; ignore */}
  };

  const saveText = async () => {
    if (!onSaveOcr) return;
    await onSaveOcr(doc.id, ocrText);
    setSaved(true);
    setTimeout(() => setSaved(false), 1800);
  };

  // --- Key-parameter extraction ---------------------------------------------
  const toggleKey = (key) => {
    setSelectedKeys((prev) =>
      prev.some((k) => k === key) ? prev.filter((k) => k !== key) : [...prev, key]);
  };
  const selectAllKeys = () => setSelectedKeys(availableKeys.slice());
  const selectNoneKeys = () => setSelectedKeys([]);

  // Add a new parameter under THIS document (local to the document, kept out
  // of the global list). It's persisted with the document and is deletable
  // here. If the typed name is already a global parameter, we just select it.
  const addNewKey = async () => {
    const clean = newKeyInput.trim();
    if (!clean) return;
    const existing = availableKeys.find((k) => k.toLowerCase() === clean.toLowerCase());
    const finalKey = existing || clean;
    const isGlobal = globalSet.has(finalKey.toLowerCase());
    if (!existing && !isGlobal) {
      const nextLocal = [...localKeys, finalKey];
      setLocalKeys(nextLocal);
      if (onSaveLocalParams) {
        try { await onSaveLocalParams(doc.id, nextLocal); } catch (e) { /* non-fatal */ }
      }
    }
    setSelectedKeys((prev) =>
      prev.some((k) => k.toLowerCase() === finalKey.toLowerCase()) ? prev : [...prev, finalKey]);
    setNewKeyInput("");
  };

  // Delete a document-local parameter (only locals, never global ones).
  const deleteLocalKey = async (key) => {
    if (globalSet.has(key.toLowerCase())) return;   // safety: never delete globals
    const nextLocal = localKeys.filter((k) => k.toLowerCase() !== key.toLowerCase());
    setLocalKeys(nextLocal);
    setSelectedKeys((prev) => prev.filter((k) => k.toLowerCase() !== key.toLowerCase()));
    if (onSaveLocalParams) {
      try { await onSaveLocalParams(doc.id, nextLocal); } catch (e) { /* non-fatal */ }
    }
  };

  const runExtract = async ({ force = false } = {}) => {
    const keys = selectedKeys.filter(Boolean);
    if (!keys.length) { setKeyError("请至少选择一个要提取的参数。"); return; }
    setKeyRunning(true); setKeyError(""); setKeyHint(""); setParamsSaved(false);
    try {
      // If OCR text is loaded (and possibly user-corrected), extract from it;
      // otherwise the server reads the file directly.
      const useText = ocrText && ocrText.trim() ? ocrText : null;
      const r = await StorageAdapter.extractKeys(doc.id, keys, { force, text: useText, sameLineOnly });
      const rows = keys.map((k) => ({
        key: k,
        value: (r.results[k] && r.results[k].value) || "NF",
        found: !!(r.results[k] && r.results[k].found),
      }));
      setKeyRows(rows);
      setKeyHint(r.hint || "");
      setKeyDiag({
        charCount: r.text_char_count || 0,
        preview: r.text_preview || "",
        foundCount: r.found_count || 0,
        usedText: !!useText,
        forced: force,
      });
    } catch (e) {
      setKeyError(e.message || String(e));
    } finally {
      setKeyRunning(false);
    }
  };

  const editRowValue = (idx, val) => {
    setKeyRows((rows) => rows.map((r, i) =>
      i === idx ? { ...r, value: val, found: val.trim() !== "" && val.trim() !== "NF" } : r));
    setParamsSaved(false);
  };

  // Save extracted values into the document's parameter fields. Each value
  // lands in the "Actual (实测值)" slot, since these are the document's
  // reported/as-certified values. Existing "Design / Req." values are kept.
  const saveParams = async ({ includeNF = true } = {}) => {
    if (!onSaveParams || !keyRows) return;
    const meta = { ...((doc.metadata) || {}) };
    for (const row of keyRows) {
      if (!includeNF && (row.value === "NF" || row.value.trim() === "")) continue;
      const prev = meta[row.key];
      const prevObj = (prev && typeof prev === "object")
        ? prev
        : { design: typeof prev === "string" ? prev : "", actual: "" };
      meta[row.key] = { ...prevObj, actual: row.value };
    }
    await onSaveParams(doc.id, meta);
    setParamsSaved(true);
    setTimeout(() => setParamsSaved(false), 1800);
  };

  const foundCount = keyRows ? keyRows.filter((r) => r.found).length : 0;

  // Human-readable summary of what the extraction did.
  const methodLabel = (() => {
    if (!ocrInfo) return "";
    const m = ocrInfo.method;
    if (m === "text-layer") return "文本层（无需 OCR）";
    if (m === "ocr") return "OCR 识别";
    if (m === "mixed") return "文本层 + OCR";
    if (m === "garbage") return "文本层损坏";
    return "未能提取";
  })();

  // When the extracted text came straight from a text layer, offer a one-click
  // "force real OCR" path in case that layer is corrupt (renders fine, but the
  // characters are gibberish — common in re-OCR'd PDFs).
  const cameFromTextLayer = ocrInfo && ocrInfo.method === "text-layer";

  const ocrTitle = ocrStatus && !ocrStatus.tesseract_available
    ? "未检测到 Tesseract OCR：有文本层的 PDF 仍可提取，扫描件/图片需安装 Tesseract"
    : "提取文档中的文字（自动选择文本层或 OCR）";

  return (
    <div
      className="fixed inset-0 bg-stone-900/80 z-50 flex items-center justify-center p-4"
      onClick={onClose}
    >
      <div
        className="bg-white w-full max-w-6xl h-[90vh] flex flex-col rounded shadow-2xl"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="flex items-center justify-between px-4 py-3 border-b border-stone-200">
          <div className="min-w-0">
            <div className="text-sm font-medium text-stone-900 truncate">{doc.name}</div>
            <div className="text-[11px] text-stone-500 font-mono">{doc.id}</div>
          </div>
          <div className="flex gap-2 shrink-0">
            {ocrEligible && (
              <button
                onClick={() => runOcr({ force: false })}
                disabled={ocrRunning}
                title={ocrTitle}
                className={"text-xs px-3 py-1.5 rounded flex items-center gap-1.5 border " +
                  (ocrRunning
                    ? "border-stone-200 text-stone-400 cursor-wait"
                    : "border-amber-300 text-amber-800 bg-amber-50 hover:bg-amber-100")}
              >
                {ocrRunning
                  ? (<><Loader size={13} className="animate-spin" /> 识别中…</>)
                  : (<><ScanText size={13} /> {doc.ocrText ? "重新 OCR" : "提取文字 (OCR)"}</>)}
              </button>
            )}
            {ocrEligible && (
              <button
                onClick={() => { setPanelMode("keys"); }}
                title="按用户定义的关键字从文档中提取参数值"
                className={"text-xs px-3 py-1.5 rounded flex items-center gap-1.5 border " +
                  (panelMode === "keys"
                    ? "border-emerald-400 text-emerald-800 bg-emerald-100"
                    : "border-emerald-300 text-emerald-800 bg-emerald-50 hover:bg-emerald-100")}
              >
                <ListChecks size={13} /> 提取关键参数
              </button>
            )}
            {ocrEligible && ocrText && panelMode !== "text" && (
              <button
                onClick={() => setPanelMode("text")}
                className="text-xs px-3 py-1.5 border border-stone-300 text-stone-700 hover:bg-stone-100 rounded flex items-center gap-1.5"
              >
                <FileText size={13} /> 查看文字
              </button>
            )}
            <a
              href={doc.dataUrl}
              download={doc.name}
              className="text-xs px-3 py-1.5 border border-stone-300 text-stone-700 hover:bg-stone-100 rounded flex items-center gap-1.5"
            >
              <Download size={13} /> 下载
            </a>
            <button
              onClick={onClose}
              className="text-xs px-3 py-1.5 border border-stone-300 text-stone-700 hover:bg-stone-100 rounded flex items-center gap-1"
            >
              <X size={13} /> 关闭
            </button>
          </div>
        </div>

        <div className="flex-1 min-h-0 flex">
          {/* Preview pane */}
          <div className={"min-h-0 overflow-auto bg-stone-100 " + (panelOpen ? "flex-1 border-r border-stone-200" : "flex-1")}>
            {isImage && (
              <div className="h-full flex items-center justify-center p-4">
                <img src={doc.dataUrl} alt={doc.name} className="max-w-full max-h-full object-contain" />
              </div>
            )}
            {isPdf && (
              <iframe src={doc.dataUrl} title={doc.name} className="w-full h-full border-0" />
            )}
            {isText && (
              <iframe src={doc.dataUrl} title={doc.name} className="w-full h-full border-0 bg-white font-mono" />
            )}
            {!isImage && !isPdf && !isText && (
              <div className="h-full flex flex-col items-center justify-center text-stone-500 gap-3 p-6">
                <File size={52} className="text-stone-400" />
                <div className="text-sm font-medium text-stone-700 text-center">{doc.name}</div>
                <div className="text-xs text-stone-400 font-mono">{doc.mime}</div>
                <a
                  href={doc.dataUrl}
                  download={doc.name}
                  className="mt-2 flex items-center gap-2 px-5 py-2.5 bg-amber-600 hover:bg-amber-700 text-white text-sm font-medium rounded-lg"
                >
                  <Download size={15} /> Download to open
                </a>
                <div className="text-xs text-stone-400 text-center max-w-xs">
                  This file type cannot be previewed in the browser.
                  Download it and open with the appropriate app.
                </div>
              </div>
            )}
          </div>

          {/* OCR result panel */}
          {panelMode === "text" && (
            <div className="w-[40%] max-w-md min-h-0 flex flex-col bg-white">
              <div className="flex items-center justify-between px-3 py-2 border-b border-stone-200 bg-stone-50">
                <div className="flex items-center gap-1.5 text-xs font-medium text-stone-700">
                  <ScanText size={13} /> 提取的文字
                  {methodLabel && (
                    <span className="ml-1 text-[10px] font-normal text-stone-500">· {methodLabel}</span>
                  )}
                </div>
                <button onClick={() => setPanelMode(null)} className="text-stone-400 hover:text-stone-700">
                  <X size={14} />
                </button>
              </div>

              {ocrInfo && (
                <div className="px-3 py-1.5 text-[10px] text-stone-500 border-b border-stone-100 flex flex-wrap gap-x-3 gap-y-0.5">
                  {ocrInfo.pages ? <span>页数 {ocrInfo.pages_extracted}/{ocrInfo.pages}</span> : null}
                  <span>{ocrText.length} 字符</span>
                  {ocrInfo.used_ocr ? <span className="text-amber-700">已用 OCR</span> : null}
                  {ocrInfo.used_ocr && ocrStatus && ocrStatus.ocr_lang
                    ? <span>语言 {ocrStatus.ocr_lang}</span> : null}
                </div>
              )}

              {!ocrRunning && ocrStatus && ocrStatus.tesseract_available
                && !ocrStatus.chinese_available && (
                <div className="px-3 py-1.5 text-[10px] text-stone-500 border-b border-stone-100 bg-stone-50">
                  仅识别英文。如需识别中文，请在安装 Tesseract 时勾选 Chinese 语言包
                  （或安装 tesseract-ocr-chi-sim / chi-tra），然后重启程序。
                </div>
              )}

              {!ocrRunning && cameFromTextLayer && (
                <div className="px-3 py-2 text-[11px] text-amber-800 bg-amber-50 border-b border-amber-100 flex items-center justify-between gap-2">
                  <span>文字来自 PDF 文本层。若显示为乱码，可改用图像 OCR。</span>
                  <button
                    onClick={() => runOcr({ force: true })}
                    className="shrink-0 px-2 py-0.5 border border-amber-300 rounded hover:bg-amber-100 flex items-center gap-1"
                  >
                    <ScanText size={11} /> 强制 OCR
                  </button>
                </div>
              )}

              <div className="flex-1 min-h-0 overflow-auto p-3">
                {ocrRunning && (
                  <div className="h-full flex flex-col items-center justify-center text-stone-400 gap-2">
                    <Loader size={22} className="animate-spin" />
                    <div className="text-xs">正在识别，扫描件可能需要几秒…</div>
                  </div>
                )}
                {!ocrRunning && ocrError && (
                  <div className="text-xs text-red-600 whitespace-pre-wrap">{ocrError}</div>
                )}
                {!ocrRunning && !ocrError && ocrText && (
                  <textarea
                    value={ocrText}
                    onChange={(e) => { setOcrText(e.target.value); setSaved(false); }}
                    spellCheck={false}
                    className="w-full h-full resize-none text-[11px] leading-relaxed font-mono text-stone-800 outline-none"
                  />
                )}
                {!ocrRunning && !ocrError && !ocrText && (
                  <div className="text-xs text-stone-500 whitespace-pre-wrap">
                    {ocrHint || "未提取到文字。"}
                  </div>
                )}
              </div>

              <div className="px-3 py-2 border-t border-stone-200 bg-stone-50 flex items-center gap-2">
                <button
                  onClick={copyText}
                  disabled={!ocrText}
                  className="text-xs px-2.5 py-1 border border-stone-300 text-stone-700 hover:bg-white rounded flex items-center gap-1 disabled:opacity-40"
                >
                  <Copy size={12} /> {copied ? "已复制" : "复制"}
                </button>
                {onSaveOcr && (
                  <button
                    onClick={saveText}
                    disabled={ocrRunning}
                    title="把文字存入文档索引，使其可被搜索"
                    className="text-xs px-2.5 py-1 border border-emerald-300 text-emerald-800 bg-emerald-50 hover:bg-emerald-100 rounded flex items-center gap-1 disabled:opacity-40"
                  >
                    <Save size={12} /> {saved ? "已保存" : "保存并可搜索"}
                  </button>
                )}
                <span className="ml-auto text-[10px] text-stone-400">
                  {doc.ocrText ? "已索引" : "未保存"}
                </span>
              </div>
            </div>
          )}

          {/* Key-parameter extraction panel */}
          {panelMode === "keys" && (
            <div className="w-[44%] max-w-lg min-h-0 flex flex-col bg-white">
              <div className="flex items-center justify-between px-3 py-2 border-b border-stone-200 bg-stone-50">
                <div className="flex items-center gap-1.5 text-xs font-medium text-stone-700">
                  <ListChecks size={13} /> 关键参数提取
                </div>
                <button onClick={() => setPanelMode(null)} className="text-stone-400 hover:text-stone-700">
                  <X size={14} />
                </button>
              </div>

              {/* Key definitions: select which parameters to extract */}
              <div className="px-3 py-2 border-b border-stone-100">
                <div className="flex items-center justify-between mb-1">
                  <div className="text-[11px] text-stone-600">
                    勾选要提取的参数（未找到标记为 <span className="font-mono text-stone-700">NF</span>）
                  </div>
                  <div className="flex gap-2 text-[10px] shrink-0">
                    <button onClick={selectAllKeys} className="text-emerald-700 hover:underline">全选</button>
                    <button onClick={selectNoneKeys} className="text-stone-500 hover:underline">全不选</button>
                  </div>
                </div>

                <div className="max-h-40 overflow-auto border border-stone-200 rounded p-1.5 bg-stone-50 space-y-0.5">
                  {availableKeys.length === 0 && (
                    <div className="text-[11px] text-stone-400 italic px-1 py-1">
                      暂无参数。在下方添加新参数。
                    </div>
                  )}
                  {availableKeys.map((k) => {
                    const checked = selectedKeys.some((s) => s === k);
                    const isLocal = !globalSet.has(k.toLowerCase());
                    return (
                      <div key={k} className="flex items-center gap-1.5 px-1 py-0.5 hover:bg-white rounded group">
                        <label className="flex items-center gap-1.5 text-[11px] text-stone-700 cursor-pointer flex-1 min-w-0">
                          <input
                            type="checkbox"
                            checked={checked}
                            onChange={() => toggleKey(k)}
                            className="accent-emerald-600"
                          />
                          <span className="font-mono break-all">{k}</span>
                          {isLocal && (
                            <span className="text-[9px] text-amber-600 border border-amber-200 rounded px-1 shrink-0">本文档</span>
                          )}
                        </label>
                        {isLocal && (
                          <button
                            onClick={() => deleteLocalKey(k)}
                            title="删除此文档新增的参数（不影响全局参数）"
                            className="text-stone-300 hover:text-red-600 shrink-0"
                          >
                            <X size={12} />
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Add a new parameter under this document (not global) */}
                <div className="flex items-center gap-1.5 mt-2">
                  <input
                    type="text"
                    value={newKeyInput}
                    onChange={(e) => setNewKeyInput(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addNewKey(); } }}
                    placeholder="为本文档添加新参数（如 Heat No）"
                    className="flex-1 text-[11px] px-2 py-1 border border-stone-300 rounded font-mono focus:outline-none focus:border-emerald-500"
                  />
                  <button
                    onClick={addNewKey}
                    disabled={!newKeyInput.trim()}
                    title="为本文档添加参数并选中（不加入全局参数列表，可删除）"
                    className="text-xs px-2.5 py-1 border border-stone-300 text-stone-700 hover:bg-stone-100 rounded flex items-center gap-1 disabled:opacity-40"
                  >
                    <Plus size={12} /> 添加
                  </button>
                </div>

                {/* Same-line toggle (#4) */}
                <label className="flex items-center gap-1.5 mt-2 text-[10px] text-stone-500 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={!sameLineOnly}
                    onChange={(e) => setSameLineOnly(!e.target.checked)}
                    className="accent-emerald-600"
                  />
                  同一行没有值时，也搜索下一行（默认仅同一行）
                </label>

                <div className="flex items-center gap-2 mt-2">
                  <button
                    onClick={() => runExtract({ force: false })}
                    disabled={keyRunning}
                    className={"text-xs px-3 py-1.5 rounded flex items-center gap-1.5 border " +
                      (keyRunning
                        ? "border-stone-200 text-stone-400 cursor-wait"
                        : "border-emerald-300 text-emerald-800 bg-emerald-50 hover:bg-emerald-100")}
                  >
                    {keyRunning
                      ? (<><Loader size={13} className="animate-spin" /> 提取中…</>)
                      : (<><ListChecks size={13} /> 提取所选 ({selectedKeys.length})</>)}
                  </button>
                  {ocrText && ocrText.trim()
                    ? <span className="text-[10px] text-stone-400">从面板文字中提取</span>
                    : <span className="text-[10px] text-stone-400">从文档原文中提取</span>}
                </div>
              </div>

              {/* Results */}
              <div className="flex-1 min-h-0 overflow-auto p-3">
                {keyRunning && (
                  <div className="h-full flex flex-col items-center justify-center text-stone-400 gap-2">
                    <Loader size={22} className="animate-spin" />
                    <div className="text-xs">正在提取…</div>
                  </div>
                )}
                {!keyRunning && keyError && (
                  <div className="text-xs text-red-600 whitespace-pre-wrap">{keyError}</div>
                )}
                {!keyRunning && !keyError && keyRows && keyRows.length > 0 && (
                  <table className="w-full text-[11px] border-collapse">
                    <thead>
                      <tr className="text-stone-500 text-left border-b border-stone-200">
                        <th className="py-1 pr-2 font-medium">关键字</th>
                        <th className="py-1 font-medium">提取值（实测值）</th>
                      </tr>
                    </thead>
                    <tbody>
                      {keyRows.map((row, idx) => (
                        <tr key={row.key + idx} className="border-b border-stone-100 align-top">
                          <td className="py-1 pr-2 font-mono text-stone-700 break-all w-2/5">{row.key}</td>
                          <td className="py-1">
                            <div className="flex items-center gap-1">
                              <input
                                type="text"
                                value={row.value}
                                onChange={(e) => editRowValue(idx, e.target.value)}
                                className={"flex-1 text-[11px] px-1.5 py-0.5 border rounded focus:outline-none focus:border-emerald-500 " +
                                  (row.found ? "border-stone-300 text-stone-800" : "border-stone-200 text-stone-400 italic")}
                              />
                              {!row.found && (
                                <span className="text-[9px] text-stone-400 shrink-0">NF</span>
                              )}
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
                {!keyRunning && !keyError && keyRows && keyRows.length === 0 && (
                  <div className="text-xs text-stone-500">没有有效的关键字。</div>
                )}
                {!keyRunning && !keyError && !keyRows && (
                  <div className="text-xs text-stone-400">
                    输入关键字后点击"提取"。提取结果可在此编辑，再保存到文档字段。
                  </div>
                )}
                {!keyRunning && keyHint && (
                  <div className="text-[11px] text-amber-700 bg-amber-50 border border-amber-100 rounded px-2 py-1 mt-2">
                    {keyHint}
                  </div>
                )}

                {/* Diagnostics: shown when nothing was found, to reveal why */}
                {!keyRunning && keyDiag && keyDiag.foundCount === 0 && (
                  <div className="mt-2 border border-stone-200 rounded">
                    <div className="px-2 py-1.5 bg-stone-50 border-b border-stone-100 flex items-center justify-between">
                      <span className="text-[10px] text-stone-600">
                        读取到 {keyDiag.charCount} 字符的文字
                        {keyDiag.usedText ? "（面板文字）" : "（文档原文）"}
                        {keyDiag.forced ? " · 已用 OCR" : ""}
                      </span>
                      {ocrEligible && !keyDiag.forced && (
                        <button
                          onClick={() => runExtract({ force: true })}
                          title="忽略文本层，用图像 OCR 重新读取后再提取"
                          className="text-[10px] px-2 py-0.5 border border-amber-300 text-amber-800 bg-amber-50 hover:bg-amber-100 rounded flex items-center gap-1"
                        >
                          <ScanText size={10} /> 用 OCR 重新提取
                        </button>
                      )}
                    </div>
                    <div className="p-2">
                      <div className="text-[10px] text-stone-500 mb-1">
                        程序读到的文字（前 600 字）。请检查关键字是否真的出现、其值是否与关键字在同一行：
                      </div>
                      <pre className="text-[10px] leading-snug font-mono text-stone-700 whitespace-pre-wrap max-h-32 overflow-auto bg-stone-50 rounded p-1.5 border border-stone-100">

// Uncontrolled input that supports Chinese IME without React resetting the DOM value mid-composition.
const ImeInput = ({ value, onCommit, placeholder, className }) => {
  const ref = React.useRef(null);
  const composing = React.useRef(false);
  const lastExternal = React.useRef(value);

  React.useEffect(() => {
    if (ref.current && !composing.current && value !== lastExternal.current) {
      ref.current.value = value;
    }
    lastExternal.current = value;
  }, [value]);

  return (
    <input
      ref={ref}
      type="text"
      defaultValue={value}
      placeholder={placeholder}
      className={className}
      onCompositionStart={() => { composing.current = true; }}
      onCompositionEnd={(e) => { composing.current = false; onCommit(e.target.value); }}
      onChange={(e) => { if (!composing.current) onCommit(e.target.value); }}
    />
  );
};

const MetadataEditor = ({ metadata, onChange, keyParameters = [] }) => {
  const entries = Object.entries(metadata || {});
  const suggestions = normalizeKeyParameters(keyParameters);

  const updateKey = (oldKey, newKey) => {
    const clean = (newKey || "").trim();
    if (!clean || clean === oldKey) return;
    const m = { ...(metadata || {}) };
    m[clean] = m[oldKey];
    delete m[oldKey];
    onChange(m);
  };
  const updateValue = (key, subField, val) => {
    const prev = (metadata || {})[key];
    const prevObj = (prev && typeof prev === "object") ? prev : { design: typeof prev === "string" ? prev : "", actual: "" };
    onChange({ ...(metadata || {}), [key]: { ...prevObj, [subField]: val } });
  };

  const nextUnusedKey = () => {
    const used = new Set(Object.keys(metadata || {}).map((k) => k.toLowerCase()));
    const suggested = suggestions.find((k) => !used.has(k.toLowerCase()));
    if (suggested) return suggested;
    let key = "field"; let i = 1;
    while ((metadata || {})[key] !== undefined) key = `field_${++i}`;
    return key;
  };

  const addField = () => {
    const key = nextUnusedKey();
    onChange({ ...(metadata || {}), [key]: { design: "", actual: "" } });
  };
  const removeField = (key) => {
    const m = { ...(metadata || {}) }; delete m[key]; onChange(m);
  };

  const FieldKeyPicker = ({ currentKey }) => {
    const matchedSuggestion = suggestions.find((k) => k.toLowerCase() === currentKey.toLowerCase());
    const isListed = !!matchedSuggestion;
    const selectValue = isListed ? matchedSuggestion : "__current_custom__";

    const renameCustom = () => {
      const next = window.prompt("请输入新的字段/关键参数名称：", isListed ? "" : currentKey);
      if (next === null) return;
      const clean = (next || "").trim();
      if (!clean) return;
      updateKey(currentKey, clean);
    };

    return (
      <select
        value={selectValue}
        onChange={(e) => {
          const v = e.target.value;
          if (v === "__enter_new__") {
            renameCustom();
            return;
          }
          if (v === "__current_custom__") return;
          updateKey(currentKey, v);
        }}
        onDoubleClick={() => {
          if (!isListed) renameCustom();
        }}
        title={isListed
          ? "从全局关键参数列表中选择，或选择\"自定义/新增\""
          : "自定义字段。打开列表选择全局键，或双击重命名此自定义字段。"
        }
        className={`text-xs px-2 py-1 border rounded w-1/3 min-w-[220px] font-mono bg-stone-50 focus:outline-none focus:border-amber-600 ${
          isListed ? "border-stone-300" : "border-amber-400 text-amber-800"
        }`}
      >
        {!isListed && <option value="__current_custom__">{currentKey}</option>}
        {suggestions.map((k) => <option key={k} value={k}>{k}</option>)}
        <option value="__enter_new__">自定义 / 新增...</option>
      </select>
    );
  };

  return (
    <div className="space-y-1.5">
      <div className="text-[10px] text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1">
        字段名称使用全局关键参数下拉列表。从列表中选择，或选择"自定义/新增"以输入不在列表中的字段。
      </div>

      {entries.length === 0 && (
        <div className="text-xs text-stone-500 italic py-2">
          暂无元数据。点击"添加字段"，从下拉列表中选择或输入自定义关键参数。
        </div>
      )}

      {entries.map(([key, val]) => {
        const valObj = (val && typeof val === "object") ? val : { design: typeof val === "string" ? val : "", actual: "" };
        return (
          <div key={key} className="space-y-1">
            <div className="flex gap-1.5 items-center">
              <FieldKeyPicker currentKey={key} />
              <button onClick={() => removeField(key)} className="text-stone-400 hover:text-red-600 p-1 ml-auto">
                <X size={12} />
              </button>
            </div>
            <div className="flex gap-1.5 items-center pl-1">
              <span className="text-[10px] text-stone-500 w-[90px] shrink-0 text-right pr-1">设计 / 要求</span>
              <ImeInput
                value={valObj.design}
                onCommit={(v) => updateValue(key, "design", v)}
                placeholder="设计值或标准要求"
                className="text-xs px-2 py-1 border border-stone-300 rounded flex-1 focus:outline-none focus:border-amber-600"
              />
            </div>
            <div className="flex gap-1.5 items-center pl-1 pb-1 border-b border-stone-100">
              <span className="text-[10px] text-stone-500 w-[90px] shrink-0 text-right pr-1">实测值</span>
              <ImeInput
                value={valObj.actual}
                onCommit={(v) => updateValue(key, "actual", v)}
                placeholder="实测值"
                className="text-xs px-2 py-1 border border-stone-300 rounded flex-1 focus:outline-none focus:border-amber-600"
              />
            </div>
          </div>
        );
      })}
      <button onClick={addField} className="text-[11px] text-stone-600 hover:text-amber-700 flex items-center gap-1 mt-1">
        <Plus size={11} /> 添加字段
      </button>
    </div>
  );
};

const SearchPanel = ({ index, refMap, getPathFor, onOpenDoc, onJumpToNode, tree, scopeNodeId }) => {
  const [q, setQ] = useState("");
  const [showUnref, setShowUnref] = useState(false);
  const [scopeToFolder, setScopeToFolder] = useState(false);

  const scopeNode = useMemo(
    () => (tree && scopeNodeId ? findNode(tree, scopeNodeId) : null),
    [tree, scopeNodeId]
  );

  useEffect(() => { if (!scopeNode) setScopeToFolder(false); }, [scopeNode]);

  const scopeDocIdSet = useMemo(() => {
    if (!scopeToFolder || !scopeNode) return null;
    return new Set(collectAllDocIds(scopeNode));
  }, [scopeToFolder, scopeNode]);

  const results = useMemo(() => {
    const words = q.trim().toLowerCase().split(/\s+/).filter(Boolean);
    let pool = index;
    if (scopeDocIdSet) pool = pool.filter((d) => scopeDocIdSet.has(d.id));
    if (showUnref) pool = pool.filter((d) => !(refMap.get(d.id)?.length));
    if (!words.length) return pool;
    return pool.filter((entry) => {
      const haystack = [
        entry.id,
        entry.name || "",
        entry.sn || "",
        entry.ocrText || "",
        ...Object.keys(entry.metadata || {}),
        ...Object.values(entry.metadata || {}).map((v) => {
          if (v && typeof v === "object") return `${v.design || ""} ${v.actual || ""}`;
          return String(v);
        }),
      ].join(" ").toLowerCase();
      return words.every((w) => haystack.includes(w));
    });
  }, [q, index, refMap, showUnref, scopeDocIdSet]);

  const unrefCount = useMemo(
    () => index.filter((d) => !(refMap.get(d.id)?.length)).length,
    [index, refMap]
  );

  const poolSize = useMemo(() => {
    let p = scopeDocIdSet ? index.filter((d) => scopeDocIdSet.has(d.id)) : index;
    if (showUnref) p = p.filter((d) => !(refMap.get(d.id)?.length));
    return p.length;
  }, [index, refMap, showUnref, scopeDocIdSet]);

  return (
    <div className="p-3 space-y-2">
      <div className="relative">
        <Search size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400" />
        <input
          type="text"
          value={q}
          onChange={(e) => setQ(e.target.value)}
          placeholder="按编号、名称或元数据搜索…"
          className="w-full pl-8 pr-3 py-1.5 text-xs border border-stone-300 rounded focus:outline-none focus:border-amber-600"
        />
      </div>
      {scopeNode && (
        <label className="flex items-center gap-1.5 text-[11px] text-stone-600 cursor-pointer">
          <input
            type="checkbox"
            checked={scopeToFolder}
            onChange={(e) => setScopeToFolder(e.target.checked)}
          />
          <span>仅限此节点及子节点：</span>
          <span className="font-medium text-amber-700 truncate max-w-[100px]" title={scopeNode.name}>
            {scopeNode.name}
          </span>
        </label>
      )}
      <div className="flex items-center justify-between">
        <label className="flex items-center gap-1.5 text-[11px] text-stone-600 cursor-pointer">
          <input
            type="checkbox"
            checked={showUnref}
            onChange={(e) => setShowUnref(e.target.checked)}
          />
          仅显示未引用
          {unrefCount > 0 && (
            <span className="text-[10px] tabular-nums px-1 bg-amber-100 text-amber-800 rounded">
              {unrefCount}
            </span>
          )}
        </label>
        <span className="text-[11px] text-stone-500">
          {q.trim()
            ? `共 ${poolSize} 条，匹配 ${results.length} 条`
            : `共 ${results.length} 份文档`}
        </span>
      </div>
      <div className="space-y-1 max-h-[60vh] overflow-auto">
        {results.map((r) => {
          const refs = refMap.get(r.id) || [];
          return (
            <div
              key={r.id}
              className="border border-stone-200 rounded p-2 text-xs hover:bg-amber-50 hover:border-amber-300 cursor-pointer"
              title="单击打开 · 双击跳转到节点"
              onClick={() => onOpenDoc(r.id)}
              onDoubleClick={(e) => { e.preventDefault(); refs[0] && onJumpToNode(refs[0]); }}
            >
              <div className="font-medium text-stone-800 truncate">{r.name}</div>
              <div className="font-mono text-[10px] text-stone-500 mt-0.5">{r.id}</div>
              {refs.length === 0 && (
                <div className="text-[10px] text-amber-700 mt-0.5 italic">未引用</div>
              )}
              {refs.map((nodeId) => (
                <div
                  key={nodeId}
                  className="text-[10px] text-amber-700 mt-0.5 truncate hover:underline"
                  onClick={(e) => { e.stopPropagation(); onJumpToNode(nodeId); }}
                >
                  📁 {getPathFor(nodeId)}
                </div>
              ))}
              {Object.keys(r.metadata || {}).length > 0 && (
                <div className="flex flex-wrap gap-1 mt-1">
                  {Object.entries(r.metadata).map(([k, v]) => {
                    const valObj = (v && typeof v === "object") ? v : { design: String(v), actual: "" };
                    return (
                      <span key={k} className="text-[9px] bg-stone-100 px-1.5 py-0.5 rounded font-mono">
                        {k}: {valObj.design || "—"} / {valObj.actual || "—"}
                      </span>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* =============================================================================
 * UI: DATABOOK PANEL
 * ---------------------------------------------------------------------------
 * A third sidebar tab. Renders the entire tree with checkboxes for every
 * document. Lets the user pick what to include, then generates a PDF.
 *
 * Selection state is held as: Map<nodeId, Set<docId>>
 *   — a doc selected at multiple linked nodes counts separately, so the
 *     databook will include it once per linked node (matching how the user
 *     organized them).
 * =============================================================================
 */
const DatabookPanel = ({ tree, docIndex, getPathFor, formatBytes }) => {
  // Map<nodeId, Set<docId>>
  const [selection, setSelection] = useState(new Map());
  const [expanded, setExpanded] = useState(new Set());
  const [generating, setGenerating] = useState(false);
  const [showTitleDialog, setShowTitleDialog] = useState(false);
  const [title, setTitle] = useState("Engineering Databook");
  const [subtitle, setSubtitle] = useState("");
  const [error, setError] = useState(null);

  const docsById = useMemo(() => new Map(docIndex.map((d) => [d.id, d])), [docIndex]);

  // Auto-expand the root node once the tree is available
  useEffect(() => {
    if (tree && tree.id && !expanded.has(tree.id)) {
      setExpanded((prev) => new Set([...prev, tree.id]));
    }
  }, [tree?.id]);

  // Load persisted selection (so iterating on a databook is easy)
  useEffect(() => {
    try {
      const saved = localStorage.getItem("dms:databook-selection");
      if (saved) {
        const obj = JSON.parse(saved);
        const m = new Map();
        for (const [nid, docs] of Object.entries(obj)) m.set(nid, new Set(docs));
        setSelection(m);
      }
      const t = localStorage.getItem("dms:databook-title");
      if (t) setTitle(t);
      const s = localStorage.getItem("dms:databook-subtitle");
      if (s) setSubtitle(s);
    } catch {}
  }, []);

  // Persist selection on change
  useEffect(() => {
    const obj = {};
    for (const [nid, docs] of selection) obj[nid] = Array.from(docs);
    try {
      localStorage.setItem("dms:databook-selection", JSON.stringify(obj));
    } catch {}
  }, [selection]);

  const toggleExpand = (id) =>
    setExpanded((prev) => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id);
      else n.add(id);
      return n;
    });

  const isDocSelected = (nodeId, docId) =>
    !!selection.get(nodeId)?.has(docId);

  const toggleDoc = (nodeId, docId) => {
    setSelection((prev) => {
      const next = new Map(prev);
      const set = new Set(next.get(nodeId) || []);
      if (set.has(docId)) set.delete(docId);
      else set.add(docId);
      if (set.size === 0) next.delete(nodeId);
      else next.set(nodeId, set);
      return next;
    });
  };

  // Node-level selection state: returns "all" | "some" | "none"
  // considering the docs directly attached to this node (NOT descendants).
  const nodeOwnState = (node) => {
    const docs = node.documents || [];
    if (docs.length === 0) return "none";
    const sel = selection.get(node.id);
    if (!sel || sel.size === 0) return "none";
    const allSelected = docs.every((d) => sel.has(d.id));
    return allSelected ? "all" : "some";
  };

  const setNodeAll = (node, on) => {
    setSelection((prev) => {
      const next = new Map(prev);
      const allDocIds = (node.documents || []).map((d) => d.id);
      if (on) {
        next.set(node.id, new Set(allDocIds));
      } else {
        next.delete(node.id);
      }
      return next;
    });
  };

  // Recursive: select all (or none) in this node + all descendants
  const setSubtreeAll = (node, on) => {
    setSelection((prev) => {
      const next = new Map(prev);
      const walk = (n) => {
        const ids = (n.documents || []).map((d) => d.id);
        if (on && ids.length) next.set(n.id, new Set(ids));
        else if (!on) next.delete(n.id);
        (n.children || []).forEach(walk);
      };
      walk(node);
      return next;
    });
  };

  const totalSelected = useMemo(() => {
    let n = 0;
    for (const set of selection.values()) n += set.size;
    return n;
  }, [selection]);

  const clearAll = () => setSelection(new Map());
  const selectAll = () => tree && setSubtreeAll(tree, true);

  // Build the ordered selection payload: tree-order traversal, only include
  // nodes that have selected docs.
  const buildPayload = () => {
    if (!tree) return [];
    const out = [];
    const walk = (node) => {
      const set = selection.get(node.id);
      if (set && set.size) {
        // Preserve the original order of documents attached to this node
        const orderedIds = (node.documents || [])
          .map((d) => d.id)
          .filter((id) => set.has(id));
        if (orderedIds.length) out.push({ nodeId: node.id, docIds: orderedIds });
      }
      (node.children || []).forEach(walk);
    };
    walk(tree);
    return out;
  };

  const generate = async () => {
    setError(null);
    setGenerating(true);
    try {
      const payload = {
        title: title.trim() || "Engineering Databook",
        subtitle: subtitle.trim(),
        selection: buildPayload(),
      };
      try {
        localStorage.setItem("dms:databook-title", title);
        localStorage.setItem("dms:databook-subtitle", subtitle);
      } catch {}

      const res = await fetch("/api/databook", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch {}
        throw new Error(msg);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = (title.trim() || "Databook") + ".pdf";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setShowTitleDialog(false);
    } catch (e) {
      setError(e.message);
    } finally {
      setGenerating(false);
    }
  };

  // Render one node row
  const renderNode = (node, depth = 0) => {
    const isExpanded = expanded.has(node.id);
    const hasChildren = (node.children || []).length > 0;
    const docs = node.documents || [];
    const ownState = nodeOwnState(node);

    return (
      <div key={node.id}>
        <div
          onClick={() => hasChildren && toggleExpand(node.id)}
          className={`flex items-center gap-1.5 py-1 pr-2 text-xs hover:bg-stone-50 ${
            hasChildren ? "cursor-pointer" : ""
          }`}
          style={{ paddingLeft: `${depth * 14 + 4}px` }}
        >
          <span className="w-3.5 flex items-center justify-center text-stone-500">
            {hasChildren ? (
              isExpanded ? <ChevronDown size={12} /> : <ChevronRight size={12} />
            ) : <span className="w-2.5" />}
          </span>

          <button
            onClick={(e) => {
              e.stopPropagation();
              setNodeAll(node, ownState !== "all");
            }}
            disabled={docs.length === 0}
            className={`shrink-0 p-0.5 ${
              docs.length === 0 ? "opacity-25 cursor-not-allowed text-stone-400"
                : "text-amber-700 hover:text-amber-900"
            }`}
            title={
              docs.length === 0
                ? "此节点暂无直接附加文档"
                : ownState === "all" ? "取消选择此节点的所有文档" : "选择此节点的所有文档"
            }
          >
            {ownState === "all" ? <CheckSquare size={13} />
              : ownState === "some" ? <MinusSquare size={13} />
              : <Square size={13} />}
          </button>

          <Folder size={13} className="text-amber-700 shrink-0" />
          <span className="truncate flex-1 text-stone-800">{node.name}</span>

          {docs.length > 0 && (
            <span className="text-[10px] tabular-nums px-1 bg-stone-100 text-stone-600 rounded">
              {docs.length}
            </span>
          )}

          {hasChildren && (
            <button
              onClick={(e) => {
                e.stopPropagation();
                setSubtreeAll(node, true);
              }}
              className="text-[9px] uppercase tracking-wider text-stone-400 hover:text-amber-700 px-1"
              title="选择此子树下的所有文档"
            >
              全选↓
            </button>
          )}
        </div>

        {/* Documents at this node */}
        {isExpanded && docs.map((ref) => {
          const doc = docsById.get(ref.id);
          if (!doc) return null;
          const sel = isDocSelected(node.id, ref.id);
          return (
            <div
              key={node.id + ":" + ref.id}
              onClick={() => toggleDoc(node.id, ref.id)}
              className={`flex items-center gap-1.5 py-0.5 pr-2 text-xs cursor-pointer ${
                sel ? "bg-amber-50" : "hover:bg-stone-50"
              }`}
              style={{ paddingLeft: `${(depth + 1) * 14 + 12}px` }}
            >
              <span className="text-stone-400 shrink-0">
                {sel ? <CheckSquare size={12} className="text-amber-700" /> : <Square size={12} />}
              </span>
              {doc.mime?.startsWith("image/")
                ? <ImageIcon size={11} className="text-stone-500 shrink-0" />
                : <FileText size={11} className="text-stone-500 shrink-0" />}
              <span className="truncate text-stone-700">{doc.name}</span>
              <span className="text-[10px] text-stone-400 shrink-0 font-mono">
                {formatBytes(doc.size)}
              </span>
            </div>
          );
        })}

        {/* Children */}
        {isExpanded && (node.children || []).map((c) => renderNode(c, depth + 1))}
      </div>
    );
  };

  if (!tree) return null;

  return (
    <div className="flex flex-col h-full">
      {/* Toolbar */}
      <div className="border-b border-stone-200 p-2 space-y-2">
        <div className="flex gap-1">
          <button
            onClick={selectAll}
            className="flex-1 text-[11px] px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded"
          >
            全选
          </button>
          <button
            onClick={clearAll}
            disabled={totalSelected === 0}
            className="flex-1 text-[11px] px-2 py-1 border border-stone-300 hover:bg-stone-100 rounded disabled:opacity-40"
          >
            清除

        <div className="text-[11px] text-stone-600 flex items-center justify-between">
          <span>
            已选 <span className="font-mono tabular-nums">{totalSelected}</span> 份文档
          </span>
        </div>
      </div>

      {/* Tree */}
      <div className="flex-1 overflow-auto py-1">
        {renderNode(tree)}
      </div>

      {/* Generate button */}
      <div className="border-t border-stone-200 p-2">
        <button
          onClick={() => setShowTitleDialog(true)}
          disabled={totalSelected === 0}
          className="w-full px-3 py-2 bg-amber-600 hover:bg-amber-700 text-white text-xs font-medium rounded disabled:opacity-40 flex items-center justify-center gap-1.5"
        >

        <div className="text-[10px] text-stone-500 text-center mt-1.5 leading-tight">
          生成包含封面、目录、章节标题、书签及页码的单一 PDF。

      {/* Title/subtitle dialog */}

        <div

  );
};


/* =============================================================================
