            </div>
          )}

          {tab === "browse" && (
            <>
              <div className="w-1/3 border-r border-stone-200 overflow-auto">
                {tree && renderBrowseTree(tree)}
              </div>
              <div className="flex-1 p-3 overflow-auto">
                {browseNode && (
                  <>
                    <div className="text-[11px] font-mono text-stone-500 mb-2">
                      {getPathFor(browseNode.id)}
                    </div>
                    <div className="text-xs uppercase tracking-wider text-stone-600 mb-2">
                      已附加文档
                    </div>
                    <div className="space-y-1.5">
                      {browseDocs.length === 0 && (
                        <div className="text-xs text-stone-500 italic">
                          此节点暂无附加文档。
                        </div>
                      )}
                      {browseDocs.map(renderRow)}
                    </div>
                  </>
                )}
              </div>
            </>
          )}
        </div>

        <div className="px-4 py-3 border-t border-stone-200 flex items-center justify-between">
          <div className="text-xs text-stone-600">
            {selectedIds.size > 0
              ? `已选择 ${selectedIds.size} 份文档`
              : "请选择一个或多个文档进行链接"}
          </div>
          <div className="flex gap-2">
            <button
              onClick={onClose}
              className="px-4 py-1.5 text-xs border border-stone-300 hover:bg-stone-100 rounded"
            >
              取消
            </button>
            <button
              onClick={commit}
              disabled={selectedIds.size === 0}
              className="px-4 py-1.5 text-xs bg-amber-600 hover:bg-amber-700 text-white rounded disabled:opacity-40"
            >
              链接 {selectedIds.size > 0 ? `(${selectedIds.size})` : ""}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* =============================================================================
 * MAIN APP
 * =============================================================================
 */
function DMS({ storagePath, onChangeFolder }) {
  const importFileRef = useRef(null);

  const triggerImportAndRun = () => {
    if (importFileRef.current) {
      importFileRef.current.value = "";
      importFileRef.current.click();
    }
  };

  const onImportFileChosen = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = "";
    if (!window.confirm(`导入 "${file.name}" 并替换当前项目内容？`)) return;
    try {
      const form = new FormData();
      form.append("file", file);
      const res = await fetch("/api/project/import", { method: "POST", body: form });
      const data = await res.json();
      if (data.ok) {
        window.location.reload();
      } else {
        window.alert("导入失败：" + (data.error || "未知错误"));
      }
    } catch (err) {
      window.alert("导入失败：" + err.message);
    }
  };

  const [tree, setTree] = useState(null);
  const [docIndex, setDocIndex] = useState([]);
  const [photoRootNodeId, setPhotoRootNodeId] = useState("");
  const [selectedId, setSelectedId] = useState(null);
  const [expandedIds, setExpandedIds] = useState(new Set());
  const [viewerDoc, setViewerDoc] = useState(null);
  const [loading, setLoading] = useState(true);
  const [editingNode, setEditingNode] = useState(false);
  const [tab, setTab] = useState("tree");
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [showTextTree, setShowTextTree] = useState(false);   // box-drawing tree view
  const [textTreeMeta, setTextTreeMeta] = useState(false);   // include SN + doc counts
  const [textTreeCopied, setTextTreeCopied] = useState(false);
  const [dupDialog, setDupDialog] = useState(null); // { duplicates, allFiles, targetNodeId }
  const [uploadStatus, setUploadStatus] = useState(null); // { done, total } or null

  // Resizable sidebar — width in pixels, persisted in localStorage.
  // Min/max prevent absurdly small or huge sidebars.
  const SIDEBAR_MIN = 220;
  const SIDEBAR_MAX = 720;
  const SIDEBAR_DEFAULT = 320;
  const [sidebarWidth, setSidebarWidth] = useState(() => {
    try {
      const saved = parseInt(localStorage.getItem("dms:sidebar-width"), 10);
      if (saved && saved >= SIDEBAR_MIN && saved <= SIDEBAR_MAX) return saved;
    } catch {}
    return SIDEBAR_DEFAULT;
  });
  const [resizing, setResizing] = useState(false);

  // While dragging, listen on the window so movement outside the handle still works
  useEffect(() => {
    if (!resizing) return;
    const onMove = (e) => {
      const w = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, e.clientX));
      setSidebarWidth(w);
    };
    const onUp = () => {
      setResizing(false);
      try { localStorage.setItem("dms:sidebar-width", String(sidebarWidth)); } catch {}
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    // Prevent text selection while dragging
    document.body.style.userSelect = "none";
    document.body.style.cursor = "col-resize";
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    };
  }, [resizing, sidebarWidth]);

  // Save width on every change after dragging ends
  useEffect(() => {
    if (resizing) return;
    try { localStorage.setItem("dms:sidebar-width", String(sidebarWidth)); } catch {}
  }, [sidebarWidth, resizing]);

  // Double-click on the handle resets to default width
  const resetSidebarWidth = () => setSidebarWidth(SIDEBAR_DEFAULT);
  const [renamingId, setRenamingId] = useState(null);
  const [addingChildToId, setAddingChildToId] = useState(null);
  const [contextMenu, setContextMenu] = useState(null);
  const [showLinkPicker, setShowLinkPicker] = useState(false);
  const [showProjectMenu, setShowProjectMenu] = useState(false);
  const [showKeyParameters, setShowKeyParameters] = useState(false);
  const [showHierarchyImport, setShowHierarchyImport] = useState(false);
  const [showZipImport, setShowZipImport] = useState(false);
  const [showCombineModal, setShowCombineModal] = useState(false);
  const [keyParameters, setKeyParameters] = useState(DEFAULT_KEY_PARAMETERS);
  const ctxUploadInputRef = useRef(null);
  const ctxUploadTargetRef = useRef(null);
  const [draggingId, setDraggingId] = useState(null);
  const [dropInfo, setDropInfo] = useState(null);
  const draggingIdRef = useRef(null);
  const dropInfoRef = useRef(null);

  // ---- MIGRATION ---------------------------------------------------------
  // Older DMS data stored full document records inside each node's documents[]
  // list. The new schema stores only {id} references in nodes, with the
  // canonical record living in docIndex. Detect old-format data and convert
  // it once on load.
  const migrateIfNeeded = (loadedTree, loadedIndex) => {
    if (!loadedTree) return { tree: loadedTree, index: loadedIndex, migrated: false };

    let migrated = false;
    const indexById = new Map(loadedIndex.map((e) => [e.id, e]));

    const walkNode = (node) => {
      const newDocs = [];
      for (const d of (node.documents || [])) {
        if (d && typeof d === "object" && d.id && Object.keys(d).length === 1) {
          // Already in new format: just an {id} reference
          newDocs.push(d);
          continue;
        }
        if (d && d.id) {
          // Old format: full record nested in node. Promote it to docIndex
          // (if not already there) and replace with a bare reference.
          migrated = true;
          if (!indexById.has(d.id)) {
            indexById.set(d.id, {
              id: d.id,
              name: d.name,
              mime: d.mime,
              size: d.size,
              uploadedAt: d.uploadedAt,
              originalNodeId: node.id,
              metadata: d.metadata || {},
            });
          }
          newDocs.push({ id: d.id });
        }
      }
      return {
        ...node,
        documents: newDocs,
        children: (node.children || []).map(walkNode),
      };
    };

    const newTree = walkNode(loadedTree);
    const newIndex = Array.from(indexById.values()).map((e) => {
      // Strip stale fields the old index used to carry (nodeId, nodePath)
      const { nodeId, nodePath, ...rest } = e;
      return {
        ...rest,
        // Preserve originalNodeId if present, else derive from the old nodeId
        originalNodeId: rest.originalNodeId || nodeId || null,
      };
    });

    if (migrated) {
      console.log("[DMS] Migrated existing data to linked-document schema.");
    }
    return { tree: newTree, index: newIndex, migrated };
  };

  useEffect(() => {
    (async () => {
      const treeResp = await StorageAdapter.getTree();
      let t = treeResp.tree;
      if (!t) {
        t = buildSeedTree();
        await StorageAdapter.saveTree(t);
      }
      setPhotoRootNodeId(treeResp.photoRootNodeId || "");

      const rawIdx = await StorageAdapter.listDocumentIndex();
      const savedKeyParameters = await StorageAdapter.getKeyParameters();
      setKeyParameters(savedKeyParameters);

      const { tree: migratedTree, index: migratedIndex, migrated } =
        migrateIfNeeded(t, rawIdx);

      if (migrated) {
        await StorageAdapter.saveTree(migratedTree);
        await StorageAdapter.saveDocumentIndex(migratedIndex);
      }

      setTree(migratedTree);
      setDocIndex(migratedIndex);
      setSelectedId(migratedTree.id);
      setExpandedIds(new Set([migratedTree.id]));
      setLoading(false);
    })();
  }, []);

  const persistTree = useCallback(async (newTree) => {
    setTree(newTree);
    await StorageAdapter.saveTree(newTree);
  }, []);

  const persistIndex = useCallback(async (newIndex) => {
    setDocIndex(newIndex);
    await StorageAdapter.saveDocumentIndex(newIndex);
  }, []);

  const persistKeyParameters = useCallback(async (newKeyParameters) => {
    const clean = normalizeKeyParameters(newKeyParameters);
    setKeyParameters(clean);
    await StorageAdapter.saveKeyParameters(clean);
  }, []);

  // Add a single new parameter to the global list (if not already present).
  // Returns the cleaned name so callers can select it immediately.
  const handleAddKeyParameter = useCallback(async (name) => {
    const clean = String(name || "").trim();
    if (!clean) return null;
    const exists = keyParameters.some((k) => k.toLowerCase() === clean.toLowerCase());
    if (!exists) {
      await persistKeyParameters([...keyParameters, clean]);
    }
    return clean;
  }, [keyParameters, persistKeyParameters]);

  const getNodePathFrom = (rootTree, nodeId) => {
    if (!rootTree) return "";
    const path = [];
    const walk = (n, trail) => {
      const t = [...trail, n.name];
      if (n.id === nodeId) { path.push(...t); return true; }
      for (const c of n.children || []) if (walk(c, t)) return true;
      return false;
    };
    walk(rootTree, []);
    return path.join(" / ");
  };

  const getNodePath = (nodeId) => getNodePathFrom(tree, nodeId);
  const selectedNode = tree && selectedId ? findNode(tree, selectedId) : null;

  const toggleExpand = (id) => {
    setExpandedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const expandToNode = (nodeId) => {
    if (!tree) return;
    const ids = new Set(expandedIds);
    const walk = (n, trail) => {
      const t = [...trail, n.id];
      if (n.id === nodeId) { t.forEach((x) => ids.add(x)); return true; }
      for (const c of n.children || []) if (walk(c, t)) return true;
      return false;
    };
    walk(tree, []);
    setExpandedIds(ids);
    setSelectedId(nodeId);
    setTab("tree");
  };

  // Node operations
  const startAddChildFromToolbar = () => {
    if (!selectedNode) return;
    setAddingChildToId(selectedId);
    setExpandedIds((prev) => new Set([...prev, selectedId]));
  };

  const handleCommitAddChild = async (parentId, name) => {
    const parentNode = findNode(tree, parentId);
    if ((parentNode?.children || []).some(c => c.name === name)) {
      alert(`同级节点下已存在名为"${name}"的文件夹。`);
      return;
    }
    const newNode = { id: genNodeId(), name, description: "", children: [], documents: [] };
    const newTree = updateNodeInTree(tree, parentId, (n) => ({
      ...n, children: [...(n.children || []), newNode],
    }));
    await persistTree(newTree);
    setExpandedIds((prev) => new Set([...prev, parentId]));
    setAddingChildToId(null);
    setSelectedId(newNode.id);
  };

  const handleCommitRename = async (nodeId, newName) => {
    const parentNode = findParentNode(tree, nodeId);
    if (parentNode) {
      const siblings = (parentNode.children || []).filter(c => c.id !== nodeId);
      if (siblings.some(c => c.name === newName)) {
        alert(`同级节点下已存在名为"${newName}"的文件夹。`);
        setRenamingId(null);
        return;
      }
    }
    const newTree = updateNodeInTree(tree, nodeId, (n) => ({ ...n, name: newName }));
    await persistTree(newTree);
    const refreshedIndex = docIndex.map((entry) => ({
      ...entry, nodePath: getNodePathFrom(newTree, entry.nodeId),
    }));
    await persistIndex(refreshedIndex);
    setRenamingId(null);
  };

  const handleDeleteNode = async (nodeId) => {
    if (!tree || nodeId === tree.id) {
      alert("无法删除根节点。");
      return;
    }
    const target = findNode(tree, nodeId);
    if (!target) return;
    const childCount = (target.children || []).length;
    const docCount = collectAllDocIds(target).length;
    const detail = childCount || docCount
      ? `\n\n此操作将删除该节点下的 ${childCount} 个子节点及 ${docCount} 个文档链接。未在其他位置链接的文档将移至"未引用"列表（文件保留在磁盘上）。`
      : "";
    if (!confirm(`确定删除"${target.name}"？${detail}\n\n此操作无法撤销。`)) return;

    // Just remove the subtree. Links die with their nodes, but the actual
    // files and the docIndex stay intact — orphaned documents become
    // "unreferenced" and are still searchable / re-linkable.
    const newTree = removeNodeFromTree(tree, nodeId);
    await persistTree(newTree);
    if (selectedId === nodeId) setSelectedId(tree.id);
  };

  const handleMoveNode = async (nodeId, direction) => {
    const newTree = moveNodeInTree(tree, nodeId, direction);
    setSelectedId(nodeId);
    await persistTree(newTree);
  };

  const handleDragStart = (nodeId) => {
    draggingIdRef.current = nodeId;
    dropInfoRef.current = null;
    setDraggingId(nodeId);
    setDropInfo(null);
  };

  const handleDragOver = (targetId, position) => {
    const did = draggingIdRef.current;
    if (!did || !targetId || targetId === did) {
      if (dropInfoRef.current) { dropInfoRef.current = null; setDropInfo(null); }
      return;
    }
    const newInfo = { targetId, position };
    const prev = dropInfoRef.current;
    if (prev?.targetId === targetId && prev?.position === position) return;
    dropInfoRef.current = newInfo;
    setDropInfo(newInfo);
  };

  const handleDragEnd = () => {
    draggingIdRef.current = null;
    dropInfoRef.current = null;
    setDraggingId(null);
    setDropInfo(null);
  };

  const handleDrop = async () => {
    const dragId = draggingIdRef.current;
    const info = dropInfoRef.current;
    handleDragEnd();
    if (!dragId || !info) return;
    const newTree = moveNodeToPosition(tree, dragId, info.targetId, info.position);
    await persistTree(newTree);
    setSelectedId(dragId);
  };

  const updateNodeMeta = async (updates) => {
    const newTree = updateNodeInTree(tree, selectedId, (n) => ({ ...n, ...updates }));
    await persistTree(newTree);
    // Note: we no longer maintain nodePath in docIndex (it was unreliable
    // anyway — documents can be linked from many places). The search panel
    // computes paths on the fly from the current tree.
  };

  // Document operations
  const fileToDataUrl = (file) =>
    new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

  // Find a direct child of parentId named childName; create it if missing.
  // Returns [updatedTree, childNodeId].
  const getOrCreateChild = (currentTree, parentId, childName) => {
    const parent = findNode(currentTree, parentId);
    if (!parent) return [currentTree, parentId];
    const existing = (parent.children || []).find((c) => c.name === childName);
    if (existing) return [currentTree, existing.id];
    const newId = genNodeId();
    const newNode = { id: newId, name: childName, children: [], documents: [] };
    const newTree = updateNodeInTree(currentTree, parentId, (n) => {
      const sorted = [...(n.children || []), newNode]
        .sort((a, b) => {
          const na = parseInt(a.name, 10), nb = parseInt(b.name, 10);
          if (!isNaN(na) && !isNaN(nb)) return na - nb;
          return a.name.localeCompare(b.name);
        });
      return { ...n, children: sorted };
    });
    return [newTree, newId];
  };

  const uploadFilesToNode = async (
    targetNodeId,
    files,
    { skipDuplicates = false, routeMode = "year-month" } = {}
  ) => {
    console.log(`[DMS] uploadFilesToNode called, target=${targetNodeId}, files=${files.length}, mode=${routeMode}`);
    if (!files.length) return;

    // Duplicate detection — skipped when caller already handled it (dialog response).
    // Uses name+size only (no hash) to avoid reading all files into memory upfront,
    // which would cause memory pressure and break GPS extraction for large folder uploads.
    if (!skipDuplicates) {
      setUploadStatus({ done: 0, total: files.length, phase: "检查重复" });
      const nameSizeSet = new Set(docIndex.map((e) => `${e.name}::${e.size}`));
      const duplicates = [];
      for (const file of files) {
        if (nameSizeSet.has(`${file.name}::${file.size}`)) {
          const existing = docIndex.find((e) => e.name === file.name && e.size === file.size);
          duplicates.push({ file, existing });
        }
      }
      if (duplicates.length > 0) {
        setUploadStatus(null);
        setDupDialog({ duplicates, allFiles: files, targetNodeId });
        return;
      }
    }

    const filesToProcess = files;
    if (!filesToProcess.length) { setUploadStatus(null); return; }
    let workingTree = tree;
    let workingIndex = [...docIndex];
    setUploadStatus({ done: 0, total: filesToProcess.length, phase: "上传" });

    for (const file of filesToProcess) {
      const docId = genDocId();

      // Auto-route: if filename is "FolderName#anything.pdf", place the doc
      // in the node whose name exactly matches the prefix before "#".
      const hashIdx = file.name.indexOf("#");
      let effectiveNodeId = targetNodeId;
      let autoSn;
      if (routeMode !== "current-folder" && hashIdx > 0) {
        const folderName = file.name.slice(0, hashIdx).trim();
        autoSn = folderName;
        const matched = findNodeByName(tree, folderName);
        if (matched) {
          effectiveNodeId = matched.id;
          console.log(`[DMS] Auto-routing "${file.name}" → node "${folderName}" (${matched.id})`);
        } else {
          console.warn(`[DMS] No node named "${folderName}" found; uploading to selected node`);
        }
      }

      let contentHash = null;
      try { contentHash = await computeFileHash(file); } catch (_) {}

      console.log(`[DMS] Processing file: ${file.name} (${file.size} bytes, ${file.type}) → ${docId}`);
      let dataUrl;
      try {
        dataUrl = await fileToDataUrl(file);
        console.log(`[DMS] ✓ File read into memory (${dataUrl.length} chars of base64)`);
      } catch (e) {
        console.error("[DMS] ✗ Failed to read file:", e);
        alert("无法读取文件：" + e.message);
        return;
      }
      const _photoExts = new Set(["jpg","jpeg","png","heic","heif","tif","tiff","webp","gif","bmp"]);
      const _isPhoto = file.type.startsWith("image/") ||
        _photoExts.has(file.name.split(".").pop().toLowerCase());
      const photoDate = _isPhoto ? await readPhotoDate(file) : null;
      if (photoDate) console.log(`[DMS] Photo date: ${photoDate.year}/${photoDate.month} lat=${photoDate.lat} lon=${photoDate.lon} for ${file.name}`);

      // For photos, create year/month subfolders under the designated photo root
      // (or the upload target folder if no root is set), unless uploading to current folder.
      let finalNodeId = effectiveNodeId;
      let photoBaseNodeId = null;
      if (photoDate && routeMode !== "current-folder") {
        const baseId = photoRootNodeId || effectiveNodeId || workingTree.id;
        photoBaseNodeId = baseId;
        [workingTree, finalNodeId] = getOrCreateChild(workingTree, baseId, photoDate.year);
        [workingTree, finalNodeId] = getOrCreateChild(workingTree, finalNodeId, photoDate.month);
      }

      const doc = {
        id: docId, name: file.name, mime: file.type || "application/octet-stream",
        size: file.size, uploadedAt: new Date().toISOString(),
        dataUrl, nodeId: finalNodeId, routeMode, metadata: {},
        ...(photoDate ? {
          photoYear: photoDate.year, photoMonth: photoDate.month,
          ...(photoDate.lat != null ? { photoLat: photoDate.lat, photoLon: photoDate.lon } : {}),
        } : {}),
        ...(photoBaseNodeId ? { photoBaseNodeId } : {}),
      };
      let uploadResult = {};
      try {
        console.log(`[DMS] Posting to /api/docs ...`);
        uploadResult = await StorageAdapter.saveDocument(doc) || {};
      } catch (e) {
        console.error("[DMS] ✗ saveDocument failed:", e);
        alert("上传失败：" + e.message + "\n\n请检查 PyCharm 运行窗口中的服务器端错误。");
        return;
      }

      workingTree = updateNodeInTree(workingTree, finalNodeId, (n) => ({
        ...n,
        documents: [...(n.documents || []), { id: docId }],
      }));

      workingIndex = [
        ...workingIndex,
        {
          id: docId,
          name: file.name,
          mime: file.type,
          size: file.size,
          uploadedAt: doc.uploadedAt,
          originalNodeId: finalNodeId,
          ...(contentHash ? { contentHash } : {}),
          metadata: uploadResult.location ? { Location: { design: "", actual: uploadResult.location } } : {},
          ...(autoSn ? { sn: autoSn } : {}),
        },
      ];
      setUploadStatus((s) => s ? { ...s, done: s.done + 1 } : s);
    }
    try {
      console.log("[DMS] Persisting updated tree and index ...");
      await persistTree(workingTree);
      await persistIndex(workingIndex);
      console.log("[DMS] ✓ Upload complete");
    } catch (e) {
      console.error("[DMS] ✗ Failed to persist tree/index after upload:", e);
      alert("文件已上传，但无法保存索引：" + e.message);
    } finally {
      setUploadStatus(null);
    }
  };

  const handleUpload = async (e) => {
    console.log("[DMS] handleUpload triggered, files=", e.target.files);
    const files = Array.from(e.target.files || []);
    if (!files.length) {
      console.log("[DMS] No files in event, aborting");
      return;
    }
    if (!selectedNode) {
      console.warn("[DMS] No node selected, cannot upload");
      alert("请先在装配树中点击选择一个文件夹。");
      return;
    }
    console.log(`[DMS] Uploading ${files.length} file(s) to selected node ${selectedId}`);
    try {
      await uploadFilesToNode(selectedId, files);
    } catch (e) {
      console.error("[DMS] ✗ Top-level upload error:", e);
      alert("上传过程中发生意外错误：" + e.message);
    }
    e.target.value = "";
  };

  const handleFolderUpload = async (e) => {
    const photoExts = new Set(["jpg","jpeg","png","heic","heif","tif","tiff","webp","gif","bmp"]);
    const files = Array.from(e.target.files || []).filter((f) =>
      f.type.startsWith("image/") || photoExts.has(f.name.split(".").pop().toLowerCase())
    );
    if (!files.length) { e.target.value = ""; alert("所选文件夹中未找到照片文件。"); return; }
    if (!selectedNode) { e.target.value = ""; alert("请先在装配树中点击选择一个文件夹。"); return; }
    try {
      await uploadFilesToNode(selectedId, files);
    } catch (err) {
      console.error("[DMS] ✗ Folder upload error:", err);
      alert("上传过程中发生意外错误：" + err.message);
    }
    e.target.value = "";
  };

  const handleCurrentFolderUpload = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) {
      e.target.value = "";
      return;
    }
    if (!selectedNode) {
      e.target.value = "";
      alert("请先在装配树中点击选择一个文件夹。");
      return;
    }
    try {
      await uploadFilesToNode(selectedId, files, { routeMode: "current-folder" });
    } catch (err) {
      console.error("[DMS] ✗ Current-folder upload error:", err);
      alert("上传过程中发生意外错误：" + err.message);
    }
    e.target.value = "";
  };

  const handleTreeUpload = async (nodeId, e) => {
    console.log(`[DMS] handleTreeUpload triggered for node ${nodeId}, files=`, e.target.files);
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    try {
      await uploadFilesToNode(nodeId, files);
    } catch (e2) {
      console.error("[DMS] ✗ Top-level tree upload error:", e2);
      alert("Unexpected error during upload: " + e2.message);
    }
    setSelectedId(nodeId);
    setExpandedIds((prev) => new Set([...prev, nodeId]));
    e.target.value = "";
  };

  const openDoc = async (docId) => {
    const doc = await StorageAdapter.getDocument(docId);
    if (doc) setViewerDoc(doc);
  };

  // ---- DOCUMENT LINKAGE HELPERS -----------------------------------------
  // Compute, for every docId, the list of nodes that reference it.
  // Used to show "linked from N other nodes" badges and to drive deletion logic.
  const refMap = useMemo(() => {
    const map = new Map(); // docId -> Array<nodeId>
    if (!tree) return map;
    const walk = (node) => {
      for (const d of (node.documents || [])) {
        if (!d || !d.id) continue;
        if (!map.has(d.id)) map.set(d.id, []);
        map.get(d.id).push(node.id);
      }
      (node.children || []).forEach(walk);
    };
    walk(tree);
    return map;
  }, [tree]);

  // Given a node + a doc record from docIndex, return the rich object the
  // DocumentCard expects. (Card was designed for the old "full record"
  // format; we synthesize that shape from canonical record + reference.)
  const enrichDocsForNode = (node) => {
    if (!node) return [];
    return (node.documents || [])
      .map((ref) => docIndex.find((e) => e.id === ref.id))
      .filter(Boolean);
  };

  // Documents that exist in the index but aren't referenced by any node.
  // These show up in the search/picker so they can be re-linked.
  const unreferencedDocs = useMemo(() => {
    return docIndex.filter((d) => !refMap.has(d.id));
  }, [docIndex, refMap]);

  // Remove a link from a single node. If that was the last reference, the
  // document stays in docIndex (and on disk) as "unreferenced" — the user's
  // chosen behavior. They can re-link it later via the picker.
  const unlinkDocFromNode = async (docId, nodeId) => {
    const refs = refMap.get(docId) || [];
    const otherRefs = refs.filter((id) => id !== nodeId);
    let confirmMsg;
    if (otherRefs.length === 0) {
      confirmMsg =
        "此文档仅在此处链接。\n\n" +
        "移除链接后，文档将移至\"未引用\"列表。" +
        "它仍保留在文件库中，之后可重新链接到任意节点。" +
        "文件不会从磁盘上删除。\n\n确定继续？";
    } else {
      confirmMsg = `确定从此节点移除此文档的链接？\n\n它仍将链接至其他 ${otherRefs.length} 个节点。`;
    }
    if (!confirm(confirmMsg)) return;

    const newTree = updateNodeInTree(tree, nodeId, (n) => ({
      ...n,
      documents: (n.documents || []).filter((d) => d.id !== docId),
    }));
    await persistTree(newTree);
  };

  // Hard delete: removes file from disk AND removes all references from the tree.
  // Used from the global "manage documents" view, not the per-node trash icon.
  const purgeDocument = async (docId) => {
    const refs = refMap.get(docId) || [];
    let confirmMsg;
    if (refs.length === 0) {
      confirmMsg = "确定永久删除此文档？\n\n文件将从磁盘上删除。";
    } else {
      confirmMsg =
        `此文档已被 ${refs.length} 个节点链接。\n\n` +
        "确定永久删除？所有链接将被移除，文件将从磁盘上删除。";
    }
    if (!confirm(confirmMsg)) return;

    await StorageAdapter.deleteDocument(docId);
    // Remove every reference from the tree
    const stripRefs = (node) => ({
      ...node,
      documents: (node.documents || []).filter((d) => d.id !== docId),
      children: (node.children || []).map(stripRefs),
    });
    const newTree = stripRefs(tree);
    await persistTree(newTree);
    const newIndex = docIndex.filter((e) => e.id !== docId);
    await persistIndex(newIndex);
  };

  // Add a link from an existing document to a node (idempotent — won't duplicate).
  const linkDocToNode = async (docId, nodeId) => {
    const target = findNode(tree, nodeId);
    if (!target) return;
    if ((target.documents || []).some((d) => d.id === docId)) {
      // Already linked — silently no-op
      return;
    }
    const newTree = updateNodeInTree(tree, nodeId, (n) => ({
      ...n,
      documents: [...(n.documents || []), { id: docId }],
    }));
    await persistTree(newTree);
  };

  // Update metadata GLOBALLY (the user's chosen behavior — one set per document).
  const updateDocMetadata = async (docId, metadata) => {
    // No tree change needed — metadata lives only in docIndex.
    const fullDoc = await StorageAdapter.getDocument(docId);
    if (fullDoc) await StorageAdapter.saveDocument({ ...fullDoc, metadata });
    const newIndex = docIndex.map((e) => (e.id === docId ? { ...e, metadata } : e));
    await persistIndex(newIndex);
  };

  // Update document's own SN (empty string clears override → falls back to inheritance)
  const updateDocSn = async (docId, newSn) => {
    const trimmed = (newSn || "").trim();
    const newIndex = docIndex.map((e) =>
      e.id === docId ? { ...e, sn: trimmed || undefined } : e
    );
    await persistIndex(newIndex);
  };

  // Persist OCR-extracted text into the doc index so it becomes searchable.
  // We update the index only — no need to re-upload the binary file.
  const handleSaveOcr = async (docId, text) => {
    const ocrText = text || "";
    const newIndex = docIndex.map((e) =>
      e.id === docId ? { ...e, ocrText } : e
    );
    await persistIndex(newIndex);
    // Keep the open viewer in sync so its "indexed" state and seed update.
    setViewerDoc((cur) => (cur && cur.id === docId ? { ...cur, ocrText } : cur));
  };

  // Persist extracted key parameters into the document's metadata (the
  // extracted values land in each field's "actual" slot inside the metadata
  // object passed up from the viewer). Reuses the same persistence as manual
  // metadata edits, then syncs the open viewer so a re-save sees current data.
  const handleSaveParams = async (docId, metadata) => {
    await updateDocMetadata(docId, metadata);
    setViewerDoc((cur) => (cur && cur.id === docId ? { ...cur, metadata } : cur));
  };

  // Persist this document's locally-added parameter keys (kept separate from
  // the global key-parameter list). Index-only update, like OCR text.
  const handleSaveLocalParams = async (docId, localKeyParams) => {
    const clean = normalizeKeyParameters(localKeyParams || []);
    const newIndex = docIndex.map((e) =>
      e.id === docId ? { ...e, localKeyParams: clean } : e
    );
    await persistIndex(newIndex);
    setViewerDoc((cur) => (cur && cur.id === docId ? { ...cur, localKeyParams: clean } : cur));
  };

  // Per-node trash button now means "unlink from this node only"
  const deleteDoc = async (docId) => {
    await unlinkDocFromNode(docId, selectedId);
  };

  const formatBytes = (n) => {
    if (!n) return "—";
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
    return `${(n / 1024 / 1024).toFixed(1)} MB`;
  };

  if (loading) {
    return <div className="h-screen flex items-center justify-center bg-stone-50 text-stone-500 text-sm">正在加载文档库…</div>;
  }

  return (
    <div className="h-screen flex flex-col bg-stone-50 text-stone-900">
      {uploadStatus && (
        <div className="fixed top-0 left-0 right-0 z-50 bg-amber-600 text-white text-xs px-4 py-2 flex items-center gap-3 shadow-md">
          <svg className="animate-spin h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none">
            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
          </svg>
          <span>
            {uploadStatus.phase}中… {uploadStatus.done} / {uploadStatus.total} 个文件
          </span>
          <div className="flex-1 bg-amber-800 rounded-full h-1.5 overflow-hidden">
            <div
              className="bg-white h-full rounded-full transition-all duration-300"
              style={{ width: `${uploadStatus.total > 0 ? (uploadStatus.done / uploadStatus.total) * 100 : 0}%` }}
            />
          </div>
        </div>
      )}
      <header className="border-b border-stone-300 bg-white px-4 py-2.5 flex items-center justify-between"
        style={uploadStatus ? { marginTop: "2rem" } : {}}
      >
        <div className="flex items-center gap-3">
          <button
            onClick={() => setSidebarOpen((s) => !s)}
            className="text-stone-500 hover:text-stone-900 p-1"
          >
            {sidebarOpen ? <ChevronLeft size={16} /> : <ChevronRight size={16} />}
          </button>
          <div>
            <div className="text-[10px] tracking-[0.2em] uppercase text-stone-500">轻松找回你的记忆</div>
            <div className="text-sm font-semibold text-stone-900">照片管理系统(PMS)</div>
          </div>
        </div>
        <div className="flex items-center gap-3 text-[10px] text-stone-500">
          <div className="relative">
            <button
              onClick={(e) => { e.stopPropagation(); setShowProjectMenu(!showProjectMenu); }}
              className="flex items-center gap-1 px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded text-stone-700"
              title="项目操作：导出、导入、新建"
            >
              <Book size={11} /> 项目
            </button>
            <input
              ref={importFileRef}
              type="file"
              accept=".dms,.zip,application/zip"
              className="hidden"
              onChange={onImportFileChosen}
            />
            <ProjectMenu
              open={showProjectMenu}
              onClose={() => setShowProjectMenu(false)}
              onTriggerImport={triggerImportAndRun}
              onProjectChanged={(newPath) => {
                // Project-scoped UI caches must not carry into a newly-created project.
                // The authoritative data is in the selected storage folder/index.json.
                try {
                  [
                    "dms:databook-selection",
                    "dms:databook-title",
                    "dms:databook-subtitle",
                  ].forEach((k) => localStorage.removeItem(k));
                } catch {}
                // Reliable refresh: reload the page so all React state restarts
                // against the new storage folder.
                window.location.reload();
              }}
              onOpenKeyParameters={() => setShowKeyParameters(true)}
              onOpenHierarchyImport={() => setShowHierarchyImport(true)}
              onOpenZipImport={() => setShowZipImport(true)}
            />
          </div>
          <button
            onClick={onChangeFolder}
            className="flex items-center gap-1 px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded text-stone-700 max-w-[400px]"
            title={`点击更改存储位置\n当前：${storagePath}`}
          >
            <HardDrive size={11} />
            <span className="font-mono truncate">{storagePath || "—"}</span>
          </button>
          <span className="text-stone-300">|</span>
          <span className="tabular-nums">已索引 {docIndex.length} 份文档</span>
          <span className="text-stone-300">|</span>
          <button
            onClick={async () => {
              if (!confirm("确定退出 QCDMS？这将停止服务器。")) return;
              try { await fetch("/api/quit", { method: "POST" }); } catch {}
              window.close();
            }}
            className="flex items-center gap-1 px-2 py-1 border border-red-300 hover:bg-red-50 hover:border-red-500 rounded text-red-600 font-medium"
            title="停止 DMS 服务器并退出"
          >
            退出 DMS
          </button>
        </div>
      </header>

      <div className="flex-1 flex overflow-hidden">
        {sidebarOpen && (
          <>
            <aside
              style={{ width: `${sidebarWidth}px` }}
              className="border-r border-stone-300 bg-white flex flex-col shrink-0"
            >
            <div className="flex border-b border-stone-200 text-xs">
              <button
                onClick={() => setTab("tree")}
                className={`flex-1 py-2 px-2 flex items-center justify-center gap-1 ${
                  tab === "tree" ? "border-b-2 border-amber-600 text-stone-900 font-medium" : "text-stone-500 hover:text-stone-900"
                }`}
              >
                <Folder size={12} /> 树形
              </button>
              <button
                onClick={() => setTab("search")}
                className={`flex-1 py-2 px-2 flex items-center justify-center gap-1 ${
                  tab === "search" ? "border-b-2 border-amber-600 text-stone-900 font-medium" : "text-stone-500 hover:text-stone-900"
                }`}
              >
                <Search size={12} /> 搜索
              </button>
              <button
                onClick={() => setTab("databook")}
                className={`flex-1 py-2 px-2 flex items-center justify-center gap-1 ${
                  tab === "databook" ? "border-b-2 border-amber-600 text-stone-900 font-medium" : "text-stone-500 hover:text-stone-900"
                }`}
              >
                <Book size={12} /> 数据手册
              </button>
            </div>

            {tab === "tree" && (
              <>
                <div className="flex flex-wrap gap-1 p-2 border-b border-stone-200">
                  <button
                    onClick={startAddChildFromToolbar}
                    disabled={!selectedNode}
                    className="text-[11px] px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded flex items-center gap-1 disabled:opacity-40"
                    title="在选中节点下新建子文件夹"
                  >
                    <Folder size={11} /> 新建文件夹
                  </button>
                  <label
                    className={`text-[11px] px-2 py-1 border border-stone-300 rounded flex items-center gap-1 ${
                      selectedNode ? "hover:bg-amber-50 hover:border-amber-400 cursor-pointer" : "opacity-40 cursor-not-allowed"
                    }`}
                    title="上传一个或多个文档到选中节点"
                  >
                    <Upload size={11} /> 上传文档
                    <input
                      type="file" multiple accept="application/pdf,image/*,text/*,.txt,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip"
                      className="hidden" disabled={!selectedNode}
                      onChange={handleUpload}
                    />
                  </label>
                  <button
                    onClick={() => selectedId && setRenamingId(selectedId)}
                    disabled={!selectedNode}
                    className="text-[11px] px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded flex items-center gap-1 disabled:opacity-40"
                    title="重命名选中节点"
                  >
                    <Edit2 size={11} /> 重命名
                  </button>
                  <button
                    onClick={() => selectedId && handleDeleteNode(selectedId)}
                    disabled={!selectedNode || selectedId === tree?.id}
                    className="text-[11px] px-2 py-1 border border-stone-300 hover:bg-red-50 hover:border-red-400 hover:text-red-700 rounded flex items-center gap-1 disabled:opacity-40"
                    title="删除选中节点及其子树"
                  >
                    <Trash2 size={11} /> 删除
                  </button>
                  <button
                    onClick={() => { setTextTreeCopied(false); setShowTextTree(true); }}
                    disabled={!tree}
                    className="text-[11px] px-2 py-1 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 rounded flex items-center gap-1 disabled:opacity-40"
                    title="以文本树形式查看 / 复制 / 导出整个结构"
                  >
                    <ListTree size={11} /> 文本树
                  </button>
                </div>
                <div className="px-3 py-1.5 text-[10px] text-stone-500 border-b border-stone-100 bg-stone-50/50">
                  悬停节点显示快捷操作 · 双击重命名 · 右键打开菜单
                </div>
                <div className="flex-1 overflow-auto py-1">
                  {tree && (
                    <TreeNode
                      node={tree} depth={0} isRoot={true}
                      siblingIndex={0} siblingCount={1}
                      selectedId={selectedId} expandedIds={expandedIds}
                      renamingId={renamingId} addingChildToId={addingChildToId}
                      photoRootNodeId={photoRootNodeId}
                      onToggle={toggleExpand} onSelect={setSelectedId}
                      onStartRename={(id) => setRenamingId(id)}
                      onCommitRename={handleCommitRename}
                      onCancelRename={() => setRenamingId(null)}
                      onStartAddChild={(id) => {
                        setAddingChildToId(id);
                        setExpandedIds((prev) => new Set([...prev, id]));
                      }}
                      onCommitAddChild={handleCommitAddChild}
                      onCancelAddChild={() => setAddingChildToId(null)}
                      onDelete={handleDeleteNode}
                      onMoveNode={handleMoveNode}
                      onContextMenu={(x, y, nodeId) => setContextMenu({ x, y, nodeId })}
                      onUploadToNode={handleTreeUpload}
                      draggingId={draggingId}
                      dropInfo={dropInfo}
                      onDragStart={handleDragStart}
                      onDragOver={handleDragOver}
                      onDragEnd={handleDragEnd}
                      onDrop={handleDrop}
                    />
                  )}
                </div>
              </>
            )}

            {tab === "search" && (
              <SearchPanel
                index={docIndex}
                refMap={refMap}
                getPathFor={(id) => getNodePathFrom(tree, id)}
                onOpenDoc={openDoc}
                onJumpToNode={expandToNode}
                tree={tree}
                scopeNodeId={selectedId}
              />
            )}

            {tab === "databook" && (
              <DatabookPanel
                tree={tree}
                docIndex={docIndex}
                getPathFor={(id) => getNodePathFrom(tree, id)}
                formatBytes={formatBytes}
              />
            )}
          </aside>
            {/* Drag handle — narrow strip with wider invisible hit area for easier grabbing */}
            <div
              onMouseDown={(e) => {
                e.preventDefault();
                setResizing(true);
              }}
              onDoubleClick={resetSidebarWidth}
              title="拖动调整侧栏宽度 · 双击重置"
              className={`relative w-1 shrink-0 cursor-col-resize group ${
                resizing ? "bg-amber-500" : "bg-stone-300 hover:bg-amber-400"
              }`}
              style={{ marginLeft: "-1px", zIndex: 10 }}
            >
              {/* Invisible wider hit area so the user doesn't have to be pixel-perfect */}
              <div className="absolute inset-y-0 -left-1 -right-1" />
            </div>
          </>
        )}

        <main className="flex-1 overflow-auto">
          {selectedNode ? (
            <div className="max-w-4xl mx-auto p-6">
              <div className="text-[11px] text-stone-500 mb-3 font-mono">{getNodePath(selectedId)}</div>

              <div className="border-b border-stone-300 pb-4 mb-5">
                {editingNode ? (
                  <div className="space-y-2">
                    <input
                      type="text"
                      defaultValue={selectedNode.name}
                      onBlur={(e) => {
                        const nextName = e.target.value.trim();
                        if (nextName && nextName !== selectedNode.name) {
                          handleCommitRename(selectedNode.id, nextName);
                        } else {
                          e.target.value = selectedNode.name;
                        }
                      }}
                      onKeyDown={(e) => {
                        if (e.key === "Enter") e.currentTarget.blur();
                        if (e.key === "Escape") {
                          e.currentTarget.value = selectedNode.name;
                          e.currentTarget.blur();
                        }
                      }}
                      placeholder="节点名称"
                      className="w-full text-xl font-semibold border border-stone-300 rounded px-2 py-1"
                    />
                    <div>
                      <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-0.5">
                        序列号（SN）
                      </label>
                      <input
                        type="text"
                        value={selectedNode.sn || ""}
                        onChange={(e) => updateNodeMeta({ sn: e.target.value })}
                        placeholder="例如：SN-2026-04-001（可选）"
                        className="w-full text-sm border border-stone-300 rounded px-2 py-1 font-mono"
                      />
                    </div>
                    <textarea
                      value={selectedNode.description || ""}
                      onChange={(e) => updateNodeMeta({ description: e.target.value })}
                      placeholder="描述"
                      className="w-full text-sm border border-stone-300 rounded px-2 py-1"
                      rows={2}
                    />
                    <button onClick={() => setEditingNode(false)} className="text-xs px-3 py-1 bg-amber-600 hover:bg-amber-700 text-white rounded">
                      完成
                    </button>
                  </div>
                ) : (
                  <div className="flex items-start justify-between gap-3">
                    <div className="min-w-0 flex-1">
                      <h1 className="text-xl font-semibold text-stone-900">{selectedNode.name}</h1>
                      {selectedNode.sn && (
                        <div className="text-sm text-amber-700 font-mono mt-0.5">
                          SN · {selectedNode.sn}
                        </div>
                      )}
                      {selectedNode.description && (
                        <p className="text-sm text-stone-600 mt-1">{selectedNode.description}</p>
                      )}
                      <div className="flex gap-3 mt-2 text-[11px] text-stone-500 font-mono">
                        <span>{selectedNode.id}</span>
                        <span>•</span>
                        <span>
                          {(selectedNode.children || []).length} 个子组件
                        </span>
                        <span>•</span>
                        <span>
                          {(selectedNode.documents || []).length} 份文档
                        </span>
                      </div>
                    </div>
                    <button onClick={() => setEditingNode(true)} className="text-stone-500 hover:text-stone-900 p-1" title="编辑名称、序列号及描述">
                      <Edit2 size={14} />
                    </button>
                  </div>
                )}
              </div>

              <section>
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-xs font-semibold uppercase tracking-wider text-stone-700">附加文档</h2>
                  <div className="flex gap-2">
                    <button
                      onClick={() => setShowLinkPicker(true)}
                      className="text-xs px-3 py-1.5 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 text-stone-700 rounded cursor-pointer flex items-center gap-1.5"
                      title="从其他节点链接现有文档（不存储重复文件）"
                    >
                      <Tag size={12} /> 链接现有文档
                    </button>
                    <button
                      onClick={() => setShowCombineModal(true)}
                      className="text-xs px-3 py-1.5 border border-stone-300 hover:bg-amber-50 hover:border-amber-400 text-stone-700 rounded cursor-pointer flex items-center gap-1.5"
                      title="将此文件夹中的文档合并为一个 PDF 文件"
                    >
                      <Layers size={12} /> 合并文档
                    </button>
                    <label className="text-xs px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white rounded cursor-pointer flex items-center gap-1.5">
                      <Upload size={12} /> 上传文件
                      <input type="file" multiple accept="application/pdf,image/*,text/*,.txt,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip" onChange={handleUpload} className="hidden" />
                    </label>
                    <label className="text-xs px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white rounded cursor-pointer flex items-center gap-1.5">
                      <Upload size={12} /> 上传到当前文件夹
                      <input type="file" multiple accept="application/pdf,image/*,text/*,.txt,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip" onChange={handleCurrentFolderUpload} className="hidden" />
                    </label>
                    <label className="text-xs px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white rounded cursor-pointer flex items-center gap-1.5">
                      <Upload size={12} /> 上传文件夹
                      <input type="file" webkitdirectory="" multiple onChange={handleFolderUpload} className="hidden" />
                    </label>
                  </div>
                </div>

                {(selectedNode.documents || []).length === 0 && (
                  <div className="border border-dashed border-stone-300 rounded p-8 text-center text-sm text-stone-500">
                    暂无附加文档。请上传新文件，或使用“链接现有文档”关联文件库中已有的文档。
                  </div>
                )}

                <div className="space-y-3">
                  {enrichDocsForNode(selectedNode).map((doc) => {
                    const refs = refMap.get(doc.id) || [];
                    const otherRefs = refs.filter((id) => id !== selectedId).length;
                    return (
                      <DocumentCard
                        key={doc.id}
                        doc={doc}
                        otherRefCount={otherRefs}
                        nodeSn={selectedNode.sn || ""}
                        onOpen={() => openDoc(doc.id)}
                        onDelete={() => deleteDoc(doc.id)}
                        onUpdateMeta={(m) => updateDocMetadata(doc.id, m)}
                        onUpdateSn={(newSn) => updateDocSn(doc.id, newSn)}
                        keyParameters={keyParameters}
                        formatBytes={formatBytes}
                      />
                    );
                  })}
                </div>
              </section>
            </div>
          ) : (
            <div className="h-full flex items-center justify-center text-stone-500 text-sm">
              请从装配树中选择一个节点
            </div>
          )}
        </main>
      </div>

      <DocumentViewer
        doc={viewerDoc}
        onClose={() => setViewerDoc(null)}
        onSaveOcr={handleSaveOcr}
        keyParameters={keyParameters}
        onAddKeyParameter={handleAddKeyParameter}
        onSaveLocalParams={handleSaveLocalParams}
        onSaveParams={handleSaveParams}
      />

      {showTextTree && (() => {
        const treeText = buildTreeText(tree, { showMeta: textTreeMeta });
        const copyTree = async () => {
          try {
            await navigator.clipboard.writeText(treeText);
            setTextTreeCopied(true);
            setTimeout(() => setTextTreeCopied(false), 1500);
          } catch {/* clipboard blocked */}
        };
        const downloadTree = () => {
          const blob = new Blob([treeText], { type: "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          const base = (tree && tree.name ? tree.name : "tree").replace(/[\\/:*?"<>|]/g, "_");
          a.href = url; a.download = `${base}.txt`;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        };
        return (
          <div
            className="fixed inset-0 bg-stone-900/70 z-50 flex items-center justify-center p-4"
            onClick={() => setShowTextTree(false)}
          >
            <div
              className="bg-white w-full max-w-2xl max-h-[85vh] flex flex-col rounded shadow-2xl"
              onClick={(e) => e.stopPropagation()}
            >
              <div className="flex items-center justify-between px-4 py-3 border-b border-stone-200">
                <div className="flex items-center gap-1.5 text-sm font-medium text-stone-800">
                  <ListTree size={15} /> 文本树预览
                </div>
                <button onClick={() => setShowTextTree(false)} className="text-stone-400 hover:text-stone-700">
                  <X size={16} />
                </button>
              </div>

              <div className="px-4 py-2 border-b border-stone-100 flex items-center gap-3 flex-wrap">
                <label className="flex items-center gap-1.5 text-[11px] text-stone-600 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={textTreeMeta}
                    onChange={(e) => setTextTreeMeta(e.target.checked)}
                    className="accent-amber-600"
                  />
                  显示序列号
                </label>
                <div className="ml-auto flex gap-2">
                  <button
                    onClick={copyTree}
                    className="text-xs px-2.5 py-1 border border-stone-300 text-stone-700 hover:bg-stone-100 rounded flex items-center gap-1"
                  >
                    <Copy size={12} /> {textTreeCopied ? "已复制" : "复制"}
                  </button>
                  <button
                    onClick={downloadTree}
                    className="text-xs px-2.5 py-1 border border-amber-300 text-amber-800 bg-amber-50 hover:bg-amber-100 rounded flex items-center gap-1"
                  >
                    <Download size={12} /> 导出 .txt
                  </button>
                </div>
              </div>

              <div className="flex-1 min-h-0 overflow-auto p-4 bg-stone-50">
                <pre className="text-[12px] leading-relaxed font-mono text-stone-800 whitespace-pre">
{treeText || "（无内容）"}
                </pre>
              </div>
            </div>
          </div>
        );
      })()}

      <KeyParametersDialog
        open={showKeyParameters}
        keyParameters={keyParameters}
        onClose={() => setShowKeyParameters(false)}
        onSave={async (items) => {
          await persistKeyParameters(items);
          setShowKeyParameters(false);
        }}
      />

      <LinkPicker
        open={showLinkPicker}
        onClose={() => setShowLinkPicker(false)}
        onLink={(docId) => linkDocToNode(docId, selectedId)}
        docIndex={docIndex}
        tree={tree}
        refMap={refMap}
        currentNodeId={selectedId}
        currentNodeName={selectedNode?.name || ""}
        formatBytes={formatBytes}
        getPathFor={(id) => getNodePathFrom(tree, id)}
      />

      <HierarchyImportDialog
        open={showHierarchyImport}
        onClose={() => setShowHierarchyImport(false)}
        onImported={async () => {
          // Reload tree from server so the new nodes are visible immediately
          const r = await StorageAdapter.getTree();
          const t = r.tree;
          if (t) {
            setTree(t);
            setExpandedIds(new Set([t.id]));
            setSelectedId(t.id);
          }
          setShowHierarchyImport(false);
        }}
      />

      <ZipImportDialog
        open={showZipImport}
        onClose={() => setShowZipImport(false)}
        onImported={async () => {
          // Reload tree + doc index so newly allocated documents appear immediately
          const r = await StorageAdapter.getTree();
          if (r.tree) setTree(r.tree);
          const idx = await StorageAdapter.listDocumentIndex();
          setDocIndex(idx);
        }}
      />

      {contextMenu && (() => {
        const ctxNode = findNode(tree, contextMenu.nodeId);
        const ctxName = ctxNode?.name || "";
        return (
          <ContextMenu
            x={contextMenu.x} y={contextMenu.y}
            isRoot={contextMenu.nodeId === tree?.id}
            nodeName={ctxName}
            isPhotoRoot={contextMenu.nodeId === photoRootNodeId}
            isDateFolder={isDateNode(ctxName)}
            onClose={() => setContextMenu(null)}
            onRename={() => setRenamingId(contextMenu.nodeId)}
            onAddChild={() => {
              setAddingChildToId(contextMenu.nodeId);
              setExpandedIds((prev) => new Set([...prev, contextMenu.nodeId]));
            }}
            onUpload={() => {
              ctxUploadTargetRef.current = contextMenu.nodeId;
              ctxUploadInputRef.current?.click();
            }}
            onDelete={() => handleDeleteNode(contextMenu.nodeId)}
            onSetPhotoRoot={async () => {
              const newId = contextMenu.nodeId;
              await StorageAdapter.savePhotoRootNodeId(newId);
              setPhotoRootNodeId(newId);
            }}
            onClearPhotoRoot={async () => {
              await StorageAdapter.savePhotoRootNodeId("");
              setPhotoRootNodeId("");
            }}
          />
        );
      })()}

      <input
        ref={ctxUploadInputRef}
        type="file" multiple accept="application/pdf,image/*,text/*,.txt,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip"
        className="hidden"
        onChange={(e) => {
          const targetId = ctxUploadTargetRef.current;
          if (targetId) handleTreeUpload(targetId, e);
          ctxUploadTargetRef.current = null;
        }}
      />

      {dupDialog && (
        <DuplicateDialog
          duplicates={dupDialog.duplicates}
          totalCount={dupDialog.allFiles.length}
          formatBytes={formatBytes}
          getPathFor={(id) => getNodePathFrom(tree, id)}
          onCancel={() => setDupDialog(null)}
          onUploadAll={() => {
            const { allFiles, targetNodeId } = dupDialog;
            setDupDialog(null);
            // Pass skipDuplicates:true so the scan is bypassed — user chose to upload all
            uploadFilesToNode(targetNodeId, allFiles, { skipDuplicates: true });
          }}
          onSkip={() => {
            const { duplicates, allFiles, targetNodeId } = dupDialog;
            setDupDialog(null);
            const nonDups = allFiles.filter((f) => !duplicates.some((d) => d.file === f));
            uploadFilesToNode(targetNodeId, nonDups, { skipDuplicates: true });
          }}
        />
      )}

      {showCombineModal && selectedNode && (
        <CombineFolderModal
          node={selectedNode}
          docIndex={docIndex}
          formatBytes={formatBytes}
          onClose={() => setShowCombineModal(false)}
          onSaved={async () => {
            setShowCombineModal(false);
            const r = await StorageAdapter.getTree();
            if (r.tree) setTree(r.tree);
            const idx = await StorageAdapter.listDocumentIndex();
            setDocIndex(idx);
          }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);

// Startup banner
console.log("%c[DMS] Document Management System loaded — build 2026-06-02-text-tree","color:#b45309;font-weight:bold;font-size:14px");
console.log("[DMS] Storage backend: REST API (Python server)");
console.log("[DMS] To diagnose storage, run: dmsDiag()");

// Global diagnostic helper — type dmsDiag() in console to inspect state
window.dmsDiag = async function() {
  console.group("[DMS] Diagnostic report");
  try {
    const settings = await StorageAdapter.getSettings();
    console.log("Settings:", settings);
    const res = await fetch("/api/diag");
    const diag = await res.json();
    console.log("Server diagnostic:", diag);
    if (diag.files_in_root && diag.files_in_root.length) {
      console.log("Files in storage root:", diag.files_in_root);
    }
    if (diag.files_in_docs && diag.files_in_docs.length) {
      console.log(`Files in docs/ subfolder (${diag.files_in_docs.length}):`, diag.files_in_docs);
    }
  } catch (e) {
    console.error("Diagnostic failed:", e);
  }
  console.groupEnd();
};
</script>
</body>
</html>
